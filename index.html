<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK - Omni Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { spark: { dark: '#020617', blue: '#0066FF', cyan: '#00F0FF', green: '#10B981', gold: '#FBBF24', red: '#EF4444' } } } }
        }
    </script>
    <style>
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark .glass { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255, 255, 255, 0.08); }
        .spark-gradient-blue { background: linear-gradient(135deg, #0066FF 0%, #00F0FF 100%); }
        .spark-gradient-gold { background: linear-gradient(135deg, #B45309 0%, #FBBF24 100%); }
        .spark-gradient-red { background: linear-gradient(135deg, #991B1B 0%, #EF4444 100%); }
        .btn-active:active { transform: scale(0.92); filter: brightness(1.2); }
        .tab-transition { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spark-scrollbar::-webkit-scrollbar { height: 0px; width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-spark-dark text-slate-900 dark:text-slate-100 min-h-screen pb-32 select-none overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icone = ({ nome, className = "w-6 h-6" }) => {
            const icones = {
                History: <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" />,
                Home: <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />,
                Stats: <path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5V5h-5v13zm6 0h5v-13h-5v13z" />,
                Trash: <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />,
                Fingerprint: <path d="M17.81 4.47c-.08 0-.16-.02-.23-.06C15.66 3.42 14 3 12.01 3c-1.98 0-3.74.4-5.57 1.41-.23.13-.52.05-.65-.18-.13-.23-.05-.52.18-.65C7.88 2.5 9.8 2 12.01 2c2.12 0 3.91.47 5.91 1.55.23.13.31.42.18.65-.07.12-.19.18-.29.18zm-2.88 2.2c-.11 0-.22-.04-.31-.12-.86-.77-2.03-1.14-3.41-1.14-1.12 0-2.13.25-3.09.73-.24.12-.53.02-.65-.22s-.02-.53.22-.65c1.11-.55 2.31-.85 3.53-.85 1.6 0 2.99.45 4.02 1.36.21.19.22.5.03.71-.09.09-.22.14-.34.14zM14.5 12c-.28 0-.5-.22-.5-.5 0-.82-.68-1.5-1.5-1.5s-1.5.68-1.5 1.5c0 .28-.22.5-.5.5s-.5-.22-.5-.5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5c0 .28-.22.5-.5.5zm1.5 6c-.28 0-.5-.22-.5-.5 0-1.38-1.12-2.5-2.5-2.5s-2.5 1.12-2.5 2.5c0 .28-.22.5-.5.5s-.5-.22-.5-.5c0-1.93 1.57-3.5 3.5-3.5s3.5 1.57 3.5 3.5c0 .28-.22.5-.5.5z" />,
                Swap: <path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icones[nome] || icones.Home}</svg>;
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [hasAccount, setHasAccount] = useState(() => !!localStorage.getItem('spark_master_pass'));
            const [passInput, setPassInput] = useState('');
            const [aba, setAba] = useState('home');
            const [theme, setTheme] = useState(() => localStorage.getItem('spark_theme') || 'blue');
            const [dashOrder, setDashOrder] = useState(() => JSON.parse(localStorage.getItem('spark_order')) || ['fluxo', 'lancamento', 'cartoes']);
            
            const [transacoes, setTransacoes] = useState(() => JSON.parse(localStorage.getItem('spark_db_v6')) || []);
            const [cartoes, setCartoes] = useState(() => JSON.parse(localStorage.getItem('spark_cartoes')) || []);
            const [metas, setMetas] = useState(() => JSON.parse(localStorage.getItem('spark_metas')) || { Geral: 2000, Alimentação: 500, Lazer: 300, Fatura: 1000, Transporte: 200, Saúde: 200, Investimento: 500 });
            
            const [valor, setValor] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [nota, setNota] = useState('');
            const fileInputRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('spark_db_v6', JSON.stringify(transacoes));
                localStorage.setItem('spark_cartoes', JSON.stringify(cartoes));
                localStorage.setItem('spark_theme', theme);
                localStorage.setItem('spark_order', JSON.stringify(dashOrder));
            }, [transacoes, cartoes, theme, dashOrder]);

            const criarConta = () => {
                if(passInput.length < 4) return alert("Mestre, a senha deve ter ao menos 4 dígitos.");
                localStorage.setItem('spark_master_pass', passInput);
                setHasAccount(true);
                setPassInput('');
                alert("Cofre configurado com sucesso!");
            };

            const logar = () => {
                const saved = localStorage.getItem('spark_master_pass');
                if(passInput === saved) {
                    setIsAuthenticated(true);
                    setPassInput('');
                } else {
                    alert("Acesso Negado, Senhor.");
                }
            };

            const lancar = (tipo) => {
                if (!valor) return;
                const nova = { id: Date.now(), valor: parseFloat(valor), tipo, categoria, nota: nota || `Operação ${categoria}`, timestamp: Date.now(), data: new Date().toLocaleDateString('pt-BR') };
                setTransacoes([nova, ...transacoes]);
                setValor(''); setNota('');
            };

            const swapOrder = (index) => {
                const newOrder = [...dashOrder];
                const next = (index + 1) % newOrder.length;
                [newOrder[index], newOrder[next]] = [newOrder[next], newOrder[index]];
                setDashOrder(newOrder);
            };

            const stats = useMemo(() => {
                const hoje = new Date();
                const doMes = transacoes.filter(t => new Date(t.timestamp).getMonth() === hoje.getMonth());
                const totalSaidas = doMes.filter(t => t.tipo === 'saida').reduce((acc, t) => acc + t.valor, 0);
                const totalEntradas = doMes.filter(t => t.tipo === 'entrada').reduce((acc, t) => acc + t.valor, 0);
                const porCategoria = {};
                doMes.filter(t => t.tipo === 'saida').forEach(t => { porCategoria[t.categoria] = (porCategoria[t.categoria] || 0) + t.valor; });
                return { totalSaidas, totalEntradas, porCategoria };
            }, [transacoes]);

            const saldoReal = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc - t.valor, 0);

            // BACKUP JSON
            const exportarJSON = () => {
                const data = JSON.stringify({ transacoes, cartoes, metas, theme, dashOrder });
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `spark_vault_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const importarJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const b = JSON.parse(ev.target.result);
                        if(b.transacoes) setTransacoes(b.transacoes);
                        if(b.cartoes) setCartoes(b.cartoes);
                        if(b.theme) setTheme(b.theme);
                        alert("Dados restaurados, Senhor.");
                    } catch(e) { alert("Arquivo inválido."); }
                };
                reader.readAsText(file);
            };

            const gerarPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFont("helvetica", "bold");
                doc.text("SPARK VAULT - EXTRATO DO MESTRE", 20, 20);
                doc.setFontSize(10);
                doc.text(`Patrimônio: R$ ${saldoReal.toLocaleString('pt-BR')}`, 20, 30);
                let y = 45;
                transacoes.slice(0, 20).forEach(t => {
                    doc.text(`${t.data} - ${t.nota}: ${t.tipo === 'entrada' ? '+' : '-'} R$ ${t.valor}`, 20, y);
                    y += 8;
                });
                doc.save("Extrato_Spark.pdf");
            };

            if (!isAuthenticated) {
                return (
                    <div className="fixed inset-0 bg-spark-dark flex flex-col items-center justify-center p-8 z-[100] tab-transition">
                        <div className={`w-24 h-24 rounded-[2.5rem] flex items-center justify-center font-black italic text-white shadow-2xl text-5xl mb-12 spark-gradient-${theme}`}>S</div>
                        <h1 className="text-2xl font-black italic mb-8">SPARK VAULT</h1>
                        
                        <div className="w-full max-w-xs space-y-4">
                            <input type="password" value={passInput} onChange={e => setPassInput(e.target.value)} placeholder="Senha Mestre" className="w-full bg-white/5 border border-white/10 p-5 rounded-3xl text-center text-xl font-bold outline-none focus:border-spark-blue"/>
                            {hasAccount ? (
                                <button onClick={logar} className={`w-full py-5 rounded-3xl font-black uppercase spark-gradient-${theme} btn-active`}>Acessar Cofre</button>
                            ) : (
                                <button onClick={criarConta} className="w-full py-5 rounded-3xl font-black uppercase bg-spark-green text-white btn-active">Criar Senha de Acesso</button>
                            )}
                        </div>
                        <p className="mt-8 text-[10px] uppercase font-black tracking-widest opacity-30 italic">Segurança Biométrica Virtual Ativa</p>
                    </div>
                );
            }

            return (
                <div className="p-4 max-w-2xl mx-auto">
                    <div className="flex justify-between items-center mb-8 pt-4">
                        <div className="flex gap-4 items-center">
                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black italic text-white shadow-lg text-2xl spark-gradient-${theme}`}>S</div>
                            <div>
                                <p className="text-[10px] opacity-40 uppercase font-black tracking-widest italic">Patrimônio do Mestre</p>
                                <p className="text-2xl font-black italic text-spark-green">R$ {saldoReal.toLocaleString('pt-BR')}</p>
                            </div>
                        </div>
                        <button onClick={gerarPDF} className="glass p-4 rounded-2xl btn-active">📑</button>
                    </div>

                    {aba === 'home' && (
                        <div className="tab-transition space-y-6">
                            {dashOrder.map((item, index) => {
                                if(item === 'fluxo') return (
                                    <div key="fluxo" className="glass rounded-[3rem] p-10 text-center relative overflow-hidden">
                                        <button onClick={() => swapOrder(index)} className="absolute top-6 right-8 opacity-20"><Icone nome="Swap" className="w-5 h-5"/></button>
                                        <h3 className={`text-spark-${theme} text-[10px] font-black uppercase mb-2 italic opacity-60`}>Fluxo Mensal</h3>
                                        <p className="text-6xl font-black italic tracking-tighter mb-6">R$ {stats.totalSaidas.toLocaleString('pt-BR')}</p>
                                        <div className="h-3 w-full bg-white/5 rounded-full overflow-hidden">
                                            <div className={`h-full spark-gradient-${theme}`} style={{ width: `${Math.min((stats.totalSaidas/metas.Geral)*100, 100)}%` }}></div>
                                        </div>
                                    </div>
                                );
                                if(item === 'lancamento') return (
                                    <div key="lancamento" className="glass rounded-[2.5rem] p-8 relative">
                                        <button onClick={() => swapOrder(index)} className="absolute top-6 right-8 opacity-20"><Icone nome="Swap" className="w-5 h-5"/></button>
                                        <input type="number" inputMode="decimal" value={valor} onChange={(e) => setValor(e.target.value)} placeholder="0.00" className="w-full bg-transparent text-center text-6xl font-black outline-none mb-6"/>
                                        <div className="flex gap-2 overflow-x-auto pb-6 mb-6 spark-scrollbar">
                                            {Object.keys(metas).filter(k => k !== 'Geral').map(cat => (
                                                <button key={cat} onClick={() => setCategoria(cat)} className={`px-5 py-3 rounded-xl text-[10px] font-black uppercase flex-shrink-0 ${categoria === cat ? `bg-spark-${theme} text-white` : 'bg-white/5 opacity-40'}`}>{cat}</button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <button onClick={() => lancar('saida')} className="py-6 rounded-3xl font-black uppercase text-xs btn-active text-white spark-gradient-red">Despesa</button>
                                            <button onClick={() => lancar('entrada')} className="border-2 border-spark-green text-spark-green py-6 rounded-3xl font-black uppercase text-xs btn-active">Receita</button>
                                        </div>
                                    </div>
                                );
                                if(item === 'cartoes') return (
                                    <div key="cartoes" className="space-y-4 relative">
                                        <div className="flex justify-between items-center px-4">
                                            <h2 className="text-xs font-black uppercase opacity-40 italic">Cartões</h2>
                                            <button onClick={() => swapOrder(index)} className="opacity-20"><Icone nome="Swap" className="w-5 h-5"/></button>
                                        </div>
                                        <div className="flex gap-4 overflow-x-auto pb-4 spark-scrollbar">
                                            {cartoes.map(c => (
                                                <div key={c.id} className="glass p-6 rounded-[2rem] min-w-[260px] border-t-4 border-t-spark-blue">
                                                    <p className="text-[10px] font-black opacity-40 mb-4">{c.banco}</p>
                                                    <p className="font-black text-lg mb-4 italic">{c.nome}</p>
                                                    <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                                                        <div className="h-full bg-spark-blue" style={{ width: '40%' }}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {aba === 'history' && (
                        <div className="tab-transition space-y-4">
                            {transacoes.map(t => (
                                <div key={t.id} className="glass p-6 rounded-[2rem] flex justify-between items-center">
                                    <div className="flex gap-4 items-center">
                                        <div className={`w-2 h-10 rounded-full ${t.tipo === 'entrada' ? 'bg-spark-green' : 'bg-spark-red'}`}></div>
                                        <div><p className="font-black text-sm italic">{t.nota}</p><p className="text-[10px] opacity-30 font-bold">{t.data}</p></div>
                                    </div>
                                    <p className={`font-black italic ${t.tipo === 'entrada' ? 'text-spark-green' : 'text-slate-400'}`}>R$ {t.valor}</p>
                                </div>
                            ))}
                        </div>
                    )}

                    {aba === 'config' && (
                        <div className="tab-transition space-y-6">
                            <div className="glass p-8 rounded-[2.5rem] space-y-4">
                                <h2 className="text-xs font-black uppercase opacity-40 text-center mb-4">Backup do Sistema</h2>
                                <button onClick={exportarJSON} className="w-full bg-white/5 py-5 rounded-2xl font-black text-[10px] uppercase btn-active">Exportar JSON</button>
                                <button onClick={() => fileInputRef.current.click()} className="w-full bg-white/5 py-5 rounded-2xl font-black text-[10px] uppercase btn-active">Importar JSON</button>
                                <input type="file" ref={fileInputRef} onChange={importarJSON} className="hidden" accept=".json"/>
                            </div>
                            <div className="grid grid-cols-3 gap-4">
                                {['blue', 'gold', 'red'].map(c => (
                                    <button key={c} onClick={() => setTheme(c)} className={`h-16 rounded-2xl border-4 ${theme === c ? 'border-white' : 'border-transparent'} bg-spark-${c}`}></button>
                                ))}
                            </div>
                            <button onClick={() => setIsAuthenticated(false)} className="w-full glass py-6 rounded-3xl font-black uppercase text-red-500">Bloquear Cofre</button>
                        </div>
                    )}

                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-[3rem] p-3 flex justify-between items-center shadow-2xl z-50">
                        <button onClick={() => setAba('history')} className={`flex-1 py-4 flex justify-center ${aba === 'history' ? `text-spark-${theme}` : 'opacity-20'}`}><Icone nome="History" /></button>
                        <button onClick={() => setAba('home')} className={`flex-[1.5] py-4 flex justify-center rounded-[2rem] ${aba === 'home' ? `spark-gradient-${theme} text-white` : 'opacity-20'}`}><Icone nome="Home" /></button>
                        <button onClick={() => setAba('config')} className={`flex-1 py-4 flex justify-center ${aba === 'config' ? `text-spark-${theme}` : 'opacity-20'}`}><Icone nome="Fingerprint" /></button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
