<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK - Ignition Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        spark: {
                            dark: '#050B18',
                            blue: '#0066FF',
                            cyan: '#00F0FF',
                            silver: '#E2E8F0'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050B18; color: #E2E8F0; overflow-x: hidden; }
        .neon-glow { box-shadow: 0 0 20px rgba(0, 240, 255, 0.6); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [gastoTotal, setGastoTotal] = useState(650);
            const [novoGasto, setNovoGasto] = useState('');
            const limite = 1200;
            
            // Cálculo da porcentagem seguindo a ordem do Senhor: (Gasto / Limite) * 100
            const porcentagem = Math.min(Math.round((gastoTotal / limite) * 100), 100);

            const adicionarGasto = (e) => {
                e.preventDefault();
                if (novoGasto > 0) {
                    setGastoTotal(prev => prev + parseFloat(novoGasto));
                    setNovoGasto('');
                }
            };

            return (
                <div className="min-h-screen p-6 md:p-12 font-sans max-w-6xl mx-auto">
                    {/* Header com Logos do Senhor */}
                    <header className="flex flex-col mb-12 animate-fadeIn">
                        <div className="flex items-center gap-6">
                            <img src="assets/logo.png" alt="S" className="w-20 h-20 object-contain drop-shadow-[0_0_10px_rgba(0,102,255,0.5)]" />
                            <img src="assets/texto-spark.png" alt="SPARK" className="h-12 object-contain" />
                        </div>
                        <p className="text-spark-blue text-[10px] uppercase tracking-[0.5em] mt-4 font-black ml-2 opacity-80">
                            High Performance Finance
                        </p>
                    </header>

                    <main className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Coluna do Monitor (Dashboard) */}
                        <div className="lg:col-span-2 space-y-8">
                            <div className="glass border border-white/10 p-10 rounded-[2.5rem] relative overflow-hidden">
                                <h2 className="text-xs text-spark-blue font-black uppercase tracking-widest mb-8">Status do Tanque / Consumo Mensal</h2>
                                
                                <div className="flex justify-between items-end mb-4">
                                    <div>
                                        <span className="text-white/40 text-xs uppercase font-bold">Total Acumulado</span>
                                        <p className="text-5xl font-black text-white mt-1">R$ {gastoTotal.toLocaleString('pt-BR')}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-spark-cyan font-mono text-3xl font-bold italic">{porcentagem}%</p>
                                    </div>
                                </div>
                                
                                <div className="w-full h-5 bg-white/5 rounded-full mt-6 p-[3px] border border-white/10">
                                    <div 
                                        className="h-full bg-gradient-to-r from-spark-blue to-spark-cyan rounded-full transition-all duration-700 ease-out neon-glow"
                                        style={{ width: `${porcentagem}%` }}
                                    ></div>
                                </div>
                                
                                <div className="flex justify-between mt-6 text-[10px] text-white/20 uppercase font-black">
                                    <span>Sistema Ativo</span>
                                    <span>Limite de Segurança: R$ {limite}</span>
                                </div>
                            </div>
                        </div>

                        {/* Coluna de Comandos (Input) */}
                        <div className="space-y-6">
                            <div className="glass border border-spark-blue/20 p-8 rounded-[2rem]">
                                <h3 className="text-spark-cyan text-xs font-black uppercase mb-6 tracking-widest">Injetar Novo Gasto</h3>
                                <form onSubmit={adicionarGasto} className="space-y-4">
                                    <input 
                                        type="number" 
                                        value={novoGasto}
                                        onChange={(e) => setNovoGasto(e.target.value)}
                                        placeholder="Valor R$"
                                        className="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-spark-cyan transition-colors font-bold"
                                    />
                                    <button 
                                        type="submit"
                                        className="w-full bg-spark-blue hover:bg-spark-cyan text-white hover:text-spark-dark font-black py-4 rounded-xl transition-all uppercase text-xs tracking-[0.2em]"
                                    >
                                        Confirmar Ignição
                                    </button>
                                </form>
                            </div>
                            
                            <div className="p-6 border border-white/5 rounded-[2rem] opacity-50">
                                <p className="text-[10px] leading-relaxed uppercase font-bold text-white/40">
                                    Mestre, os dados inseridos são temporários nesta versão. O SPARK está pronto para operação.
                                </p>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
