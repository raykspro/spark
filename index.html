<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK - Mastery Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { spark: { dark: '#020617', blue: '#0066FF', cyan: '#00F0FF', green: '#10B981', gold: '#FBBF24' } } } }
        }
    </script>
    <style>
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark .glass { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255, 255, 255, 0.08); }
        .light .glass { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0, 0, 0, 0.05); }
        .spark-gradient { background: linear-gradient(135deg, #0066FF 0%, #00F0FF 100%); }
        .btn-active:active { transform: scale(0.92); filter: brightness(1.2); }
        .tab-transition { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .spark-scrollbar::-webkit-scrollbar { height: 0px; width: 0px; background: transparent; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-spark-dark text-slate-900 dark:text-slate-100 min-h-screen pb-32 select-none overflow-x-hidden">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icone = ({ nome, className = "w-6 h-6" }) => {
            const icones = {
                History: <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" />,
                Home: <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />,
                Stats: <path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5V5h-5v13zm6 0h5v-13h-5v13z" />,
                Trash: <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />,
                Alert: <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icones[nome] || icones.Home}</svg>;
        };

        function App() {
            const [transacoes, setTransacoes] = useState(() => JSON.parse(localStorage.getItem('spark_db_v6')) || []);
            const [metas, setMetas] = useState(() => JSON.parse(localStorage.getItem('spark_metas')) || { Geral: 2000, Alimentação: 500, Lazer: 300, Fatura: 1000, Transporte: 200, Saúde: 200, Investimento: 500 });
            const [objetivos, setObjetivos] = useState(() => JSON.parse(localStorage.getItem('spark_objetivos')) || []);
            const [contasFixas, setContasFixas] = useState(() => JSON.parse(localStorage.getItem('spark_fixas')) || []);
            const [aba, setAba] = useState('home'); 
            const [valor, setValor] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [nota, setNota] = useState('');

            useEffect(() => { localStorage.setItem('spark_db_v6', JSON.stringify(transacoes)); }, [transacoes]);
            useEffect(() => { localStorage.setItem('spark_fixas', JSON.stringify(contasFixas)); }, [contasFixas]);

            const lancar = (tipo, vOverride, catOverride, notaOverride) => {
                const v = vOverride || valor;
                if (!v) return;
                const cat = catOverride || categoria;
                const nt = notaOverride || nota;
                const nova = { id: Date.now(), valor: parseFloat(v), tipo, categoria: cat, nota: nt || `Operação ${cat}`, timestamp: Date.now(), data: new Date().toLocaleDateString('pt-BR') };
                setTransacoes([nova, ...transacoes]);
                if(!vOverride) { setValor(''); setNota(''); }
            };

            const deletar = (id) => {
                if(confirm("Deseja remover este registro, Senhor?")) setTransacoes(transacoes.filter(t => t.id !== id));
            };

            const stats = useMemo(() => {
                const hoje = new Date();
                const doMes = transacoes.filter(t => new Date(t.timestamp).getMonth() === hoje.getMonth());
                const totalSaidas = doMes.filter(t => t.tipo === 'saida').reduce((acc, t) => acc + t.valor, 0);
                const porCategoria = {};
                doMes.filter(t => t.tipo === 'saida').forEach(t => { porCategoria[t.categoria] = (porCategoria[t.categoria] || 0) + t.valor; });
                return { totalSaidas, porCategoria };
            }, [transacoes]);

            const sparkInsight = useMemo(() => {
                const perc = (stats.totalSaidas / metas.Geral) * 100;
                if (perc > 90) return "Mestre, o capital está no limite crítico. Recomendo cautela nas próximas operações.";
                if (perc > 50) return "Operações estáveis, mas o consumo setorial de Lazer está acima da média.";
                return "Excelente gestão, Senhor. O teto de gastos está preservado.";
            }, [stats, metas]);

            const pendenciasFixas = useMemo(() => {
                const hoje = new Date();
                return contasFixas.filter(fixa => !transacoes.some(t => t.nota.includes(`[FIXA] ${fixa.nome}`) && new Date(t.timestamp).getMonth() === hoje.getMonth()));
            }, [contasFixas, transacoes]);

            const saldoReal = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc - t.valor, 0);

            return (
                <div className="p-4 max-w-2xl mx-auto">
                    {/* Header Premium */}
                    <div className="flex justify-between items-center mb-8 pt-4">
                        <div className="flex gap-4 items-center">
                            <div className="w-12 h-12 bg-spark-blue rounded-2xl flex items-center justify-center font-black italic text-white shadow-lg text-2xl">S</div>
                            <div>
                                <p className="text-[10px] opacity-40 uppercase font-black tracking-widest">Saldo do Mestre</p>
                                <p className="text-2xl font-black italic text-spark-green">R$ {saldoReal.toLocaleString('pt-BR')}</p>
                            </div>
                        </div>
                        <button onClick={() => setAba('config')} className="glass p-4 rounded-2xl btn-active opacity-60 text-xl">⚙️</button>
                    </div>

                    {aba === 'home' && (
                        <div className="tab-transition">
                            {/* Widget de Contas Fixas (Se houver pendência) */}
                            {pendenciasFixas.length > 0 && (
                                <div className="mb-6 flex gap-4 overflow-x-auto pb-2 spark-scrollbar">
                                    {pendenciasFixas.map(conta => (
                                        <div key={conta.id} className="glass p-5 rounded-[2rem] min-w-[220px] border-l-4 border-l-spark-gold">
                                            <p className="text-[10px] font-black uppercase opacity-40 mb-1 italic">Vence dia {conta.dia}</p>
                                            <p className="font-black mb-3">{conta.nome}</p>
                                            <button onClick={() => lancar('saida', conta.valor, 'Fatura', `[FIXA] ${conta.nome}`)} className="w-full py-2 bg-spark-blue text-white rounded-xl text-[10px] font-black uppercase btn-active italic">Liquidado</button>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* Cartão de Consumo Principal */}
                            <div className="glass rounded-[3rem] p-10 mb-8 text-center shadow-xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-white/5"></div>
                                <h3 className="text-spark-blue text-[10px] font-black uppercase tracking-widest mb-2 italic opacity-60">Operações do Mês</h3>
                                <p className="text-6xl font-black italic tracking-tighter mb-6">R$ {stats.totalSaidas.toLocaleString('pt-BR')}</p>
                                <div className="h-3 w-full bg-slate-200 dark:bg-white/10 rounded-full p-[2px]">
                                    <div className="h-full spark-gradient rounded-full" style={{ width: `${Math.min((stats.totalSaidas/metas.Geral)*100, 100)}%` }}></div>
                                </div>
                            </div>

                            {/* Teclado de Lançamento */}
                            <div className="glass rounded-[2.5rem] p-8 mb-8 shadow-2xl">
                                <input type="number" inputMode="decimal" value={valor} onChange={(e) => setValor(e.target.value)} placeholder="0.00" className="w-full bg-transparent text-center text-7xl font-black outline-none mb-4 tracking-tighter"/>
                                <input type="text" value={nota} onChange={(e) => setNota(e.target.value)} placeholder="Título da Operação..." className="w-full bg-slate-100 dark:bg-white/5 rounded-2xl p-4 mb-8 text-center text-sm font-bold outline-none"/>
                                
                                <div className="flex gap-2 overflow-x-auto pb-6 mb-8 spark-scrollbar">
                                    {Object.keys(metas).filter(k => k !== 'Geral').map(cat => (
                                        <button key={cat} onClick={() => setCategoria(cat)} className={`px-6 py-4 rounded-2xl text-[10px] font-black uppercase flex-shrink-0 btn-active ${categoria === cat ? 'bg-spark-blue text-white shadow-lg' : 'bg-slate-100 dark:bg-white/5 opacity-40'}`}>{cat}</button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => lancar('saida')} className="bg-spark-blue text-white py-6 rounded-3xl font-black uppercase text-xs btn-active shadow-xl">Debitar</button>
                                    <button onClick={() => lancar('entrada')} className="border-2 border-spark-green text-spark-green py-6 rounded-3xl font-black uppercase text-xs btn-active">Aportar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {aba === 'history' && (
                        <div className="tab-transition space-y-4">
                            <h2 className="text-xl font-black uppercase italic opacity-40 ml-4 mb-6">Extrato Detalhado</h2>
                            {transacoes.map(t => (
                                <div key={t.id} className="glass p-6 rounded-[2rem] flex justify-between items-center group">
                                    <div className="flex gap-4 items-center">
                                        <div className={`w-2 h-10 rounded-full ${t.tipo === 'entrada' ? 'bg-spark-green' : 'bg-red-500'}`}></div>
                                        <div>
                                            <p className="font-black text-sm italic">{t.nota}</p>
                                            <p className="text-[10px] font-bold uppercase opacity-30">{t.data} • {t.categoria}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <p className={`font-black italic ${t.tipo === 'entrada' ? 'text-spark-green' : 'text-slate-400'}`}>
                                            {t.tipo === 'entrada' ? '+' : '-'} {t.valor.toLocaleString('pt-BR')}
                                        </p>
                                        <button onClick={() => deletar(t.id)} className="opacity-0 group-hover:opacity-100 text-red-500"><Icone nome="Trash" className="w-5 h-5"/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {aba === 'stats' && (
                        <div className="tab-transition space-y-6">
                            {/* Relatório de IA - Spark Insight */}
                            <div className="glass p-8 rounded-[3rem] border-none shadow-xl bg-gradient-to-br from-spark-blue/10 to-transparent">
                                <div className="flex gap-3 items-center mb-4">
                                    <Icone nome="Alert" className="text-spark-cyan w-5 h-5" />
                                    <h3 className="text-[10px] font-black uppercase tracking-widest italic opacity-60">Spark Insight</h3>
                                </div>
                                <p className="text-sm font-bold leading-relaxed italic">"{sparkInsight}"</p>
                            </div>

                            {/* Dashboard Visual */}
                            <div className="glass p-8 rounded-[3rem] shadow-xl">
                                <h3 className="text-[10px] font-black uppercase tracking-widest mb-8 italic opacity-60">Análise de Fluxo</h3>
                                <div className="space-y-6">
                                    {Object.entries(stats.porCategoria).map(([cat, val]) => (
                                        <div key={cat}>
                                            <div className="flex justify-between text-[10px] font-black uppercase mb-2 italic">
                                                <span>{cat}</span>
                                                <span className="opacity-40">R$ {val.toLocaleString()}</span>
                                            </div>
                                            <div className="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                                                <div className="h-full bg-spark-blue rounded-full shadow-[0_0_10px_rgba(0,102,255,0.4)]" style={{ width: `${(val/stats.totalSaidas)*100}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {aba === 'config' && (
                        <div className="tab-transition space-y-6 pb-20">
                            <div className="flex justify-between items-center px-4">
                                <h2 className="text-xl font-black uppercase italic opacity-40">Contas Fixas</h2>
                                <button onClick={() => {
                                    const nome = prompt("Nome da Conta:");
                                    const valor = prompt("Valor:");
                                    const dia = prompt("Dia (1-31):");
                                    if(nome && valor && dia) setContasFixas([...contasFixas, { id: Date.now(), nome, valor: parseFloat(valor), dia }]);
                                }} className="bg-spark-blue text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase btn-active">Adicionar</button>
                            </div>
                            {contasFixas.map(fixa => (
                                <div key={fixa.id} className="glass p-6 rounded-[2rem] flex justify-between items-center">
                                    <div>
                                        <p className="font-black italic">{fixa.nome}</p>
                                        <p className="text-[10px] font-bold opacity-30">Todo dia {fixa.dia} • R$ {fixa.valor}</p>
                                    </div>
                                    <button onClick={() => setContasFixas(contasFixas.filter(f => f.id !== fixa.id))} className="text-red-500 font-black text-xs">Excluir</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* DOCK DE COMANDO CORRIGIDO (Mestre) */}
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-[3rem] p-3 flex justify-between items-center shadow-2xl z-50 border border-white/10">
                        {/* Ícone da Esquerda: Extrato */}
                        <button onClick={() => setAba('history')} className={`flex-1 py-4 flex justify-center rounded-[2.5rem] ${aba === 'history' ? 'bg-spark-blue/20 text-spark-blue' : 'opacity-30'}`}>
                            <Icone nome="History" />
                        </button>
                        
                        {/* Ícone Central: Home (Lançamentos) */}
                        <div className="flex-[1.5] px-2">
                            <button onClick={() => setAba('home')} className={`w-full py-4 flex justify-center rounded-[2rem] shadow-lg ${aba === 'home' ? 'spark-gradient text-white' : 'glass opacity-60'}`}>
                                <Icone nome="Home" />
                            </button>
                        </div>
                        
                        {/* Ícone da Direita: Stats (CORRIGIDO) */}
                        <button onClick={() => setAba('stats')} className={`flex-1 py-4 flex justify-center rounded-[2.5rem] ${aba === 'stats' ? 'bg-spark-blue/20 text-spark-blue' : 'opacity-30'}`}>
                            <Icone nome="Stats" />
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
