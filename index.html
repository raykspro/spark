<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPARK - OMNI VAULT v3.5 | MASTER EDITION</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent-color: #0066FF; 
            --bg-deep: #020617; 
            --bg-card: rgba(15, 23, 42, 0.6);
            --text-main: #f1f5f9;
            --danger: #ef4444;
            --success: #10b981;
        }

        /* RESET & BASE */
        * { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
            box-sizing: border-box;
        }

        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            margin: 0; 
            min-height: 100vh; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* UTILITÁRIOS DE VIDRO */
        .glass { 
            backdrop-filter: blur(30px) saturate(200%); 
            background: var(--bg-card); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .glass-dark {
            backdrop-filter: blur(40px);
            background: rgba(0, 0, 0, 0.85);
        }

        .accent-bg { background-color: var(--accent-color) !important; }
        .accent-text { color: var(--accent-color) !important; }
        .accent-border { border-color: var(--accent-color) !important; }
        
        .shadow-spark { 
            box-shadow: 0 20px 50px -15px var(--accent-color); 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* ANIMAÇÕES MASTER */
        @keyframes masterFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.33); }
            80%, 100% { opacity: 0; }
        }

        .animate-master { 
            animation: masterFadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .category-pill {
            flex: 0 0 auto;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
// --- COMPONENTE AVATAR ---
        const Avatar = ({ photo, name, size = "12", onClick, className = "" }) => (
            <div onClick={onClick} className={`w-${size} h-${size} rounded-full flex items-center justify-center border-2 border-white/20 shadow-xl overflow-hidden glass relative group cursor-pointer active:scale-90 ${className}`}>
                <img 
                    src={photo || `https://ui-avatars.com/api/?name=${name}&background=0066FF&color=fff&bold=true&size=512`} 
                    className="w-full h-full object-cover transition-all duration-700 group-hover:scale-125" 
                    alt="Avatar"
                    onError={(e) => { e.target.src = `https://ui-avatars.com/api/?name=${name}&background=0066FF&color=fff`; }}
                />
            </div>
        );

        // --- COMPONENTE PIE CHART ---
        const PieChart = ({ data, colors }) => {
            const total = Object.values(data).reduce((a, b) => a + b, 0);
            let cumulativePercent = 0;
            const slices = Object.entries(data).map(([key, value]) => {
                if (value <= 0) return null;
                const percent = value / total;
                const [startX, startY] = [Math.cos(2 * Math.PI * cumulativePercent), Math.sin(2 * Math.PI * cumulativePercent)];
                cumulativePercent += percent;
                const [endX, endY] = [Math.cos(2 * Math.PI * cumulativePercent), Math.sin(2 * Math.PI * cumulativePercent)];
                return <path key={key} d={`M ${startX} ${startY} A 1 1 0 ${percent > 0.5 ? 1 : 0} 1 ${endX} ${endY} L 0 0`} fill={colors[key]} className="hover:opacity-80 transition-all" />;
            });
            return (
                <div className="relative w-full h-full flex items-center justify-center">
                    <svg viewBox="-1 -1 2 2" className="w-full h-full -rotate-90">
                        {total === 0 ? <circle cx="0" cy="0" r="0.95" fill="rgba(255,255,255,0.05)" /> : slices}
                        <circle cx="0" cy="0" r="0.8" fill="rgba(2, 6, 23, 1)" />
                    </svg>
                    <div className="absolute inset-0 flex flex-col items-center justify-center text-center">
                        <span className="text-[10px] font-bold text-blue-500">{(total > 0 ? (total/1000).toFixed(1) + 'k' : '0')}</span>
                    </div>
                </div>
            );
        };

        function App() {
            const [isLocked, setIsLocked] = useState(true);
            const [pin, setPin] = useState('');
            const [masterName, setMasterName] = useState(() => localStorage.getItem('spark_name') || 'MESTRE');
            const [masterPhoto, setMasterPhoto] = useState(() => localStorage.getItem('spark_photo') || '');
            const [tab, setTab] = useState('home');
            const [transacoes, setTransacoes] = useState(() => JSON.parse(localStorage.getItem('spark_data_v4')) || []);
            const [tetoGasto] = useState(3500);
            const [valor, setValor] = useState('');
            const [nota, setNota] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');

            const catColors = { Alimentação: "#FF6B6B", Lazer: "#4DABF7", Fatura: "#FAB005", Saúde: "#51CF66", Transporte: "#845EF7", Investimento: "#20C997" };

            const stats = useMemo(() => {
                const total = transacoes.reduce((acc, t) => acc + t.valor, 0);
                const porCat = transacoes.reduce((acc, t) => { acc[t.categoria] = (acc[t.categoria] || 0) + t.valor; return acc; }, {});
                return { total, porCat, restante: Math.max(tetoGasto - total, 0) };
            }, [transacoes, tetoGasto]);

            if (isLocked) {
                return (
                    <div className="fixed inset-0 flex items-center justify-center bg-slate-950 z-[100] px-10">
                        <div className="text-center p-10 glass rounded-[3rem] w-full max-w-sm border border-white/10">
                            <Avatar name={masterName} photo={masterPhoto} size="24" className="mx-auto mb-6" />
                            <input 
                                type="password" inputMode="numeric" value={pin} 
                                onChange={(e) => { setPin(e.target.value); if(e.target.value === '1234') setIsLocked(false); }}
                                placeholder="PIN" className="w-full bg-white/5 border border-white/10 rounded-2xl py-4 text-center text-2xl text-white outline-none"
                            />
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto w-full px-6 pt-10 pb-32 min-h-screen text-white">
                    <header className="flex justify-between items-center mb-10">
                        <div>
                            <h1 className="text-[10px] opacity-30 uppercase tracking-widest">Spark Omni</h1>
                            <p className="text-2xl font-bold">Olá, <span className="text-blue-500">{masterName}</span></p>
                        </div>
                        <Avatar name={masterName} photo={masterPhoto} size="12" onClick={() => setTab('config')} />
                    </header>

                    {tab === 'home' && (
                        <div className="space-y-6">
                            <div className="glass rounded-[2.5rem] p-8 border border-white/5">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] opacity-40 uppercase mb-1">Gasto Total</p>
                                        <h2 className="text-4xl font-black">R$ {stats.total.toFixed(2)}</h2>
                                    </div>
                                    <div className="w-20 h-20"><PieChart data={stats.porCat} colors={catColors} /></div>
                                </div>
                            </div>

                            <div className="glass rounded-[2.5rem] p-8 border border-white/5 space-y-4">
                                <p className="text-[10px] opacity-40 uppercase text-center">Novo Registro</p>
                                <input 
                                    type="number" value={valor} onChange={e => setValor(e.target.value)} 
                                    placeholder="0,00" className="w-full bg-transparent text-4xl font-bold text-center outline-none"
                                />
                                <input 
                                    type="text" value={nota} onChange={e => setNota(e.target.value)} 
                                    placeholder="Descrição..." className="w-full bg-white/5 p-3 rounded-xl text-center outline-none"
                                />
                                <button 
                                    onClick={() => {
                                        if(!valor) return;
                                        setTransacoes([{ id: Date.now(), valor: parseFloat(valor), categoria, nota: nota || 'Gasto', data: new Date().toLocaleDateString() }, ...transacoes]);
                                        setValor(''); setNota('');
                                    }}
                                    className="w-full bg-blue-600 py-4 rounded-2xl font-bold active:scale-95 transition-all"
                                >
                                    REGISTRAR
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // --- COMPONENTE GRÁFICO PIE RADIAL ---
        const PieChart = ({ data, colors }) => {
            const total = Object.values(data).reduce((a, b) => a + b, 0);
            let cumulativePercent = 0;

            const slices = Object.entries(data).map(([key, value]) => {
                if (value <= 0) return null;
                const percent = value / total;
                const [startX, startY] = [Math.cos(2 * Math.PI * cumulativePercent), Math.sin(2 * Math.PI * cumulativePercent)];
                cumulativePercent += percent;
                const [endX, endY] = [Math.cos(2 * Math.PI * cumulativePercent), Math.sin(2 * Math.PI * cumulativePercent)];
                const largeArcFlag = percent > 0.5 ? 1 : 0;

                return (
                    <path 
                        key={key} 
                        d={`M ${startX} ${startY} A 1 1 0 ${largeArcFlag} 1 ${endX} ${endY} L 0 0`} 
                        fill={colors[key]} 
                        className="hover:opacity-80 transition-all cursor-help"
                    />
                );
            });

            return (
                <div className="relative w-full h-full flex items-center justify-center">
                    <svg viewBox="-1 -1 2 2" className="w-full h-full -rotate-90 drop-shadow-2xl">
                        {total === 0 ? <circle cx="0" cy="0" r="0.95" fill="rgba(255,255,255,0.03)" /> : slices}
                        <circle cx="0" cy="0" r="0.8" fill="rgba(2, 6, 23, 1)" />
                    </svg>
                    <div className="absolute inset-0 flex flex-col items-center justify-center text-center">
                        <span className="text-[8px] font-black opacity-30 uppercase tracking-tighter leading-none">Fluxo</span>
                        <span className="text-[10px] font-bold accent-text">{(total > 0 ? (total/1000).toFixed(1) + 'k' : '0')}</span>
                    </div>
                </div>
            );
        };

        function App() {
            // --- ESTADOS DE SEGURANÇA E PREFERÊNCIAS ---
            const [isLocked, setIsLocked] = useState(true);
            const [pin, setPin] = useState('');
            const [masterName, setMasterName] = useState(() => localStorage.getItem('spark_name') || 'MESTRE');
            const [masterPhoto, setMasterPhoto] = useState(() => localStorage.getItem('spark_photo') || '');
            const [accent, setAccent] = useState(() => localStorage.getItem('spark_accent') || '#0066FF');
            const [tab, setTab] = useState('home');
            const [showPinError, setShowPinError] = useState(false);
            
            const [transacoes, setTransacoes] = useState(() => {
                const saved = localStorage.getItem('spark_data_v4');
                return saved ? JSON.parse(saved) : [];
            });
            const [tetoGasto, setTetoGasto] = useState(() => parseFloat(localStorage.getItem('spark_teto')) || 3500);
            
            const [valor, setValor] = useState('');
            const [nota, setNota] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [busca, setBusca] = useState('');
            const [isExporting, setIsExporting] = useState(false);

            const catColors = { 
                Alimentação: "#FF6B6B", Lazer: "#4DABF7", Fatura: "#FAB005", 
                Saúde: "#51CF66", Transporte: "#845EF7", Investimento: "#20C997" 
            };

            useEffect(() => {
                localStorage.setItem('spark_data_v4', JSON.stringify(transacoes));
                localStorage.setItem('spark_name', masterName);
                localStorage.setItem('spark_photo', masterPhoto);
                localStorage.setItem('spark_accent', accent);
                localStorage.setItem('spark_teto', tetoGasto.toString());
                document.documentElement.style.setProperty('--accent-color', accent);
            }, [transacoes, masterName, masterPhoto, accent, tetoGasto]);

            const stats = useMemo(() => {
                const total = transacoes.reduce((acc, t) => acc + t.valor, 0);
                const porCat = transacoes.reduce((acc, t) => {
                    acc[t.categoria] = (acc[t.categoria] || 0) + t.valor;
                    return acc;
                }, {});
                return { 
                    total, porCat, 
                    progresso: Math.min((total / tetoGasto) * 100, 100), 
                    restante: Math.max(tetoGasto - total, 0) 
                };
            }, [transacoes, tetoGasto]);

            const handlePinInput = (value) => {
                setPin(value);
                if (value === '1234') { 
                    setIsLocked(false); 
                    setShowPinError(false);
                } else if (value.length >= 4) {
                    setShowPinError(true);
                    setTimeout(() => { setPin(''); setShowPinError(false); }, 600);
                }
            };

            if (isLocked) {
                return (
                    <div className="fixed inset-0 flex items-center justify-center glass-dark z-[100] animate-master px-10">
                        <div className={`text-center p-12 glass rounded-[4rem] border-white/10 shadow-spark w-full max-w-sm transition-transform ${showPinError ? 'translate-x-2 bg-red-500/10' : ''}`}>
                            <div className="mb-8 relative inline-block">
                                <Avatar name={masterName} photo={masterPhoto} size="32" className="mx-auto" />
                                <div className="absolute -bottom-2 -right-2 bg-blue-600 rounded-full p-2 border-4 border-[#020617]">
                                    <Icon name="Lock" className="w-5 h-5 text-white" />
                                </div>
                            </div>
                            <h2 className="text-3xl font-black mb-1 uppercase tracking-tighter text-white">Vault de Segurança</h2>
                            <p className="text-[10px] opacity-40 mb-10 uppercase tracking-[0.4em] font-bold text-white">Identidade: {masterName}</p>
                            <input 
                                type="password" inputMode="numeric" value={pin} 
                                onChange={(e) => handlePinInput(e.target.value)}
                                placeholder="••••" 
                                className="w-full bg-white/5 border-2 border-white/5 rounded-3xl py-6 text-center text-4xl tracking-[0.8em] text-white focus:outline-none"
                            />
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto w-full px-6 pt-12 pb-32 animate-master min-h-screen flex flex-col">
                    <header className="flex justify-between items-center mb-10 group">
                        <div className="transform transition-transform group-hover:translate-x-2">
                            <h1 className="text-[10px] font-black opacity-30 uppercase tracking-[0.4em] mb-1 text-white">Omni Vault v3.5</h1>
                            <p className="text-3xl font-black tracking-tighter leading-none text-white">
                                Olá, <span className="accent-text">{masterName}</span>
                            </p>
                        </div>
                        <Avatar name={masterName} photo={masterPhoto} size="14" onClick={() => setTab('config')} />
                    </header>

                    <main className="flex-1">
                        {tab === 'home' && (
                            <div className="space-y-8 animate-master">
                                <div className="glass rounded-[3.5rem] p-10 relative overflow-hidden shadow-spark border-white/5">
                                    <div className="flex justify-between items-start">
                                        <div className="z-10 text-white">
                                            <p className="text-[10px] font-bold opacity-40 uppercase tracking-[0.2em] mb-2">Gasto Consolidado</p>
                                            <h2 className="text-5xl font-black tracking-tighter mb-1">
                                                <span className="text-2xl mr-1 opacity-50 font-medium font-sans">R$</span>
                                                {stats.total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                            </h2>
                                            <p className={`text-[10px] font-bold uppercase tracking-widest ${stats.restante > 0 ? 'text-green-500' : 'text-red-500'}`}>
                                                {stats.restante > 0 ? `Disponível: R$ ${stats.restante.toFixed(2)}` : 'Limite Excedido'}
                                            </p>
                                        </div>
                                        <div className="w-28 h-28 shrink-0">
                                            <PieChart data={stats.porCat} colors={catColors} />
                                        </div>
                                    </div>
                                </div>

                                    {/* BARRA DE PROGRESSO PREMIUM */}
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-end px-1">
                                            <span className="text-[9px] font-black opacity-30 uppercase">Eficiência de Gasto</span>
                                            <span className="text-[10px] font-bold accent-text">{stats.progresso.toFixed(1)}%</span>
                                        </div>
                                        <div className="w-full bg-white/5 h-4 rounded-full overflow-hidden p-[2px] border border-white/5">
                                            <div 
                                                className="accent-bg h-full rounded-full transition-all duration-1000 ease-out relative" 
                                                style={{ width: `${stats.progresso}%` }}
                                            >
                                                <div className="absolute inset-0 bg-white/20 animate-pulse"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* FORMULÁRIO DE ENTRADA ROBUSTO */}
                                <div className="glass rounded-[3.5rem] p-8 space-y-6 border-white/5 shadow-2xl relative">
                                    <div className="absolute inset-x-0 -top-4 flex justify-center">
                                        <div className="glass px-6 py-2 rounded-2xl border-white/10">
                                            <span className="text-[9px] font-black uppercase tracking-widest opacity-60">Novo Lançamento</span>
                                        </div>
                                    </div>

                                    <div className="space-y-2 pt-4">
                                        <div className="flex items-center justify-center gap-2">
                                            <span className="text-2xl font-bold opacity-20">R$</span>
                                            <input 
                                                type="text" 
                                                inputMode="decimal"
                                                value={valor} 
                                                onChange={e => setValor(e.target.value)} 
                                                placeholder="0,00" 
                                                className="w-full bg-transparent text-6xl font-black text-center focus:accent-text transition-colors placeholder:opacity-5" 
                                            />
                                        </div>
                                        <input 
                                            type="text" 
                                            value={nota} 
                                            onChange={e => setNota(e.target.value)} 
                                            placeholder="Descreva este gasto, Mestre..." 
                                            className="w-full bg-white/5 border-none rounded-3xl py-5 px-8 text-center text-sm font-medium focus:bg-white/10 transition-all placeholder:opacity-20" 
                                        />
                                    </div>

                                    {/* SELETOR DE CATEGORIAS (SCROLL HORIZONTAL) */}
                                    <div className="flex gap-3 overflow-x-auto no-scrollbar py-4 px-2 -mx-4 mask-fade">
                                        {Object.keys(catColors).map(cat => (
                                            <button 
                                                key={cat} 
                                                onClick={() => setCategoria(cat)} 
                                                className={`category-pill flex items-center gap-2 whitespace-nowrap transition-all ${categoria === cat ? 'accent-bg text-white shadow-lg scale-105' : 'glass opacity-30 hover:opacity-60'}`}
                                            >
                                                <Icon name={cat} className="w-4 h-4" />
                                                {cat}
                                            </button>
                                        ))}
                                    </div>

                                    <button 
                                        onClick={addTransacao} 
                                        className="w-full accent-bg text-white py-6 rounded-[2.5rem] font-black uppercase tracking-[0.2em] shadow-spark active:scale-95 active:brightness-90 transition-all flex items-center justify-center gap-3 group"
                                    >
                                        <span>Confirmar no Vault</span>
                                        <Icon name="Home" className="w-5 h-5 group-hover:rotate-12 transition-transform" />
                                    </button>
                                </div>
                                
                                {/* DICA RÁPIDA MASTER */}
                                <div className="px-8 flex items-center gap-4 opacity-20 hover:opacity-40 transition-opacity">
                                    <div className="h-[1px] flex-1 bg-white"></div>
                                    <p className="text-[8px] font-black uppercase tracking-[0.3em]">Spark Omni-Intelligence v3.5</p>
                                    <div className="h-[1px] flex-1 bg-white"></div>
                                </div>
                            </div>
                        )}
                        {/* ABA DE HISTÓRICO AVANÇADO */}
                        {tab === 'history' && (
                            <div className="space-y-8 animate-master pb-20">
                                <div className="flex justify-between items-end px-2">
                                    <div>
                                        <h2 className="text-3xl font-black uppercase tracking-tighter">Registros</h2>
                                        <p className="text-[10px] font-bold opacity-30 uppercase tracking-[0.2em]">Cofre de Transações</p>
                                    </div>
                                    <button 
                                        onClick={exportPDF} 
                                        disabled={isExporting}
                                        className={`glass p-5 rounded-[2rem] accent-text border-white/10 active:scale-90 transition-all ${isExporting ? 'opacity-20 animate-pulse' : 'shadow-lg'}`}
                                    >
                                        <Icon name="PDF" className="w-6 h-6" />
                                    </button>
                                </div>

                                {/* BARRA DE BUSCA E FILTRO MASTER */}
                                <div className="relative group">
                                    <div className="absolute inset-y-0 left-6 flex items-center pointer-events-none opacity-20 group-focus-within:opacity-100 group-focus-within:accent-text transition-opacity">
                                        <Icon name="Search" className="w-5 h-5" />
                                    </div>
                                    <input 
                                        value={busca} 
                                        onChange={e => setBusca(e.target.value)} 
                                        placeholder="Pesquisar por nota ou valor..." 
                                        className="w-full glass rounded-[2.5rem] py-6 pl-16 pr-8 text-sm font-medium border-white/5 focus:border-white/20 focus:bg-white/10 transition-all placeholder:opacity-20" 
                                    />
                                </div>

                                {/* LISTA DE TRANSAÇÕES DINÂMICA */}
                                <div className="space-y-4">
                                    {transacoes.length === 0 ? (
                                        <div className="glass rounded-[3rem] p-16 text-center border-dashed border-white/10">
                                            <div className="opacity-10 mb-4 flex justify-center"><Icon name="History" className="w-16 h-16" /></div>
                                            <p className="text-xs font-bold opacity-20 uppercase tracking-widest">Nenhum registro no vault, Mestre.</p>
                                        </div>
                                    ) : (
                                        transacoes
                                            .filter(t => 
                                                t.nota.toLowerCase().includes(busca.toLowerCase()) || 
                                                t.categoria.toLowerCase().includes(busca.toLowerCase()) ||
                                                t.valor.toString().includes(busca)
                                            )
                                            .map(t => (
                                                <div 
                                                    key={t.id} 
                                                    className="glass rounded-[2.5rem] p-6 flex items-center gap-5 border-white/5 group hover:border-white/20 hover:bg-white/[0.03] transition-all"
                                                >
                                                    <div 
                                                        className="w-14 h-14 rounded-[1.5rem] flex items-center justify-center shrink-0 shadow-inner relative overflow-hidden" 
                                                        style={{ backgroundColor: `${catColors[t.categoria]}15`, color: catColors[t.categoria] }}
                                                    >
                                                        <Icon name={t.categoria} className="w-7 h-7 relative z-10" />
                                                        <div className="absolute inset-0 opacity-10 animate-pulse" style={{ backgroundColor: catColors[t.categoria] }}></div>
                                                    </div>
                                                    
                                                    <div className="flex-1 min-w-0">
                                                        <p className="font-bold text-sm tracking-tight truncate pr-2">{t.nota}</p>
                                                        <div className="flex items-center gap-2 mt-1">
                                                            <span className="text-[9px] font-black opacity-30 uppercase tracking-tighter">{t.data}</span>
                                                            <span className="w-1 h-1 rounded-full bg-white/10"></span>
                                                            <span className="text-[9px] font-extrabold uppercase" style={{ color: catColors[t.categoria] }}>{t.categoria}</span>
                                                        </div>
                                                    </div>

                                                    <div className="text-right shrink-0">
                                                        <p className="font-black text-base tracking-tighter">
                                                            <span className="text-[10px] opacity-30 mr-1 font-medium">R$</span>
                                                            {t.valor.toFixed(2)}
                                                        </p>
                                                        <button 
                                                            onClick={() => deleteTransacao(t.id)} 
                                                            className="mt-1 opacity-0 group-hover:opacity-100 text-red-500/50 hover:text-red-500 transition-all p-1"
                                                        >
                                                            <Icon name="Delete" className="w-4 h-4" />
                                                        </button>
                                                    </div>
                                                </div>
                                            ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ABA DE CONFIGURAÇÕES MASTER (AJUSTES TÉCNICOS) */}
                        {tab === 'config' && (
                            <div className="space-y-8 animate-master pb-20">
                                <div className="px-2">
                                    <h2 className="text-3xl font-black uppercase tracking-tighter">Painel Master</h2>
                                    <p className="text-[10px] font-bold opacity-30 uppercase tracking-[0.2em]">Configurações de Identidade</p>
                                </div>

                                <div className="glass rounded-[3.5rem] p-10 space-y-8 border-white/5 shadow-2xl relative overflow-hidden">
                                    <div className="absolute -bottom-20 -left-20 w-60 h-60 accent-bg opacity-5 blur-[100px] pointer-events-none"></div>

                                    {/* PERSONALIZAÇÃO DE PERFIL */}
                                    <div className="space-y-6">
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-40 uppercase ml-4 tracking-widest">Assinatura do Mestre</label>
                                            <input 
                                                value={masterName} 
                                                onChange={e => setMasterName(e.target.value.toUpperCase())} 
                                                className="w-full glass rounded-3xl py-5 px-8 text-sm font-bold border-white/10 focus:accent-border transition-all" 
                                            />
                                        </div>

                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-40 uppercase ml-4 tracking-widest">URL da Imagem Master</label>
                                            <input 
                                                value={masterPhoto} 
                                                onChange={e => setMasterPhoto(e.target.value)} 
                                                placeholder="https://imagem.jpg"
                                                className="w-full glass rounded-3xl py-5 px-8 text-xs font-medium border-white/10 focus:accent-border transition-all" 
                                            />
                                        </div>
                                    </div>

                                    {/* AJUSTES FINANCEIROS */}
                                    <div className="grid grid-cols-1 gap-6 pt-4 border-t border-white/5">
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-40 uppercase ml-4 tracking-widest">Teto de Gastos (R$)</label>
                                            <input 
                                                type="number" 
                                                value={tetoGasto} 
                                                onChange={e => setTetoGasto(parseFloat(e.target.value) || 0)} 
                                                className="w-full glass rounded-3xl py-5 px-8 text-sm font-black accent-text border-white/10" 
                                            />
                                        </div>
                                        
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-40 uppercase ml-4 tracking-widest">Cor de Acento (Hex)</label>
                                            <div className="flex gap-4">
                                                <input 
                                                    value={accent} 
                                                    onChange={e => setAccent(e.target.value)} 
                                                    className="flex-1 glass rounded-3xl py-5 px-8 text-xs font-mono border-white/10 uppercase" 
                                                />
                                                <div className="w-16 h-16 rounded-3xl shadow-lg border-4 border-white/10" style={{ backgroundColor: accent }}></div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* AÇÕES CRÍTICAS */}
                                    <div className="pt-8 space-y-4">
                                        <button 
                                            onClick={() => { if(confirm("Mestre, deseja realmente bloquear o Vault agora?")) setIsLocked(true); }}
                                            className="w-full glass bg-white/5 py-5 rounded-[2rem] text-[10px] font-black uppercase tracking-[0.2em] hover:bg-white/10 transition-all flex items-center justify-center gap-3"
                                        >
                                            <Icon name="Lock" className="w-4 h-4" />
                                            Trancar Vault
                                        </button>
                                        
                                        <button 
                                            onClick={() => { if(confirm("ALERTA: Isso apagará todos os dados financeiros. Prosseguir, Senhor?")) { localStorage.clear(); location.reload(); } }}
                                            className="w-full bg-red-500/10 text-red-500 py-5 rounded-[2rem] text-[10px] font-black uppercase tracking-[0.2em] hover:bg-red-500 hover:text-white transition-all shadow-lg shadow-red-500/10"
                                        >
                                            Hard Reset Sistema
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    {/* BARRA DE NAVEGAÇÃO OMNI (TAB BAR) */}
                    <nav className="fixed bottom-10 left-6 right-6 glass rounded-[3.5rem] p-4 flex items-center justify-around shadow-2xl z-50 border-white/10 animate-master">
                        <button 
                            onClick={() => setTab('history')} 
                            className={`flex-1 flex flex-col items-center justify-center py-4 rounded-[2.5rem] transition-all duration-500 ${tab === 'history' ? 'accent-text bg-white/5 shadow-inner scale-110' : 'opacity-20 text-white hover:opacity-50'}`}
                        >
                            <Icon name="History" className="w-7 h-7" />
                            <span className={`text-[8px] font-black mt-1 uppercase tracking-widest ${tab === 'history' ? 'block' : 'hidden'}`}>Logs</span>
                        </button>
                        
                        {/* BOTÃO CENTRAL HOME (DESTAQUE) */}
                        <button 
                            onClick={() => setTab('home')} 
                            className={`flex-[1.6] flex flex-col items-center justify-center py-6 rounded-[3rem] relative transition-all duration-700 ${tab === 'home' ? 'accent-bg text-white shadow-spark scale-110 -translate-y-6' : 'opacity-20 text-white hover:opacity-50'}`}
                        >
                            <Icon name="Home" className="w-9 h-9" />
                            {tab === 'home' && (
                                <span className="absolute -top-1 -right-1 w-5 h-5 bg-white rounded-full animate-ping opacity-30"></span>
                            )}
                        </button>
                        
                        <button 
                            onClick={() => setTab('config')} 
                            className={`flex-1 flex flex-col items-center justify-center py-4 rounded-[2.5rem] transition-all duration-500 ${tab === 'config' ? 'accent-text bg-white/5 shadow-inner scale-110' : 'opacity-20 text-white hover:opacity-50'}`}
                        >
                            <Icon name="Settings" className="w-7 h-7" />
                            <span className={`text-[8px] font-black mt-1 uppercase tracking-widest ${tab === 'config' ? 'block' : 'hidden'}`}>Master</span>
                        </button>
                    </nav>

                    {/* OVERLAY DE EXPORTAÇÃO (FEEDBACK VISUAL) */}
                    {isExporting && (
                        <div className="fixed inset-0 glass-dark z-[200] flex flex-col items-center justify-center animate-pulse">
                            <div className="w-20 h-20 border-4 border-white/10 border-t-blue-600 rounded-full animate-spin mb-6"></div>
                            <p className="text-[10px] font-black uppercase tracking-[0.5em]">Gerando Relatório PDF...</p>
                        </div>
                    )}
                </div>
            );
        }

        // --- INICIALIZAÇÃO DO NÚCLEO REACT ---
        // Garante que o DOM esteja pronto antes de renderizar a interface do Senhor.
        try {
            const rootElement = document.getElementById('root');
            if (!rootElement) throw new Error("Erro Crítico: Container 'root' não encontrado.");
            
            const root = ReactDOM.createRoot(rootElement);
            root.render(
                <React.StrictMode>
                    <App />
                </React.StrictMode>
            );
            
            console.log("SPARK OMNI VAULT v3.5: Operacional, Mestre.");
        } catch (err) {
            document.body.innerHTML = `<div style="color:white; padding:50px; font-family:sans-serif;">
                <h2>Erro de Inicialização</h2><p>${err.message}</p></div>`;
        }
    </script>
</body>
</html>
