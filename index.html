<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { spark: { dark: '#050B18', blue: '#0066FF', cyan: '#00F0FF', silver: '#E2E8F0' } } } } }
    </script>
</head>
<body class="bg-[#050B18] text-[#E2E8F0]">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        function App() {
            const [gastoTotal, setGastoTotal] = useState(650);
            const [input, setInput] = useState('');
            const limite = 1200;
            const porcentagem = Math.min(Math.round((gastoTotal / limite) * 100), 100);

            return (
                <div className="min-h-screen p-8 max-w-4xl mx-auto">
                    <header className="mb-12">
                        <div className="flex items-center gap-4">
                            <img src="assets/logo.png" className="w-16 h-16 object-contain" />
                            <img src="assets/texto-spark.png" className="h-8 object-contain" />
                        </div>
                    </header>
                    <div className="bg-white/5 border border-white/10 p-10 rounded-[2.5rem] shadow-2xl mb-8">
                        <h2 className="text-spark-blue text-xs font-black uppercase tracking-widest mb-6">Consumo Mensal</h2>
                        <div className="flex justify-between items-end mb-4">
                            <p className="text-5xl font-bold">R$ {gastoTotal}</p>
                            <p className="text-spark-cyan font-mono text-2xl">{porcentagem}%</p>
                        </div>
                        <div className="w-full h-4 bg-white/10 rounded-full overflow-hidden">
                            <div className="h-full bg-gradient-to-r from-spark-blue to-spark-cyan shadow-[0_0_15px_#00F0FF]" style={{width: `${porcentagem}%`}}></div>
                        </div>
                    </div>
                    <div className="bg-white/5 p-8 rounded-[2rem] border border-spark-blue/20">
                        <input type="number" value={input} onChange={(e)=>setInput(e.target.value)} placeholder="Valor do Gasto" className="w-full bg-transparent border-b border-white/20 p-4 mb-4 outline-none focus:border-spark-cyan" />
                        <button onClick={()=>{setGastoTotal(gastoTotal + Number(input)); setInput('')}} className="w-full bg-spark-blue py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-spark-cyan hover:text-dark transition-all">Injetar Gasto</button>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
