<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK - Omni Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { spark: { dark: '#020617', blue: '#0066FF', cyan: '#00F0FF', green: '#10B981', gold: '#FBBF24', red: '#EF4444' } } } }
        }
    </script>
    <style>
        :root { --accent-color: #0066FF; --bg-custom: #020617; }
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background-color: var(--bg-custom) !important; }
        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .accent-bg { background-color: var(--accent-color) !important; }
        .accent-text { color: var(--accent-color) !important; }
        .accent-border { border-color: var(--accent-color) !important; }
        .btn-active:active { transform: scale(0.95); filter: brightness(1.2); }
        .tab-transition { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Remove setas do input number */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .spark-scrollbar::-webkit-scrollbar { height: 0px; width: 0px; background: transparent; }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-32 select-none overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icone = ({ nome, className = "w-6 h-6" }) => {
            const icones = {
                History: <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" />,
                Home: <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />,
                Stats: <path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5V5h-5v13zm6 0h5v-13h-5v13z" />,
                Fingerprint: <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />,
                Swap: <path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icones[nome] || icones.Home}</svg>;
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [aba, setAba] = useState('home');
            
            // Personalização
            const [accentColor, setAccentColor] = useState(() => localStorage.getItem('spark_accent') || '#0066FF');
            const [bgColor, setBgColor] = useState(() => localStorage.getItem('spark_bg') || '#020617');
            
            const [transacoes, setTransacoes] = useState(() => JSON.parse(localStorage.getItem('spark_db_v6')) || []);
            const [cartoes, setCartoes] = useState(() => JSON.parse(localStorage.getItem('spark_cartoes')) || []);
            const [metas, setMetas] = useState(() => JSON.parse(localStorage.getItem('spark_metas')) || { Geral: 2000, Alimentação: 500, Lazer: 300, Fatura: 1000 });
            
            const [valor, setValor] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [nota, setNota] = useState('');
            const [dashOrder, setDashOrder] = useState(() => JSON.parse(localStorage.getItem('spark_order')) || ['fluxo', 'lancamento', 'cartoes']);

            useEffect(() => {
                localStorage.setItem('spark_db_v6', JSON.stringify(transacoes));
                localStorage.setItem('spark_cartoes', JSON.stringify(cartoes));
                localStorage.setItem('spark_accent', accentColor);
                localStorage.setItem('spark_bg', bgColor);
                localStorage.setItem('spark_order', JSON.stringify(dashOrder));
                
                document.documentElement.style.setProperty('--accent-color', accentColor);
                document.documentElement.style.setProperty('--bg-custom', bgColor);
            }, [transacoes, cartoes, accentColor, bgColor, dashOrder]);

            const saldoReal = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc - t.valor, 0);
            const stats = useMemo(() => {
                const totalSaidas = transacoes.filter(t => t.tipo === 'saida').reduce((acc, t) => acc + t.valor, 0);
                return { totalSaidas };
            }, [transacoes]);

            const lancar = (tipo) => {
                if (!valor) return;
                const nova = { 
                    id: Date.now(), 
                    valor: parseFloat(valor), 
                    tipo, 
                    categoria, 
                    nota: nota || `Lançamento ${categoria}`, 
                    data: new Date().toLocaleDateString('pt-BR') 
                };
                setTransacoes([nova, ...transacoes]);
                setValor(''); setNota('');
            };

            const swapOrder = (index) => {
                const newOrder = [...dashOrder];
                const next = (index + 1) % newOrder.length;
                [newOrder[index], newOrder[next]] = [newOrder[next], newOrder[index]];
                setDashOrder(newOrder);
            };

            if (!isAuthenticated) {
                return (
                    <div className="fixed inset-0 flex flex-col items-center justify-center p-8 z-[100] tab-transition">
                        <div className="w-24 h-24 rounded-[2.5rem] flex items-center justify-center font-black italic text-white shadow-2xl text-5xl mb-12 accent-bg">S</div>
                        <h1 className="text-2xl font-black italic mb-12">SPARK VAULT</h1>
                        <button onClick={() => setIsAuthenticated(true)} className="glass w-full max-w-xs py-8 rounded-[2rem] flex flex-col items-center gap-4 btn-active">
                            <Icone nome="Fingerprint" className="w-12 h-12 accent-text" />
                            <span className="text-[10px] font-black uppercase tracking-widest opacity-40">Entrar como Mestre</span>
                        </button>
                    </div>
                );
            }

            return (
                <div className="p-4 max-w-2xl mx-auto">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-8 pt-4">
                        <div className="flex gap-4 items-center">
                            <div className="w-12 h-12 rounded-2xl flex items-center justify-center font-black italic text-white shadow-lg text-2xl accent-bg">S</div>
                            <div>
                                <p className="text-[10px] opacity-40 uppercase font-black italic">Patrimônio</p>
                                <p className="text-2xl font-black italic text-spark-green">R$ {saldoReal.toLocaleString('pt-BR')}</p>
                            </div>
                        </div>
                        <button onClick={() => setAba('config')} className="glass p-4 rounded-2xl btn-active opacity-60 italic text-xs font-black">⚙️</button>
                    </div>

                    {aba === 'home' && (
                        <div className="tab-transition space-y-6">
                            {dashOrder.map((item, index) => {
                                if(item === 'fluxo') return (
                                    <div key="fluxo" className="glass rounded-[3rem] p-10 text-center relative overflow-hidden">
                                        <button onClick={() => swapOrder(index)} className="absolute top-6 right-8 opacity-20"><Icone nome="Swap" className="w-4 h-4"/></button>
                                        <h3 className="text-[10px] font-black uppercase mb-2 opacity-60">Fluxo de Saída</h3>
                                        <p className="text-5xl font-black italic tracking-tighter mb-6">R$ {stats.totalSaidas.toLocaleString('pt-BR')}</p>
                                        <div className="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                                            <div className="h-full accent-bg" style={{ width: `${Math.min((stats.totalSaidas/metas.Geral)*100, 100)}%` }}></div>
                                        </div>
                                    </div>
                                );
                                if(item === 'lancamento') return (
                                    <div key="lancamento" className="glass rounded-[2.5rem] p-8 relative space-y-4">
                                        <button onClick={() => swapOrder(index)} className="absolute top-6 right-8 opacity-20"><Icone nome="Swap" className="w-4 h-4"/></button>
                                        
                                        <div className="text-center">
                                            <input type="number" inputMode="decimal" value={valor} onChange={(e) => setValor(e.target.value)} placeholder="0.00" className="w-full bg-transparent text-center text-6xl font-black outline-none mb-2 accent-text"/>
                                            <input type="text" value={nota} onChange={(e) => setNota(e.target.value)} placeholder="O que o Senhor comprou?" className="w-full bg-transparent text-center text-sm font-bold opacity-40 outline-none"/>
                                        </div>

                                        <div className="relative">
                                            <select value={categoria} onChange={(e) => setCategoria(e.target.value)} className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-xs font-black uppercase outline-none appearance-none text-center">
                                                {Object.keys(metas).map(cat => <option key={cat} value={cat} className="bg-slate-900">{cat}</option>)}
                                            </select>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <button onClick={() => lancar('saida')} className="py-6 rounded-3xl font-black uppercase text-xs btn-active bg-spark-red text-white">Despesa</button>
                                            <button onClick={() => lancar('entrada')} className="py-6 rounded-3xl font-black uppercase text-xs btn-active border-2 border-spark-green text-spark-green">Receita</button>
                                        </div>
                                    </div>
                                );
                                if(item === 'cartoes') return (
                                    <div key="cartoes" className="glass p-8 rounded-[2.5rem] relative">
                                        <button onClick={() => swapOrder(index)} className="absolute top-6 right-8 opacity-20"><Icone nome="Swap" className="w-4 h-4"/></button>
                                        <h2 className="text-xs font-black uppercase opacity-40 mb-4">Cartões Virtuais</h2>
                                        <div className="space-y-4">
                                            {cartoes.length > 0 ? cartoes.map(c => (
                                                <div key={c.id} className="flex justify-between items-center border-b border-white/5 pb-2">
                                                    <span className="font-bold italic">{c.nome}</span>
                                                    <span className="text-xs opacity-60">R$ {c.limite}</span>
                                                </div>
                                            )) : <p className="text-xs opacity-20">Nenhum cartão registrado, Senhor.</p>}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {aba === 'history' && (
                        <div className="tab-transition space-y-3">
                            <h2 className="text-xs font-black uppercase opacity-40 ml-4 mb-4">Registros Recentes</h2>
                            {transacoes.map(t => (
                                <div key={t.id} className="glass p-5 rounded-[1.5rem] flex justify-between items-center">
                                    <div className="flex gap-4 items-center">
                                        <div className={`w-1 h-8 rounded-full ${t.tipo === 'entrada' ? 'bg-spark-green' : 'bg-spark-red'}`}></div>
                                        <div>
                                            <p className="font-black text-sm italic leading-tight">{t.nota}</p>
                                            <p className="text-[9px] opacity-30 font-bold uppercase">{t.data} • {t.categoria}</p>
                                        </div>
                                    </div>
                                    <p className={`font-black italic ${t.tipo === 'entrada' ? 'text-spark-green' : 'opacity-60'}`}>
                                        {t.tipo === 'entrada' ? '+' : '-'} {t.valor.toLocaleString('pt-BR')}
                                    </p>
                                </div>
                            ))}
                        </div>
                    )}

                    {aba === 'config' && (
                        <div className="tab-transition space-y-8">
                            <div className="glass p-8 rounded-[2.5rem] space-y-6">
                                <h2 className="text-xs font-black uppercase opacity-40 text-center">Laboratório Cromático</h2>
                                
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center">
                                        <label className="text-xs font-black uppercase">Cor de Destaque</label>
                                        <input type="color" value={accentColor} onChange={(e) => setAccentColor(e.target.value)} className="w-12 h-12 rounded-lg bg-transparent cursor-pointer"/>
                                    </div>
                                    
                                    <div className="flex justify-between items-center">
                                        <label className="text-xs font-black uppercase">Cor do Fundo</label>
                                        <input type="color" value={bgColor} onChange={(e) => setBgColor(e.target.value)} className="w-12 h-12 rounded-lg bg-transparent cursor-pointer"/>
                                    </div>
                                </div>

                                <button onClick={() => {
                                    setAccentColor('#0066FF');
                                    setBgColor('#020617');
                                }} className="w-full py-3 text-[10px] font-black uppercase opacity-40">Resetar Estética</button>
                            </div>

                            <div className="glass p-8 rounded-[2.5rem] space-y-4">
                                <h2 className="text-xs font-black uppercase opacity-40 text-center">Dados do Cofre</h2>
                                <button onClick={() => {
                                    const data = JSON.stringify({transacoes, cartoes, metas, accentColor, bgColor});
                                    const blob = new Blob([data], {type: 'application/json'});
                                    const a = document.createElement('a');
                                    a.href = URL.createObjectURL(blob);
                                    a.download = 'spark_backup.json';
                                    a.click();
                                }} className="w-full bg-white/5 py-4 rounded-xl text-[10px] font-black uppercase btn-active">Exportar JSON</button>
                            </div>
                        </div>
                    )}

                    {/* Nav Bar */}
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-[3rem] p-3 flex justify-between items-center shadow-2xl z-50">
                        <button onClick={() => setAba('history')} className={`flex-1 py-4 flex justify-center ${aba === 'history' ? 'accent-text' : 'opacity-20'}`}><Icone nome="History" /></button>
                        <button onClick={() => setAba('home')} className={`flex-[1.5] py-4 flex justify-center rounded-[2rem] ${aba === 'home' ? 'accent-bg text-white' : 'opacity-20'}`}><Icone nome="Home" /></button>
                        <button onClick={() => setAba('config')} className={`flex-1 py-4 flex justify-center ${aba === 'config' ? 'accent-text' : 'opacity-20'}`}><Icone nome="Fingerprint" /></button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
