<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK - OMNI VAULT v4.8 | MASTER RECOVERY</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link id="dynamic-font" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #0066FF; 
            --bg-base: #010204; 
            --glass: rgba(15, 20, 30, 0.7);
            --border: rgba(255, 255, 255, 0.08);
        }

        /* TEMAS QUE ALTERAM FUNDO E ESTILO */
        .theme-cyber { --accent: #00f2ff; --bg-base: #050505; font-family: 'Orbitron', sans-serif; }
        .theme-blood { --accent: #ef4444; --bg-base: #0f0202; font-family: 'Inter', sans-serif; }
        .theme-forest { --accent: #10b981; --bg-base: #06120e; font-family: 'JetBrains Mono', monospace; }
        .theme-classic { --accent: #0066FF; --bg-base: #010204; font-family: 'Inter', sans-serif; }

        * { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-base); color: #f1f5f9; overflow-x: hidden; min-height: 100vh; }
        
        .panel-glass { backdrop-filter: blur(25px); background: var(--glass); border: 1px solid var(--border); }
        .accent-text { color: var(--accent); }
        .accent-bg { background-color: var(--accent); }
        .shadow-spark { box-shadow: 0 0 30px -10px var(--accent); }
        
        @keyframes masterFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: masterFade 0.6s ease-out forwards; }
        
        .pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--accent); transition: all 0.2s; }
        .pin-dot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); scale: 1.2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                Home: "M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z",
                History: "M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z",
                Settings: "M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58z",
                Audit: "M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z",
                Fingerprint: "M17.81 4.47c-.08 0-.16-.02-.23-.06C15.66 3.42 14 3 12.01 3c-1.98 0-3.86.47-5.57 1.41-.24.13-.54.04-.67-.2-.13-.24-.04-.55.2-.67C7.82 2.51 9.84 2 12.01 2c2.12 0 3.99.47 6.03 1.56.24.13.33.44.2.68-.1.15-.26.23-.43.23zm3.1 3.53c-.21 0-.41-.13-.47-.33-.28-.93-.78-1.77-1.44-2.51-.16-.18-.15-.46.03-.62.18-.16.46-.15.62.03.75.84 1.31 1.79 1.63 2.84.07.26-.08.52-.34.59-.01 0-.02 0-.03 0z"
            };
            return (
                <svg className={className} viewBox="0 0 24 24" fill="currentColor">
                    <path d={icons[name] || ""} />
                </svg>
            );
        };

        function App() {
            const [isLocked, setIsLocked] = useState(true);
            const [pin, setPin] = useState("");
            const [tab, setTab] = useState('home');
            const [theme, setTheme] = useState(localStorage.getItem('spark_th') || 'theme-classic');
            const [masterPhoto, setMasterPhoto] = useState(localStorage.getItem('spark_img') || '');
            const [transactions, setTransactions] = useState(JSON.parse(localStorage.getItem('spark_tx') || '[]'));
            const MASTER_PIN = "1234"; // Definição Padrão

            useEffect(() => {
                document.body.className = theme;
                localStorage.setItem('spark_th', theme);
            }, [theme]);

            useEffect(() => {
                if (pin.length === 4) {
                    if (pin === MASTER_PIN) {
                        setIsLocked(false);
                        setPin("");
                    } else {
                        alert("ACESSO NEGADO, SENHOR.");
                        setPin("");
                    }
                }
            }, [pin]);

            const stats = useMemo(() => {
                return transactions.reduce((acc, t) => t.type === 'in' ? acc + t.val : acc - t.val, 0);
            }, [transactions]);

            const exportPDF = () => {
                const doc = new jspdf.jsPDF();
                doc.setFontSize(22); doc.text("SPARK AUDIT REPORT", 20, 20);
                doc.setFontSize(12); doc.text(`SALDO ATUAL: R$ ${stats.toFixed(2)}`, 20, 30);
                transactions.forEach((t, i) => {
                    doc.text(`${t.date} - ${t.desc}: R$ ${t.val.toFixed(2)}`, 20, 45 + (i * 8));
                });
                doc.save('spark_report.pdf');
            };

            if (isLocked) {
                return (
                    <div className="fixed inset-0 flex flex-col items-center justify-center p-8 animate-in">
                        <div className="accent-text mb-8 animate-pulse">
                            <Icon name="Fingerprint" className="w-20 h-20" />
                        </div>
                        <h2 className="text-sm font-black tracking-[0.5em] uppercase mb-12 opacity-50">Vault Locked</h2>
                        <div className="flex gap-4 mb-16">
                            {[1, 2, 3, 4].map((_, i) => (
                                <div key={i} className={`pin-dot ${pin.length > i ? 'active' : ''}`}></div>
                            ))}
                        </div>
                        <div className="grid grid-cols-3 gap-6">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9, "C", 0, "OK"].map((n) => (
                                <button key={n} onClick={() => {
                                    if (n === "C") setPin("");
                                    else if (n === "OK") return;
                                    else if (pin.length < 4) setPin(p => p + n);
                                }} className="w-16 h-16 rounded-full panel-glass text-xl font-bold hover:accent-bg transition-all">
                                    {n}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6 pb-32 max-w-lg mx-auto animate-in">
                    <header className="flex justify-between items-center mb-12">
                        <div>
                            <h1 className="text-3xl font-black accent-text tracking-tighter">SPARK</h1>
                            <p className="text-[10px] font-bold opacity-30 tracking-widest uppercase">Master Control v4.8</p>
                        </div>
                        <div className="relative group">
                            <div className="w-14 h-14 rounded-full border-2 border-white/10 p-1 overflow-hidden shadow-spark">
                                <img src={masterPhoto || 'https://via.placeholder.com/150'} className="w-full h-full object-cover rounded-full grayscale group-hover:grayscale-0" />
                            </div>
                            <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" onChange={e => {
                                const r = new FileReader(); r.onload = () => { setMasterPhoto(r.result); localStorage.setItem('spark_img', r.result); }; r.readAsDataURL(e.target.files[0]);
                            }} />
                        </div>
                    </header>

                    {tab === 'home' && (
                        <div className="space-y-8">
                            <div className="panel-glass p-10 rounded-[2.5rem] text-center shadow-spark relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 accent-bg opacity-5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
                                <p className="text-[10px] font-black opacity-30 uppercase tracking-[0.4em] mb-2">Patrimônio Consolidado</p>
                                <h2 className="text-5xl font-black tracking-tighter">R$ {stats.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</h2>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => setTheme('theme-cyber')} className="panel-glass p-6 rounded-3xl text-xs font-black tracking-widest border-b-2 border-cyan-400">CYBER</button>
                                <button onClick={() => setTheme('theme-blood')} className="panel-glass p-6 rounded-3xl text-xs font-black tracking-widest border-b-2 border-red-500">BLOOD</button>
                                <button onClick={() => setTheme('theme-forest')} className="panel-glass p-6 rounded-3xl text-xs font-black tracking-widest border-b-2 border-emerald-500">FOREST</button>
                                <button onClick={() => setTheme('theme-classic')} className="panel-glass p-6 rounded-3xl text-xs font-black tracking-widest border-b-2 border-blue-600">CLASSIC</button>
                            </div>

                            <button onClick={exportPDF} className="w-full panel-glass p-6 rounded-[2rem] flex justify-between items-center group hover:accent-bg">
                                <span className="font-black text-xs uppercase tracking-widest">Extrair Relatório PDF</span>
                                <Icon name="Audit" className="w-6 h-6 group-hover:scale-125" />
                            </button>
                        </div>
                    )}

                    {tab === 'history' && (
                        <div className="space-y-4">
                            <h2 className="text-[10px] font-black opacity-30 uppercase tracking-widest mb-6 px-2">Histórico de Transações</h2>
                            {transactions.map(t => (
                                <div key={t.id} className="panel-glass p-5 rounded-3xl flex justify-between items-center">
                                    <div>
                                        <p className="text-xs font-black uppercase tracking-widest">{t.desc}</p>
                                        <p className="text-[9px] opacity-20 font-mono">{t.date}</p>
                                    </div>
                                    <p className={`font-black ${t.type === 'in' ? 'text-emerald-500' : 'text-white'}`}>
                                        {t.type === 'in' ? '+' : '-'} R$ {t.val.toFixed(2)}
                                    </p>
                                </div>
                            ))}
                        </div>
                    )}

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm panel-glass rounded-[3rem] p-3 flex justify-around items-center shadow-2xl">
                        <button onClick={() => setTab('history')} className={`p-4 rounded-full ${tab === 'history' ? 'accent-text bg-white/5' : 'opacity-20'}`}>
                            <Icon name="History" />
                        </button>
                        <button onClick={() => setTab('home')} className={`p-6 rounded-full accent-bg text-white shadow-spark -translate-y-6 scale-110`}>
                            <Icon name="Home" className="w-8 h-8" />
                        </button>
                        <button onClick={() => setIsLocked(true)} className={`p-4 rounded-full opacity-20`}>
                            <Icon name="Fingerprint" />
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
