<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK - OMNI VAULT v3.5 | MASTER EDITION</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent-color: #0066FF; 
            --bg-deep: #020617; 
            --bg-card: rgba(15, 23, 42, 0.6);
            --text-main: #f1f5f9;
        }

        * { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            margin: 0; 
            min-height: 100vh; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* EFEITOS DE CAMADA (GLASSMORPHISM) */
        .glass { 
            backdrop-filter: blur(25px) saturate(210%); 
            background: var(--bg-card); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .glass-dark {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .accent-bg { background-color: var(--accent-color) !important; }
        .accent-text { color: var(--accent-color) !important; }
        .accent-border { border-color: var(--accent-color) !important; }
        .shadow-spark { box-shadow: 0 15px 45px -10px var(--accent-color); }
        
        /* UTILITÁRIOS DE INTERFACE */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* ANIMAÇÕES CINEMATOGRÁFICAS */
        @keyframes masterFadeIn { 
            from { opacity: 0; transform: translateY(40px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .animate-master { animation: masterFadeIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        @keyframes pulseBorder {
            0% { border-color: rgba(255,255,255,0.1); }
            50% { border-color: var(--accent-color); }
            100% { border-color: rgba(255,255,255,0.1); }
        }
        .animate-pulse-border { animation: pulseBorder 3s infinite; }

        .input-hidden-spin { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- COMPONENTES DE ÍCONES (SISTEMA OMNI) ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const paths = {
                Home: <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>,
                History: <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>,
                Settings: <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>,
                Alimentação: <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>,
                Lazer: <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>,
                Saúde: <path d="M19 3H5c-1.1 0-1.99.9-1.99 2L3 19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/>,
                Transporte: <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/>,
                Fatura: <path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm10 0h2v2h-2zm-6-4h8v2h-8z"/>,
                Investimento: <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>,
                Delete: <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>,
                Lock: <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>,
                Search: <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{paths[name] || <circle cx="12" cy="12" r="10" />}</svg>;
        };

        const Avatar = ({ photo, name, size = "12" }) => (
            <div className={`w-${size} h-${size} rounded-full accent-bg flex items-center justify-center border-2 border-white/20 shadow-spark overflow-hidden glass relative group cursor-pointer`}>
                <img 
                    src={photo || `https://ui-avatars.com/api/?name=${name}&background=0066FF&color=fff&bold=true&size=512`} 
                    className="w-full h-full object-cover group-hover:scale-115 transition-all duration-500" 
                    alt="Master"
                />
            </div>
        );

        const PieChart = ({ data, colors }) => {
            const total = Object.values(data).reduce((a, b) => a + b, 0);
            let cumulativePercent = 0;

            const slices = Object.entries(data).map(([key, value]) => {
                if (value <= 0) return null;
                const percent = value / total;
                const x1 = Math.cos(2 * Math.PI * cumulativePercent);
                const y1 = Math.sin(2 * Math.PI * cumulativePercent);
                cumulativePercent += percent;
                const x2 = Math.cos(2 * Math.PI * cumulativePercent);
                const y2 = Math.sin(2 * Math.PI * cumulativePercent);
                const largeArcFlag = percent > 0.5 ? 1 : 0;
                return (
                    <path 
                        key={key} 
                        d={`M ${x1} ${y1} A 1 1 0 ${largeArcFlag} 1 ${x2} ${y2} L 0 0`} 
                        fill={colors[key]} 
                        className="hover:opacity-70 transition-opacity cursor-pointer"
                    />
                );
            });

            return (
                <svg viewBox="-1 -1 2 2" className="w-full h-full -rotate-90 drop-shadow-2xl">
                    {total === 0 ? (
                        <circle cx="0" cy="0" r="0.96" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" strokeWidth="0.01" />
                    ) : (
                        <>{slices}<circle cx="0" cy="0" r="0.78" fill="#020617" /></>
                    )}
                </svg>
            );
        };

        // --- NÚCLEO DO SISTEMA ---
        function App() {
            // ESTADOS DE SEGURANÇA E IDENTIDADE (EXPANDIDO)
            const [isLocked, setIsLocked] = useState(true);
            const [pin, setPin] = useState('');
            const [masterName, setMasterName] = useState(() => localStorage.getItem('spark_name') || 'MESTRE');
            const [masterPhoto, setMasterPhoto] = useState(() => localStorage.getItem('spark_photo') || '');
            const [accent, setAccent] = useState(() => localStorage.getItem('spark_accent') || '#0066FF');
            
            // ESTADOS DE DADOS (V3.5)
            const [tab, setTab] = useState('home');
            const [transacoes, setTransacoes] = useState(() => JSON.parse(localStorage.getItem('spark_data_v4')) || []);
            const [tetoGasto, setTetoGasto] = useState(() => parseFloat(localStorage.getItem('spark_teto')) || 3500);
            
            // ESTADOS DE INPUT E FILTRO
            const [valor, setValor] = useState('');
            const [nota, setNota] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [busca, setBusca] = useState('');

            const catColors = { 
                Alimentação: "#FF6B6B", Lazer: "#4DABF7", Fatura: "#FAB005", 
                Saúde: "#20C997", Transporte: "#BE4BDB", Investimento: "#51CF66" 
            };

            // PERSISTÊNCIA AUTOMÁTICA
            useEffect(() => {
                localStorage.setItem('spark_data_v4', JSON.stringify(transacoes));
                localStorage.setItem('spark_name', masterName);
                localStorage.setItem('spark_photo', masterPhoto);
                localStorage.setItem('spark_accent', accent);
                localStorage.setItem('spark_teto', tetoGasto);
                document.documentElement.style.setProperty('--accent-color', accent);
            }, [transacoes, masterName, masterPhoto, accent, tetoGasto]);

            // ENGINE DE ANALÍTICA (NÃO ALTERAR LÓGICA)
            const stats = useMemo(() => {
                const totalGanhos = transacoes.filter(t => t.tipo === 'entrada').reduce((acc, t) => acc + t.valor, 0);
                const totalGastos = transacoes.filter(t => t.tipo === 'saida').reduce((acc, t) => acc + t.valor, 0);
                const saldoGlobal = totalGanhos - totalGastos;
                
                const distribuicao = { Alimentação: 0, Lazer: 0, Fatura: 0, Saúde: 0, Transporte: 0, Investimento: 0 };
                transacoes.filter(t => t.tipo === 'saida').forEach(t => { 
                    if(distribuicao[t.categoria] !== undefined) distribuicao[t.categoria] += t.valor; 
                });

                const percentualTeto = (totalGastos / tetoGasto) * 100;

                return { totalGanhos, totalGastos, saldoGlobal, distribuicao, percentualTeto };
            }, [transacoes, tetoGasto]);

            // FILTRAGEM DE HISTÓRICO
            const historicoFiltrado = useMemo(() => {
                return transacoes.filter(t => 
                    t.nota.toLowerCase().includes(busca.toLowerCase()) || 
                    t.categoria.toLowerCase().includes(busca.toLowerCase())
                );
            }, [transacoes, busca]);

            // AÇÕES DE DADOS (EXPANDIDO)
            const registrarOperacao = (tipo) => {
                if (!valor || parseFloat(valor) <= 0) {
                    alert("Senhor, defina um valor válido.");
                    return;
                }
                const novaTransacao = {
                    id: `TX-${Date.now()}-${Math.random().toString(36).substr(2, 4)}`,
                    ts: Date.now(),
                    valor: parseFloat(valor),
                    tipo,
                    categoria,
                    nota: nota || (tipo === 'entrada' ? 'GANHO MESTRE' : 'GASTO MESTRE'),
                    data: new Date().toLocaleDateString('pt-BR'),
                    hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                };
                setTransacoes([novaTransacao, ...transacoes]);
                setValor('');
                setNota('');
            };

            const exportarBackupJSON = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(transacoes, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", `Spark_Vault_${masterName}_Backup.json`);
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const importarBackupJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsedData = JSON.parse(event.target.result);
                        if (Array.isArray(parsedData)) {
                            setTransacoes(parsedData);
                            alert("Sincronização Concluída, Senhor.");
                        }
                    } catch (err) { alert("Arquivo JSON corrompido."); }
                };
                reader.readAsText(file);
            };

            // --- TELA DE ACESSO RESTRICT ---
            if (isLocked) return (
                <div className="h-screen flex flex-col items-center justify-center p-10 space-y-16 animate-master">
                    <div className="relative group">
                        <div className="absolute -inset-1 accent-bg opacity-20 blur-2xl group-hover:opacity-40 transition-opacity"></div>
                        <Avatar photo={masterPhoto} name={masterName} size="48" />
                        <div className="absolute -bottom-2 -right-2 w-10 h-10 glass rounded-full flex items-center justify-center border border-white/10 shadow-2xl">
                            <Icon name="Lock" className="w-4 h-4 accent-text animate-pulse" />
                        </div>
                    </div>
                    
                    <div className="text-center space-y-3">
                        <h2 className="text-5xl font-black italic accent-text uppercase tracking-tighter">Spark Vault</h2>
                        <div className="flex items-center justify-center gap-3 opacity-20">
                            <div className="h-[1px] w-8 bg-white"></div>
                            <p className="text-[9px] font-black uppercase tracking-[0.6em]">Secure Protocol 3.5</p>
                            <div className="h-[1px] w-8 bg-white"></div>
                        </div>
                    </div>

                    <div className="w-full max-w-xs space-y-8">
                        <div className="relative">
                            <input 
                                type="password" 
                                value={pin} 
                                onChange={e => setPin(e.target.value)}
                                className="glass w-full py-9 rounded-[3rem] text-center text-5xl font-black tracking-[0.5em] outline-none border-2 border-transparent focus:accent-border shadow-inner"
                                placeholder="••••"
                                maxLength={4}
                            />
                        </div>
                        <button 
                            onClick={() => pin === '1234' ? setIsLocked(false) : alert("PIN INCORRETO, SENHOR.")}
                            className="w-full py-7 accent-bg rounded-[3rem] font-black uppercase text-[11px] tracking-[0.5em] shadow-spark active:scale-95 hover:brightness-110"
                        >
                            Verificar Token
                        </button>
                    </div>
                </div>
            );

            // --- INTERFACE PRINCIPAL ---
            return (
                <div className="max-w-md mx-auto p-6 pb-48 animate-master min-h-screen flex flex-col">
                    <header className="flex justify-between items-center mb-12 mt-6">
                        <div className="space-y-2">
                            <p className="text-[11px] font-black opacity-30 uppercase tracking-[0.2em] ml-1">Capital Disponível</p>
                            <h1 className="text-5xl font-black italic accent-text flex items-baseline gap-2 tracking-tighter">
                                <span className="text-xl not-italic opacity-40 font-black">R$</span>
                                {stats.saldoGlobal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                            </h1>
                        </div>
                        <div onClick={() => setTab('perfil')} className="active:scale-90 transition-transform">
                            <Avatar photo={masterPhoto} name={masterName} size="16" />
                        </div>
                    </header>

                    {/* VISTA HOME */}
                    {tab === 'home' && (
                        <div className="space-y-10">
                            {/* MONITOR DE TETO DE GASTOS */}
                            <div className="glass p-8 rounded-[3.5rem] space-y-5 relative overflow-hidden group border border-white/5 shadow-2xl">
                                <div className="flex justify-between items-end relative z-10">
                                    <div>
                                        <p className="text-[10px] font-black opacity-30 uppercase tracking-widest mb-1">Budget Mensal</p>
                                        <p className="text-2xl font-black italic">R$ {tetoGasto.toLocaleString('pt-BR')}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className={`text-2xl font-black italic tracking-tighter ${stats.percentualTeto > 90 ? 'text-rose-500 animate-pulse' : 'accent-text'}`}>
                                            {stats.percentualTeto.toFixed(1)}%
                                        </p>
                                    </div>
                                </div>
                                
                                <div className="w-full h-4 bg-black/40 rounded-full overflow-hidden border border-white/5 relative z-10 p-[2px]">
                                    <div 
                                        className="h-full rounded-full transition-all duration-[1500ms] cubic-bezier(0.22, 1, 0.36, 1) shadow-spark" 
                                        style={{ 
                                            width: `${Math.min(stats.percentualTeto, 100)}%`, 
                                            backgroundColor: stats.percentualTeto > 90 ? '#f43f5e' : accent 
                                        }}
                                    ></div>
                                </div>

                                <div className="flex justify-between text-[9px] font-black uppercase opacity-20 relative z-10 tracking-[0.2em]">
                                    <span>Gasto Atual: R$ {stats.totalGastos.toFixed(2)}</span>
                                    <span>{stats.totalGastos > tetoGasto ? "EXCEDIDO" : `Restante: R$ ${(tetoGasto - stats.totalGastos).toFixed(2)}`}</span>
                                </div>
                                <div className="absolute -top-10 -right-10 w-40 h-40 accent-bg opacity-[0.04] blur-[60px] group-hover:opacity-[0.08]"></div>
                            </div>

                            {/* GRÁFICO DE DISTRIBUIÇÃO */}
                            <div className="glass p-9 rounded-[4rem] flex items-center justify-between shadow-2xl relative border-white/5">
                                <div className="w-36 h-36 z-10 drop-shadow-[0_0_20px_rgba(0,0,0,0.5)]"><PieChart data={stats.distuicao} data={stats.distribuicao} colors={catColors} /></div>
                                <div className="text-right z-10 space-y-1">
                                    <p className="text-[10px] font-black opacity-30 uppercase tracking-widest">Saídas do Mês</p>
                                    <h3 className="text-3xl font-black italic text-rose-500 tracking-tighter">R$ {stats.totalGastos.toFixed(2)}</h3>
                                    <div className="pt-4">
                                        <span className="text-[9px] font-black uppercase opacity-10 tracking-[0.3em] block">Ganhos: R$ {stats.totalGanhos.toFixed(2)}</span>
                                    </div>
                                </div>
                                <div className="absolute -bottom-10 -left-10 w-40 h-40 accent-bg opacity-[0.05] blur-[100px]"></div>
                            </div>

                            {/* TERMINAL DE LANÇAMENTO */}
                            <div className="glass rounded-[4.5rem] p-12 space-y-12 border-t border-white/10 shadow-spark/5">
                                <div className="text-center relative">
                                    <span className="absolute -left-3 top-2 text-3xl font-black opacity-10 accent-text italic">R$</span>
                                    <input 
                                        type="number" 
                                        placeholder="0,00" 
                                        value={valor} 
                                        onChange={e => setValor(e.target.value)} 
                                        className="bg-transparent border-none outline-none text-center w-full text-8xl font-black accent-text placeholder:opacity-5 tracking-tighter input-hidden-spin" 
                                    />
                                    <input 
                                        type="text" 
                                        placeholder="TÍTULO DA OPERAÇÃO..." 
                                        value={nota} 
                                        onChange={e => setNota(e.target.value)} 
                                        className="bg-transparent border-none outline-none text-center w-full text-[11px] uppercase font-black opacity-25 mt-6 tracking-[0.4em]" 
                                    />
                                </div>

                                <div className="grid grid-cols-3 gap-5">
                                    {Object.keys(catColors).map(cat => (
                                        <button 
                                            key={cat} 
                                            onClick={() => setCategoria(cat)} 
                                            className={`py-6 rounded-[2.5rem] flex flex-col items-center gap-3 transition-all border ${categoria === cat ? 'accent-bg text-white shadow-spark scale-110 border-transparent' : 'glass-dark opacity-30 border-white/5 hover:opacity-100 hover:scale-105'}`}
                                        >
                                            <Icon name={cat} className="w-5 h-5" />
                                            <span className="text-[8px] font-black uppercase tracking-tighter">{cat}</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-2 gap-6 pt-2">
                                    <button 
                                        onClick={() => registrarOperacao('saida')} 
                                        className="py-9 rounded-[3rem] bg-rose-600 font-black uppercase text-[13px] tracking-[0.4em] shadow-xl active:scale-95 hover:brightness-110 transition-all"
                                    >
                                        Gasto
                                    </button>
                                    <button 
                                        onClick={() => registrarOperacao('entrada')} 
                                        className="py-9 rounded-[3rem] border-2 border-emerald-500 text-emerald-500 font-black uppercase text-[13px] tracking-[0.4em] hover:bg-emerald-500/10 active:scale-95 transition-all"
                                    >
                                        Ganho
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VISTA HISTÓRICO */}
                    {tab === 'history' && (
                        <div className="space-y-8 animate-master">
                            <div className="glass p-7 rounded-[3rem] flex items-center gap-6 border-white/5 shadow-inner">
                                <Icon name="Search" className="w-5 h-5 opacity-20 ml-2" />
                                <input 
                                    type="text" 
                                    placeholder="FILTRAR VAULT..." 
                                    value={busca} 
                                    onChange={e => setBusca(e.target.value)} 
                                    className="bg-transparent flex-1 outline-none text-[11px] font-black uppercase tracking-[0.3em] placeholder:opacity-20" 
                                />
                            </div>

                            <div className="space-y-5 max-h-[65vh] overflow-y-auto no-scrollbar pb-24 px-1">
                                {historicoFiltrado.length > 0 ? historicoFiltrado.map(t => (
                                    <div key={t.id} className="glass p-8 rounded-[3.5rem] flex justify-between items-center group relative overflow-hidden border border-white/5 hover:border-white/20">
                                        <div className="flex items-center gap-7 relative z-10">
                                            <div className="p-5 rounded-2xl glass-dark shadow-2xl" style={{color: catColors[t.categoria]}}>
                                                <Icon name={t.categoria} className="w-7 h-7"/>
                                            </div>
                                            <div>
                                                <h4 className="text-[15px] font-black uppercase tracking-tight mb-1">{t.nota}</h4>
                                                <p className="text-[10px] opacity-30 font-bold uppercase tracking-widest">{t.data} • {t.hora} • {t.categoria}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-6 relative z-10">
                                            <span className={`text-xl font-black italic tracking-tighter ${t.tipo === 'entrada' ? 'text-emerald-400' : 'text-white'}`}>
                                                {t.tipo === 'entrada' ? '+' : '-'} R$ {t.valor.toFixed(2)}
                                            </span>
                                            <button onClick={() => setTransacoes(transacoes.filter(x => x.id !== t.id))} className="text-rose-500/20 hover:text-rose-500 p-2 transition-colors">
                                                <Icon name="Delete" className="w-5 h-5"/>
                                            </button>
                                        </div>
                                        {t.tipo === 'entrada' && <div className="absolute left-0 top-0 bottom-0 w-2 bg-emerald-500/40"></div>}
                                    </div>
                                )) : (
                                    <div className="py-48 text-center opacity-5">
                                        <Icon name="History" className="w-24 h-24 mx-auto mb-6" />
                                        <p className="font-black uppercase tracking-[1.2em] text-sm">Empty Vault</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* VISTA CONFIGURAÇÕES */}
                    {tab === 'config' && (
                        <div className="space-y-10 animate-master">
                            <div className="glass p-12 rounded-[4.5rem] space-y-14 border-white/10 shadow-2xl">
                                <section className="space-y-10">
                                    <div className="flex items-center gap-5"><div className="w-3 h-8 accent-bg rounded-full shadow-spark"></div><h3 className="text-[14px] font-black uppercase tracking-[0.4em]">Parâmetros</h3></div>
                                    
                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black opacity-30 uppercase ml-3 tracking-[0.3em]">Limite de Gastos Mensal (R$)</p>
                                        <input 
                                            type="number" 
                                            value={tetoGasto} 
                                            onChange={e=>setTetoGasto(parseFloat(e.target.value) || 0)} 
                                            className="w-full glass p-7 rounded-[2.5rem] font-black text-2xl text-center outline-none accent-text border-white/5 focus:accent-border shadow-inner" 
                                        />
                                    </div>

                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black opacity-30 uppercase ml-3 tracking-[0.3em]">Identity Photo (URL)</p>
                                        <input 
                                            type="text" 
                                            value={masterPhoto} 
                                            placeholder="https://image-link.com/photo.jpg"
                                            onChange={e=>setMasterPhoto(e.target.value)} 
                                            className="w-full glass p-7 rounded-[2.5rem] font-black text-[11px] outline-none border-white/5 focus:accent-border opacity-50" 
                                        />
                                    </div>

                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black opacity-30 uppercase ml-3 tracking-[0.3em]">Cromatismo Omni</p>
                                        <div className="flex justify-between p-6 glass-dark rounded-[3rem] border-white/5">
                                            {['#0066FF', '#8B5CF6', '#EC4899', '#10B981', '#F59E0B', '#FFFFFF'].map(c => (
                                                <button 
                                                    key={c} 
                                                    onClick={() => setAccent(c)} 
                                                    className={`w-10 h-10 rounded-full border-4 transition-all ${accent === c ? 'border-white scale-125 shadow-spark' : 'border-transparent opacity-30 hover:opacity-100 hover:scale-110'}`} 
                                                    style={{backgroundColor: c}} 
                                                />
                                            ))}
                                        </div>
                                    </div>
                                </section>

                                <section className="space-y-10">
                                    <div className="flex items-center gap-5"><div className="w-3 h-8 accent-bg rounded-full"></div><h3 className="text-[14px] font-black uppercase tracking-[0.4em]">Arquivamento</h3></div>
                                    
                                    <div className="grid grid-cols-2 gap-6">
                                        <button 
                                            onClick={exportarBackupJSON} 
                                            className="py-8 glass rounded-[2.5rem] border border-white/10 text-[10px] font-black uppercase tracking-[0.3em] hover:accent-text hover:accent-border shadow-inner transition-all active:scale-95"
                                        >
                                            Exportar JSON
                                        </button>
                                        <label className="py-8 glass rounded-[2.5rem] border border-white/10 text-[10px] font-black uppercase tracking-[0.3em] text-center cursor-pointer hover:accent-text hover:accent-border shadow-inner transition-all active:scale-95">
                                            Importar JSON
                                            <input type="file" accept=".json" onChange={importarBackupJSON} className="hidden" />
                                        </label>
                                    </div>

                                    <button 
                                        onClick={() => { if(confirm("MESTRE, CONFIRMA O APAGAMENTO TOTAL DOS DADOS?")) { localStorage.clear(); location.reload(); } }}
                                        className="w-full py-8 glass border border-rose-500/20 rounded-[2.5rem] text-rose-500 font-black uppercase text-[10px] tracking-[0.5em] hover:bg-rose-500/10 shadow-inner transition-all"
                                    >
                                        Limpar Todo o Sistema
                                    </button>
                                </section>
                            </div>
                        </div>
                    )}

                    {/* VISTA PERFIL */}
                    {tab === 'perfil' && (
                        <div className="flex flex-col items-center justify-center space-y-16 animate-master py-12">
                            <div className="relative group">
                                <div className="absolute -inset-4 accent-bg opacity-[0.08] blur-3xl rounded-full"></div>
                                <Avatar photo={masterPhoto} name={masterName} size="56" />
                                <div className="absolute -bottom-4 left-1/2 -translate-x-1/2 glass px-8 py-3 rounded-full border border-white/10 shadow-2xl">
                                    <span className="text-[10px] font-black uppercase tracking-[0.6em] accent-text animate-pulse">Master Level</span>
                                </div>
                            </div>
                            
                            <div className="text-center space-y-5">
                                <input 
                                    type="text" 
                                    value={masterName} 
                                    onChange={e=>setMasterName(e.target.value.toUpperCase())}
                                    className="bg-transparent text-6xl italic font-black tracking-tighter uppercase leading-none w-full text-center outline-none"
                                />
                                <div className="flex items-center justify-center gap-4 opacity-20">
                                    <div className="h-[1px] w-12 bg-white"></div>
                                    <p className="text-[11px] font-black uppercase tracking-[0.8em]">Class: Architect</p>
                                    <div className="h-[1px] w-12 bg-white"></div>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-6 w-full">
                                <div className="glass p-10 rounded-[3.5rem] border-white/5 shadow-inner text-center">
                                    <p className="text-[11px] font-black opacity-30 uppercase mb-3 tracking-widest">Registros</p>
                                    <p className="text-5xl font-black italic accent-text">{transacoes.length}</p>
                                </div>
                                <div className="glass p-10 rounded-[3.5rem] border-white/5 shadow-inner text-center">
                                    <p className="text-[11px] font-black opacity-30 uppercase mb-3 tracking-widest">Eficiência</p>
                                    <p className="text-5xl font-black italic text-emerald-400">99.9</p>
                                </div>
                            </div>

                            <button 
                                onClick={() => setIsLocked(true)} 
                                className="w-full py-9 glass border border-white/10 rounded-[3.5rem] font-black uppercase text-[11px] tracking-[0.8em] flex items-center justify-center gap-5 hover:bg-white/5 active:scale-95 transition-all shadow-2xl"
                            >
                                <Icon name="Lock" className="w-5 h-5 opacity-40"/> Logout Vault
                            </button>
                        </div>
                    )}

                    {/* NAVEGAÇÃO OMNI (FIXADA) */}
                    <nav className="fixed bottom-10 left-6 right-6 glass rounded-[4rem] p-5 flex justify-around shadow-2xl border border-white/10 max-w-md mx-auto z-[100] transform translate-z-0">
                        <button 
                            onClick={() => setTab('perfil')} 
                            className={`flex-1 flex justify-center items-center transition-all duration-500 ${tab === 'perfil' ? 'scale-125 saturate-150 drop-shadow-[0_0_10px_var(--accent-color)]' : 'opacity-20 grayscale'}`}
                        >
                            <Avatar photo={masterPhoto} name={masterName} size="10" />
                        </button>
                        
                        <button 
                            onClick={() => setTab('history')} 
                            className={`flex-1 flex justify-center py-5 rounded-[2.5rem] transition-all duration-500 ${tab === 'history' ? 'accent-text bg-white/5 shadow-inner' : 'opacity-20 text-white hover:opacity-50'}`}
                        >
                            <Icon name="History" className="w-7 h-7" />
                        </button>
                        
                        <button 
                            onClick={() => setTab('home')} 
                            className={`flex-[1.6] flex justify-center py-6 rounded-[3rem] relative transition-all duration-700 ${tab === 'home' ? 'accent-bg text-white shadow-spark scale-110 -translate-y-4' : 'opacity-20 text-white hover:opacity-50'}`}
                        >
                            <Icon name="Home" className="w-9 h-9" />
                            {tab === 'home' && <span className="absolute -top-1 -right-1 w-4 h-4 bg-white rounded-full animate-ping opacity-50"></span>}
                        </button>
                        
                        <button 
                            onClick={() => setTab('config')} 
                            className={`flex-1 flex justify-center py-5 rounded-[2.5rem] transition-all duration-500 ${tab === 'config' ? 'accent-text bg-white/5 shadow-inner' : 'opacity-20 text-white hover:opacity-50'}`}
                        >
                            <Icon name="Settings" className="w-7 h-7" />
                        </button>
                    </nav>
                </div>
            );
        }

        // --- INICIALIZAÇÃO MASTER ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
