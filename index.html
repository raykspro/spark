<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK - Ignition Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { spark: { dark: '#020617', blue: '#0066FF', cyan: '#00F0FF', green: '#10B981' } } } } }
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        .neon-text { text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); }
        .spark-gradient { background: linear-gradient(90deg, #0066FF 0%, #00F0FF 100%); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [transacoes, setTransacoes] = useState(() => {
                const salvo = localStorage.getItem('spark_db_v2');
                return salvo ? JSON.parse(salvo) : [];
            });
            const [valor, setValor] = useState('');
            const [categoria, setCategoria] = useState('Geral');
            const limite = 1200;

            const categorias = ["Geral", "Alimentação", "Transporte", "Lazer", "Juh Modas", "Saúde"];

            useEffect(() => {
                localStorage.setItem('spark_db_v2', JSON.stringify(transacoes));
            }, [transacoes]);

            const entradas = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc, 0);
            const saidas = transacoes.reduce((acc, t) => t.tipo === 'saida' ? acc + t.valor : acc, 0);
            const saldo = entradas - saidas;
            const porcentagem = Math.min(Math.round((saidas / limite) * 100), 100);

            const lancar = (tipo) => {
                if (!valor || valor <= 0) return;
                const nova = { id: Date.now(), valor: parseFloat(valor), tipo, categoria, data: new Date().toLocaleDateString('pt-BR') };
                setTransacoes([nova, ...transacoes]);
                setValor('');
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-2xl mx-auto pb-20">
                    {/* Header Logos */}
                    <div className="flex justify-between items-center mb-10">
                        <div className="flex gap-3">
                            <img src="assets/logo.png" className="w-12 h-12" />
                            <img src="assets/texto-spark.png" className="h-6 mt-3" />
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] text-white/40 uppercase font-black tracking-tighter">Saldo Disponível</p>
                            <p className={`text-xl font-black ${saldo >= 0 ? 'text-spark-green' : 'text-red-500'}`}>R$ {saldo.toLocaleString('pt-BR')}</p>
                        </div>
                    </div>

                    {/* Dashboard Progress */}
                    <div className="glass rounded-[2rem] p-8 mb-6 relative overflow-hidden">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h3 className="text-spark-blue text-[10px] font-black uppercase tracking-widest mb-1">Tanque de Gastos</h3>
                                <p className="text-4xl font-black italic">R$ {saidas.toLocaleString('pt-BR')}</p>
                            </div>
                            <span className="text-spark-cyan font-mono text-xl font-bold italic neon-text">{porcentagem}%</span>
                        </div>
                        <div className="h-3 w-full bg-white/5 rounded-full overflow-hidden border border-white/5">
                            <div className="h-full spark-gradient transition-all duration-1000" style={{ width: `${porcentagem}%` }}></div>
                        </div>
                        <div className="flex justify-between mt-4 text-[10px] font-bold text-white/20 uppercase">
                            <span>Início do Ciclo</span>
                            <span>Teto: R$ {limite}</span>
                        </div>
                    </div>

                    {/* Input Area */}
                    <div className="glass rounded-[2rem] p-6 mb-8 border-spark-blue/10">
                        <input 
                            type="number" value={valor} onChange={(e) => setValor(e.target.value)}
                            placeholder="0,00" 
                            className="w-full bg-transparent text-center text-5xl font-black text-white outline-none mb-6 placeholder:opacity-10"
                        />
                        
                        <div className="flex gap-2 overflow-x-auto pb-4 mb-6 no-scrollbar">
                            {categorias.map(cat => (
                                <button 
                                    key={cat} onClick={() => setCategoria(cat)}
                                    className={`px-4 py-2 rounded-full text-[10px] font-black uppercase transition-all flex-shrink-0 ${categoria === cat ? 'spark-gradient text-white' : 'bg-white/5 text-white/40 border border-white/5'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => lancar('saida')} className="bg-spark-blue py-4 rounded-2xl font-black uppercase text-xs hover:brightness-125 transition-all">Gasto</button>
                            <button onClick={() => lancar('entrada')} className="border border-spark-green/40 text-spark-green py-4 rounded-2xl font-black uppercase text-xs hover:bg-spark-green/10 transition-all">Receita</button>
                        </div>
                    </div>

                    {/* Histórico Elite */}
                    <div className="space-y-3">
                        <h4 className="text-[10px] font-black uppercase text-white/30 tracking-widest ml-4 mb-4">Registros de Ignição</h4>
                        {transacoes.slice(0, 10).map(t => (
                            <div key={t.id} className="glass p-5 rounded-2xl flex justify-between items-center group hover:bg-white/5 transition-all">
                                <div className="flex items-center gap-4">
                                    <div className={`w-1 h-8 rounded-full ${t.tipo === 'entrada' ? 'bg-spark-green' : 'bg-spark-blue'}`}></div>
                                    <div>
                                        <p className="text-[10px] font-black text-white/30 uppercase">{t.categoria}</p>
                                        <p className="text-xs font-bold text-white/80">{t.data}</p>
                                    </div>
                                </div>
                                <p className={`font-mono font-black ${t.tipo === 'entrada' ? 'text-spark-green' : 'text-white'}`}>
                                    {t.tipo === 'entrada' ? '+' : '-'} R$ {t.valor.toLocaleString('pt-BR')}
                                </p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
