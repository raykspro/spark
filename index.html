<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK - Ignition Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        spark: { 
                            dark: '#020617', 
                            blue: '#0066FF', 
                            cyan: '#00F0FF', 
                            green: '#10B981', 
                            gold: '#FBBF24'
                        } 
                    } 
                } 
            } 
        }
    </script>
    <style>
        * { transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease, transform 0.1s ease; }
        .glass { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .dark .glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .light .glass { background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04); }
        .spark-gradient { background: linear-gradient(135deg, #0066FF 0%, #00F0FF 100%); }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .spark-scrollbar::-webkit-scrollbar { height: 4px; }
        .spark-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,102,255,0.3); border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-spark-dark text-slate-900 dark:text-slate-100 min-h-screen pb-10">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [transacoes, setTransacoes] = useState(() => JSON.parse(localStorage.getItem('spark_db_v6')) || []);
            const [metas, setMetas] = useState(() => JSON.parse(localStorage.getItem('spark_metas')) || {
                Geral: 2000, Alimentação: 500, Lazer: 300, Fatura: 1000, Transporte: 200, Saúde: 200, Investimento: 500
            });
            const [isDark, setIsDark] = useState(() => localStorage.getItem('spark_theme') !== 'light');
            const [aba, setAba] = useState('home'); 
            const [valor, setValor] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [metodo, setMetodo] = useState('Pix');
            const [nota, setNota] = useState('');
            
            // Novos estados da Fase 08
            const [busca, setBusca] = useState('');
            const [filtroTempo, setFiltroTempo] = useState('tudo'); // tudo, hoje, semana, mes

            useEffect(() => {
                const root = window.document.documentElement;
                isDark ? root.classList.add('dark') : root.classList.remove('dark');
                localStorage.setItem('spark_theme', isDark ? 'dark' : 'light');
            }, [isDark]);

            useEffect(() => { localStorage.setItem('spark_db_v6', JSON.stringify(transacoes)); }, [transacoes]);
            useEffect(() => { localStorage.setItem('spark_metas', JSON.stringify(metas)); }, [metas]);

            const lancar = (tipo) => {
                if (!valor) return;
                const nova = { 
                    id: Date.now(), 
                    valor: parseFloat(valor), 
                    tipo, 
                    categoria, 
                    metodo, 
                    nota: nota || (tipo === 'entrada' ? 'Receita' : `Gasto em ${categoria}`), 
                    timestamp: Date.now(),
                    data: new Date().toLocaleDateString('pt-BR') 
                };
                setTransacoes([nova, ...transacoes]);
                setValor(''); setNota('');
            };

            // Lógica de Filtro Inteligente
            const transacoesFiltradas = useMemo(() => {
                let filtradas = transacoes;
                const agora = Date.now();
                const umDia = 24 * 60 * 60 * 1000;

                if (filtroTempo === 'hoje') {
                    filtradas = filtradas.filter(t => (agora - t.timestamp) < umDia);
                } else if (filtroTempo === 'semana') {
                    filtradas = filtradas.filter(t => (agora - t.timestamp) < (umDia * 7));
                } else if (filtroTempo === 'mes') {
                    filtradas = filtradas.filter(t => (agora - t.timestamp) < (umDia * 30));
                }

                if (busca) {
                    filtradas = filtradas.filter(t => 
                        t.nota.toLowerCase().includes(busca.toLowerCase()) || 
                        t.categoria.toLowerCase().includes(busca.toLowerCase())
                    );
                }
                return filtradas;
            }, [transacoes, busca, filtroTempo]);

            const saldoReal = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : (t.metodo !== 'Crédito' ? acc - t.valor : acc), 0);
            const gastoNoFiltro = transacoesFiltradas.reduce((acc, t) => t.tipo === 'saida' ? acc + t.valor : acc, 0);

            return (
                <div className="p-4 max-w-2xl mx-auto pb-28">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-8 pt-4 px-2">
                        <div className="flex gap-4 items-center">
                            <div className="w-10 h-10 bg-spark-blue rounded-2xl flex items-center justify-center font-black italic text-white shadow-lg text-xl">S</div>
                            <div>
                                <p className="text-[8px] opacity-40 uppercase font-black tracking-widest">Saldo Real</p>
                                <p className="text-xl font-black italic text-spark-green">R$ {saldoReal.toLocaleString('pt-BR')}</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsDark(!isDark)} className="glass p-3 rounded-2xl text-lg">{isDark ? '☀️' : '🌙'}</button>
                            <button onClick={() => setAba(aba === 'stats' ? 'home' : 'stats')} className={`p-3 rounded-2xl border transition-all ${aba === 'stats' ? 'bg-spark-blue border-spark-blue text-white' : 'glass border-white/10 opacity-60'}`}>📊</button>
                            <button onClick={() => setAba(aba === 'config' ? 'home' : 'config')} className="glass p-3 rounded-2xl border-white/10 shadow-sm opacity-60">⚙️</button>
                        </div>
                    </div>

                    {aba === 'home' && (
                        <>
                            {/* Dashboard com Gasto Dinâmico conforme Filtro */}
                            <div className="glass rounded-[3rem] p-10 mb-8 border-none relative overflow-hidden shadow-xl">
                                <h3 className="text-spark-blue text-[10px] font-black uppercase tracking-widest mb-1 italic opacity-60 text-center">
                                    Consumo ({filtroTempo.toUpperCase()})
                                </h3>
                                <div className="flex justify-center items-baseline gap-2 mb-6">
                                    <p className="text-5xl font-black italic tracking-tighter">R$ {gastoNoFiltro.toLocaleString('pt-BR')}</p>
                                </div>
                                <div className="h-3 w-full bg-slate-200 dark:bg-white/10 rounded-full p-[2px] overflow-hidden">
                                    <div className="h-full spark-gradient rounded-full transition-all duration-1000" style={{ width: `${Math.min((gastoNoFiltro/metas.Geral)*100),100}%` }}></div>
                                </div>
                            </div>

                            {/* Entrada de Dados */}
                            <div className="glass rounded-[2.5rem] p-8 mb-8 border-none shadow-2xl">
                                <input type="number" value={valor} onChange={(e) => setValor(e.target.value)} placeholder="0.00" className="w-full bg-transparent text-center text-7xl font-black outline-none mb-4 tracking-tighter text-slate-900 dark:text-white"/>
                                <input type="text" value={nota} onChange={(e) => setNota(e.target.value)} placeholder="Descrição" className="w-full bg-slate-100 dark:bg-white/5 rounded-2xl p-4 mb-8 text-center text-sm font-bold outline-none text-slate-800 dark:text-white"/>
                                
                                <div className="flex gap-2 overflow-x-auto pb-4 mb-8 spark-scrollbar">
                                    {Object.keys(metas).filter(k => k !== 'Geral').map(cat => (
                                        <button key={cat} onClick={() => setCategoria(cat)} className={`px-6 py-4 rounded-2xl text-[10px] font-black uppercase transition-all flex-shrink-0 ${categoria === cat ? 'bg-spark-blue text-white scale-105' : 'bg-slate-100 dark:bg-white/5 opacity-40'}`}>
                                            {cat}
                                        </button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => lancar('saida')} className="bg-spark-blue text-white py-6 rounded-3xl font-black uppercase text-xs tracking-widest shadow-xl">Gasto</button>
                                    <button onClick={() => lancar('entrada')} className="border-2 border-spark-green text-spark-green py-6 rounded-3xl font-black uppercase text-xs tracking-widest">Entrada</button>
                                </div>
                            </div>

                            {/* MÓDULO DE INTELIGÊNCIA: BUSCA E FILTROS */}
                            <div className="mb-6 space-y-4">
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        placeholder="Buscar operação..." 
                                        value={busca}
                                        onChange={(e) => setBusca(e.target.value)}
                                        className="flex-1 glass rounded-2xl py-3 px-5 text-xs font-bold outline-none border-none focus:ring-1 ring-spark-blue/50"
                                    />
                                </div>
                                <div className="flex gap-2 justify-between">
                                    {['tudo', 'hoje', 'semana', 'mes'].map(f => (
                                        <button 
                                            key={f} 
                                            onClick={() => setFiltroTempo(f)}
                                            className={`flex-1 py-2 rounded-xl text-[9px] font-black uppercase transition-all ${filtroTempo === f ? 'bg-spark-blue text-white' : 'glass opacity-40'}`}
                                        >
                                            {f}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Feed Filtrado */}
                            <div className="space-y-4 px-2">
                                {transacoesFiltradas.slice(0, 20).map(t => (
                                    <div key={t.id} className="glass p-6 rounded-[2rem] flex justify-between items-center border-none shadow-sm">
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="text-[9px] font-black uppercase opacity-40">{t.categoria}</span>
                                                <span className={`text-[9px] font-black italic ${t.metodo === 'Crédito' ? 'text-red-500' : 'text-spark-blue opacity-70'}`}>{t.metodo}</span>
                                            </div>
                                            <p className="text-sm font-bold opacity-80">{t.nota}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className={`text-xl font-black italic ${t.tipo === 'entrada' ? 'text-spark-green' : (t.metodo === 'Crédito' ? 'text-red-500' : 'text-slate-800 dark:text-white')}`}>
                                                {t.tipo === 'entrada' ? '+' : '-'} {t.valor.toLocaleString('pt-BR')}
                                            </p>
                                            <p className="text-[9px] opacity-20 font-bold">{t.data}</p>
                                        </div>
                                    </div>
                                ))}
                                {transacoesFiltradas.length === 0 && (
                                    <p className="text-center opacity-20 py-10 font-black uppercase text-xs">Nenhuma operação encontrada</p>
                                )}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
