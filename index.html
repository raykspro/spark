<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK CORE v9.3 | REFINED EDITION</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #0066FF; 
            --bg-base: #010204; 
            --glass: rgba(15, 20, 30, 0.7);
            --border: rgba(255, 255, 255, 0.06);
            --card-radius: 2rem;
        }

        .theme-emerald { --accent: #10b981; }
        .theme-ruby { --accent: #e11d48; }
        .theme-amber { --accent: #f59e0b; }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-base); color: #cbd5e1; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .font-display { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .panel-glass { backdrop-filter: blur(20px); background: var(--glass); border: 1px solid var(--border); }
        .accent-text { color: var(--accent); }
        .accent-bg { background-color: var(--accent); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        
        .nav-item-active { color: var(--accent); transform: translateY(-4px); }
        .nav-item-active::after { content: ''; position: absolute; bottom: -8px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); }

        ::-webkit-scrollbar { width: 0px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .spark-shadow { box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5); }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // Ícones Redimensionados para Elegância (Size 20-24px padrão)
        const Icon = ({ name, className = "w-5 h-5", size = "24" }) => {
            const icons = {
                Home: "M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z",
                History: "M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z",
                Settings: "M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58z",
                Plus: "M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
                Food: "M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7z",
                Transport: "M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z",
                Fun: "M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z",
                Audit: "M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z",
                Trash: "M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"
            };
            return (
                <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
                    <path d={icons[name] || ""} />
                </svg>
            );
        };

        function App() {
            const [tab, setTab] = useState('home');
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('spk_v93_db')) || []);
            const [quotas, setQuotas] = useState(() => JSON.parse(localStorage.getItem('spk_v93_qt')) || { Alimentação: 2500, Transporte: 800, Lazer: 1200 });
            const [profile, setProfile] = useState(() => localStorage.getItem('spk_v93_img') || '');
            const [theme, setTheme] = useState(() => localStorage.getItem('spk_v93_th') || 'theme-default');
            
            const [val, setVal] = useState('');
            const [desc, setDesc] = useState('');
            const [cat, setCat] = useState('Alimentação');

            useEffect(() => {
                localStorage.setItem('spk_v93_db', JSON.stringify(history));
                localStorage.setItem('spk_v93_qt', JSON.stringify(quotas));
                localStorage.setItem('spk_v93_img', profile);
                localStorage.setItem('spk_v93_th', theme);
                document.body.className = theme;
            }, [history, quotas, profile, theme]);

            const stats = useMemo(() => {
                const total = history.reduce((acc, t) => t.type === 'in' ? acc + t.val : acc - t.val, 0);
                const byCat = history.filter(t => t.type === 'out').reduce((acc, t) => {
                    acc[t.cat] = (acc[t.cat] || 0) + t.val;
                    return acc;
                }, {});
                return { total, byCat };
            }, [history]);

            const addEntry = (type) => {
                const amount = parseFloat(val);
                if (!amount) return;
                const newEntry = {
                    id: Date.now(),
                    val: amount,
                    desc: desc.trim().toUpperCase() || (type === 'in' ? 'APORTE SISTÊMICO' : 'REDUÇÃO PATRIMONIAL'),
                    cat, type,
                    date: new Date().toLocaleDateString('pt-BR'),
                    time: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})
                };
                setHistory([newEntry, ...history]);
                setVal(''); setDesc('');
            };

            const deleteEntry = (id) => {
                if(confirm("REMOVER REGISTRO, SENHOR?")) {
                    setHistory(history.filter(t => t.id !== id));
                }
            };

            const exportPDF = () => {
                const doc = new jspdf.jsPDF();
                doc.setFontSize(20); doc.text("SPARK AUDIT REPORT", 20, 20);
                doc.setFontSize(12); doc.text(`SALDO CONSOLIDADO: R$ ${stats.total.toFixed(2)}`, 20, 30);
                let y = 45;
                history.slice(0, 30).forEach(t => {
                    doc.text(`${t.date} | ${t.desc.substring(0,20)} | R$ ${t.val.toFixed(2)}`, 20, y);
                    y += 8;
                });
                doc.save(`audit_${Date.now()}.pdf`);
            };

            return (
                <div className="min-h-screen p-5 pb-36 max-w-md mx-auto">
                    {/* TOP BAR REFINADA */}
                    <header className="flex justify-between items-end mb-10 pt-4 animate-in">
                        <div>
                            <h1 className="font-display text-2xl font-black accent-text tracking-tighter">SPARK</h1>
                            <p className="text-[9px] font-bold opacity-30 tracking-[0.4em] uppercase">Control Unit v9.3</p>
                        </div>
                        <div className="relative group">
                            <div className="w-12 h-12 rounded-full border border-white/10 p-0.5 overflow-hidden spark-shadow">
                                <img src={profile || 'https://via.placeholder.com/150'} className="w-full h-full object-cover rounded-full grayscale hover:grayscale-0 transition-all duration-500" />
                            </div>
                            <label className="absolute -bottom-1 -right-1 w-5 h-5 accent-bg rounded-full flex items-center justify-center cursor-pointer border-2 border-black">
                                <input type="file" className="hidden" onChange={e => {
                                    const reader = new FileReader();
                                    reader.onload = () => setProfile(reader.result);
                                    reader.readAsDataURL(e.target.files[0]);
                                }} />
                                <Icon name="Plus" className="w-3 h-3 text-white" />
                            </label>
                        </div>
                    </header>

                    {tab === 'home' && (
                        <div className="space-y-6 animate-in">
                            {/* DISPLAY DE SALDO CENTRALIZADO */}
                            <div className="panel-glass p-8 rounded-[2rem] text-center border-t-white/10 spark-shadow group">
                                <p className="text-[10px] font-black opacity-20 uppercase tracking-[0.5em] mb-3">Patrimônio Líquido</p>
                                <h2 className="text-5xl font-display font-black tracking-tighter leading-none flex items-center justify-center">
                                    <span className="text-sm opacity-20 mr-3 font-mono">R$</span>
                                    {stats.total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                </h2>
                                <div className="mt-6 h-0.5 w-12 accent-bg mx-auto opacity-30 rounded-full group-hover:w-24 transition-all"></div>
                            </div>

                            {/* PAINEL DE COMANDO (ENTRADA) */}
                            <div className="panel-glass p-6 rounded-[2.5rem] space-y-5">
                                <div className="text-center">
                                    <input 
                                        type="number" value={val} onChange={e => setVal(e.target.value)}
                                        placeholder="0,00" className="bg-transparent w-full text-6xl font-display font-black text-center outline-none accent-text placeholder:opacity-5"
                                    />
                                    <input 
                                        type="text" value={desc} onChange={e => setDesc(e.target.value)}
                                        placeholder="DESCREVA A OPERAÇÃO..." className="bg-transparent w-full text-center text-[10px] font-bold opacity-30 uppercase tracking-[0.2em] mt-3 outline-none focus:opacity-100 transition-opacity"
                                    />
                                </div>

                                <div className="flex justify-around gap-2 px-2">
                                    {[
                                        {n:'Alimentação', i:'Food'}, 
                                        {n:'Transporte', i:'Transport'}, 
                                        {n:'Lazer', i:'Fun'}
                                    ].map(item => (
                                        <button 
                                            key={item.n} onClick={() => setCat(item.n)} 
                                            className={`flex flex-col items-center gap-2 p-3 rounded-2xl transition-all ${cat === item.n ? 'bg-white/10 accent-text scale-105' : 'opacity-20 hover:opacity-50'}`}
                                        >
                                            <Icon name={item.i} className="w-5 h-5" />
                                            <span className="text-[8px] font-black uppercase tracking-tighter">{item.n}</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-2 gap-3 pt-2">
                                    <button onClick={() => addEntry('out')} className="btn-press py-4 rounded-2xl bg-white/5 font-black text-[10px] uppercase tracking-widest border border-white/5 hover:bg-white/10">Registrar Saída</button>
                                    <button onClick={() => addEntry('in')} className="btn-press py-4 rounded-2xl accent-bg text-white font-black text-[10px] uppercase tracking-widest shadow-lg">Injetar Capital</button>
                                </div>
                            </div>

                            {/* MONITOR DE TETOS - COMPACTO */}
                            <div className="space-y-3">
                                <div className="flex justify-between items-center px-2">
                                    <h3 className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Audit Vault</h3>
                                    <button onClick={exportPDF} className="text-[9px] font-black accent-text uppercase flex items-center gap-1.5 opacity-60 hover:opacity-100">
                                        <Icon name="Audit" className="w-3 h-3" /> Relatório
                                    </button>
                                </div>
                                {Object.keys(quotas).map(c => {
                                    const spend = stats.byCat[c] || 0;
                                    const perc = Math.min((spend / quotas[c]) * 100, 100);
                                    return (
                                        <div key={c} className="panel-glass p-4 px-5 rounded-[1.5rem] border-l-2 border-l-white/5">
                                            <div className="flex justify-between items-center mb-2 px-1">
                                                <span className="text-[10px] font-bold uppercase opacity-50">{c}</span>
                                                <span className="text-[9px] font-mono opacity-30">R$ {spend.toFixed(0)} / {quotas[c]}</span>
                                            </div>
                                            <div className="h-1 bg-white/5 rounded-full overflow-hidden">
                                                <div className={`h-full transition-all duration-[1.5s] ${perc > 90 ? 'bg-red-500 shadow-[0_0_8px_red]' : 'accent-bg'}`} style={{ width: `${perc}%` }}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {tab === 'history' && (
                        <div className="space-y-3 animate-in">
                            <h2 className="text-[10px] font-black opacity-30 uppercase tracking-[0.5em] px-2 mb-4">Database Logs</h2>
                            {history.length === 0 ? (
                                <div className="py-20 text-center opacity-10 font-black uppercase text-xs tracking-widest">Cofre Vazio</div>
                            ) : (
                                history.map(t => (
                                    <div key={t.id} className="panel-glass p-4 rounded-[1.5rem] flex justify-between items-center group border-l-2 border-white/5">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center ${t.type === 'in' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-white/5 text-white opacity-40'}`}>
                                                <Icon name={t.cat === 'Alimentação' ? 'Food' : t.cat === 'Transporte' ? 'Transport' : 'Fun'} className="w-4 h-4" />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black uppercase tracking-widest leading-none mb-1">{t.desc}</p>
                                                <p className="text-[8px] opacity-20 font-mono uppercase">{t.date} • {t.time}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className={`text-xs font-display font-bold ${t.type === 'in' ? 'text-emerald-500' : 'white'}`}>
                                                {t.type === 'in' ? '+' : '-'} R$ {t.val.toFixed(2)}
                                            </div>
                                            <button onClick={() => deleteEntry(t.id)} className="opacity-0 group-hover:opacity-20 hover:!opacity-100 transition-opacity">
                                                <Icon name="Trash" className="w-4 h-4 text-red-500" />
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    )}

                    {tab === 'config' && (
                        <div className="space-y-6 animate-in">
                            <section className="panel-glass p-6 rounded-[2rem] space-y-5">
                                <h3 className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Visual Core</h3>
                                <div className="grid grid-cols-2 gap-2">
                                    {[
                                        {id:'theme-default', n:'Cobalt', c:'bg-blue-600'},
                                        {id:'theme-emerald', n:'Emerald', c:'bg-emerald-500'},
                                        {id:'theme-ruby', n:'Ruby', c:'bg-rose-600'},
                                        {id:'theme-amber', n:'Amber', c:'bg-amber-500'}
                                    ].map(t => (
                                        <button key={t.id} onClick={() => setTheme(t.id)} className={`p-3 rounded-xl flex items-center gap-3 border transition-all ${theme === t.id ? 'border-white/40 bg-white/5' : 'border-white/5 opacity-40'}`}>
                                            <div className={`w-3 h-3 rounded-full ${t.c} shadow-sm`}></div>
                                            <span className="text-[9px] font-black uppercase tracking-widest">{t.n}</span>
                                        </button>
                                    ))}
                                </div>
                            </section>

                            <section className="panel-glass p-6 rounded-[2rem] space-y-4">
                                <h3 className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Quota Calibration</h3>
                                {Object.keys(quotas).map(c => (
                                    <div key={c} className="flex justify-between items-center bg-white/5 p-3 px-4 rounded-xl">
                                        <span className="text-[9px] font-black uppercase opacity-50 tracking-widest">{c}</span>
                                        <input 
                                            type="number" value={quotas[c]} 
                                            onChange={e => setQuotas({...quotas, [c]: parseFloat(e.target.value) || 0})}
                                            className="bg-transparent text-right font-mono text-xs outline-none accent-text w-20 font-bold"
                                        />
                                    </div>
                                ))}
                            </section>

                            <button onClick={() => { if(confirm("ESTA AÇÃO É IRREVERSÍVEL. PURGAR SISTEMA?")) { localStorage.clear(); location.reload(); } }} className="w-full py-4 rounded-2xl border border-red-500/10 text-red-500/40 text-[9px] font-black uppercase tracking-[0.5em] hover:bg-red-500/5 hover:text-red-500 transition-all">Format Memory Core</button>
                        </div>
                    )}

                    {/* DOCK DE NAVEGAÇÃO REFINADO (ÍCONES EM ESCALA) */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm panel-glass rounded-[2.5rem] p-2 px-6 flex justify-between items-center shadow-2xl z-50 border-t-white/10 ring-8 ring-black/20">
                        <button onClick={() => setTab('history')} className={`relative p-3 transition-all ${tab === 'history' ? 'nav-item-active' : 'opacity-20'}`}>
                            <Icon name="History" className="w-6 h-6" />
                        </button>
                        
                        <button onClick={() => setTab('home')} className={`p-4 accent-bg rounded-full transition-all shadow-xl -translate-y-6 scale-110 ${tab === 'home' ? 'text-white' : 'opacity-20 text-white'}`}>
                            <Icon name="Home" className="w-7 h-7" />
                        </button>
                        
                        <button onClick={() => setTab('config')} className={`relative p-3 transition-all ${tab === 'config' ? 'nav-item-active' : 'opacity-20'}`}>
                            <Icon name="Settings" className="w-6 h-6" />
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
