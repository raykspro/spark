<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK | OMNI VAULT</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --accent: #3b82f6;
        }

        body { 
            margin: 0; 
            background: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-dark {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(40px);
        }

        .accent-bg { background-color: var(--accent); }
        .accent-text { color: var(--accent); }
        .accent-border { border-color: var(--accent); }

        .shadow-spark {
            box-shadow: 0 20px 50px -15px var(--accent);
        }

        @keyframes master-entry {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-master {
            animation: master-entry 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        input[type="number"]::-webkit-inner-spin-button { display: none; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        master: '#0a0a0a',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Componente de Ícones Lucide
        const Icon = ({ name, className }) => {
            const LucideIcon = lucide.icons[name];
            return LucideIcon ? <LucideIcon className={className} /> : null;
        };

        function App() {
            // --- ESTADOS DE CONFIGURAÇÃO E IDENTIDADE ---
            const [masterName, setMasterName] = useState(() => localStorage.getItem('spark_name') || 'MESTRE');
            const [masterPhoto, setMasterPhoto] = useState(() => localStorage.getItem('spark_photo') || '');
            const [accent, setAccent] = useState(() => localStorage.getItem('spark_accent') || '#3b82f6');
            
            // --- ESTADOS FINANCEIROS ---
            const [transacoes, setTransacoes] = useState(() => {
                const saved = localStorage.getItem('spark_data');
                return saved ? JSON.parse(saved) : [];
            });
            const [tetoGasto, setTetoGasto] = useState(() => parseFloat(localStorage.getItem('spark_teto')) || 5000);
            
            // --- ESTADOS DE INTERFACE ---
            const [tab, setTab] = useState('home');
            const [isLocked, setIsLocked] = useState(true);
            const [password, setPassword] = useState('');
            const [isExporting, setIsExporting] = useState(false);
            
            // --- FORMULÁRIO ---
            const [desc, setDesc] = useState('');
            const [valor, setValor] = useState('');
            const [tipo, setTipo] = useState('despesa'); // 'receita' ou 'despesa'

            // Sincronização de Preferências
            useEffect(() => {
                localStorage.setItem('spark_name', masterName);
                localStorage.setItem('spark_photo', masterPhoto);
                localStorage.setItem('spark_accent', accent);
                localStorage.setItem('spark_teto', tetoGasto);
                document.documentElement.style.setProperty('--accent', accent);
            }, [masterName, masterPhoto, accent, tetoGasto]);

            useEffect(() => {
                localStorage.setItem('spark_data', JSON.stringify(transacoes));
            }, [transacoes]);

            // Lógica de Login Automático para o Senhor (Opcional)
            const handleLogin = () => {
                if (password === '1234') { // Senha padrão do sistema
                    setIsLocked(false);
                } else {
                    alert("Acesso Negado, Senhor.");
                }
            };
            // --- CÁLCULOS ANALÍTICOS (USEMEMO PARA PERFORMANCE) ---
            const stats = useMemo(() => {
                const totalReceitas = transacoes
                    .filter(t => t.tipo === 'receita')
                    .reduce((acc, curr) => acc + curr.valor, 0);
                
                const totalDespesas = transacoes
                    .filter(t => t.tipo === 'despesa')
                    .reduce((acc, curr) => acc + curr.valor, 0);

                const saldo = totalReceitas - totalDespesas;
                const progressoTeto = Math.min((totalDespesas / tetoGasto) * 100, 100);

                return { totalReceitas, totalDespesas, saldo, progressoTeto };
            }, [transacoes, tetoGasto]);

            // --- AÇÕES DO SISTEMA ---
            const addTransacao = () => {
                if (!desc || !valor) return;
                
                const nova = {
                    id: Date.now(),
                    desc: desc.toUpperCase(),
                    valor: parseFloat(valor),
                    tipo,
                    data: new Date().toLocaleDateString('pt-BR')
                };

                setTransacoes([nova, ...transacoes]);
                setDesc('');
                setValor('');
            };

            const deleteTransacao = (id) => {
                if(confirm("Mestre, deseja remover este registro permanentemente?")) {
                    setTransacoes(transacoes.filter(t => t.id !== id));
                }
            };

            // --- RENDERIZAÇÃO DO VAULT (TELA DE BLOQUEIO) ---
            if (isLocked) {
                return (
                    <div className="fixed inset-0 flex items-center justify-center bg-black z-[300] p-6">
                        <div className="w-full max-w-sm space-y-8 text-center animate-master">
                            <div className="relative inline-block">
                                <div className="w-24 h-24 rounded-[2rem] accent-bg flex items-center justify-center mx-auto shadow-spark mb-4">
                                    <Icon name="Zap" className="w-12 h-12 text-white" />
                                </div>
                                <div className="absolute -top-2 -right-2 w-6 h-6 bg-white/10 rounded-full blur-xl animate-pulse"></div>
                            </div>
                            
                            <div className="space-y-2">
                                <h1 className="text-2xl font-black tracking-tighter uppercase">Spark Omni</h1>
                                <p className="text-[10px] font-bold opacity-30 uppercase tracking-[0.3em]">Protocolo de Segurança Ativo</p>
                            </div>

                            <input 
                                type="password"
                                placeholder="DIGITE A CHAVE MASTER"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                className="w-full glass rounded-3xl py-6 px-4 text-center text-sm font-black tracking-[0.5em] focus:accent-border outline-none transition-all"
                                onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                            />

                            <button 
                                onClick={handleLogin}
                                className="w-full py-6 rounded-3xl font-black uppercase text-xs tracking-widest bg-white text-black hover:scale-[1.02] active:scale-95 transition-all"
                            >
                                Acessar Vault
                            </button>
                        </div>
                    </div>
                );
            }

            // --- RENDERIZAÇÃO PRINCIPAL ---
            return (
                <div className="min-h-screen pb-32">
                    {/* HEADER STATUS BAR */}
                    <header className="p-8 flex items-center justify-between animate-master">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 rounded-2xl overflow-hidden border border-white/10 glass">
                                {masterPhoto ? (
                                    <img src={masterPhoto} className="w-full h-full object-cover" />
                                ) : (
                                    <div className="w-full h-full flex items-center justify-center accent-bg text-white font-black text-xl">
                                        {masterName.charAt(0)}
                                    </div>
                                )}
                            </div>
                            <div>
                                <p className="text-[10px] font-black opacity-30 uppercase tracking-widest">Bem-vindo, Senhor</p>
                                <h2 className="text-sm font-black uppercase">{masterName}</h2>
                            </div>
                        </div>
                        <button onClick={() => setIsLocked(true)} className="p-3 glass rounded-2xl opacity-50 hover:opacity-100 transition-all">
                            <Icon name="Power" className="w-5 h-5" />
                        </button>
                    </header>

                    <main className="px-6 space-y-8">
                        {/* ABA HOME: DASHBOARD ANALÍTICO */}
                        {tab === 'home' && (
                            <div className="space-y-8 animate-master">
                                {/* CARD DE SALDO PRINCIPAL */}
                                <div className="glass rounded-[3.5rem] p-10 relative overflow-hidden shadow-2xl">
                                    <div className="absolute top-0 right-0 w-40 h-40 accent-bg opacity-10 blur-[80px]"></div>
                                    <p className="text-[10px] font-black opacity-40 uppercase tracking-[0.2em] mb-2">Patrimônio Líquido</p>
                                    <h3 className="text-5xl font-black tracking-tighter">
                                        <span className="text-sm opacity-30 mr-2 font-medium">R$</span>
                                        {stats.saldo.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                    </h3>
                                    
                                    <div className="mt-8 pt-8 border-t border-white/5 flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className="p-2 rounded-xl bg-green-500/10 text-green-500">
                                                <Icon name="ArrowUpRight" className="w-4 h-4" />
                                            </div>
                                            <div>
                                                <p className="text-[8px] font-bold opacity-30 uppercase">Entradas</p>
                                                <p className="font-bold text-xs">R$ {stats.totalReceitas.toFixed(2)}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className="p-2 rounded-xl bg-red-500/10 text-red-500">
                                                <Icon name="ArrowDownLeft" className="w-4 h-4" />
                                            </div>
                                            <div>
                                                <p className="text-[8px] font-bold opacity-30 uppercase">Saídas</p>
                                                <p className="font-bold text-xs">R$ {stats.totalDespesas.toFixed(2)}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* MEDIDOR DE TETO DE GASTOS */}
                                <div className="glass rounded-[2.5rem] p-6 space-y-4">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <p className="text-[10px] font-black opacity-30 uppercase">Uso do Teto Mensal</p>
                                            <p className="text-lg font-black">{stats.progressoTeto.toFixed(1)}%</p>
                                        </div>
                                        <p className="text-[10px] font-bold opacity-30">LIMITE: R$ {tetoGasto}</p>
                                    </div>
                                    <div className="h-3 w-full bg-white/5 rounded-full overflow-hidden p-[2px]">
                                        <div 
                                            className="h-full rounded-full accent-bg transition-all duration-1000"
                                            style={{ width: `${stats.progressoTeto}%` }}
                                        ></div>
                                    </div>
                                </div>
                                {/* FORMULÁRIO DE ENTRADA RÁPIDA */}
                                <div className="space-y-6">
                                    <h4 className="text-[10px] font-black opacity-30 uppercase tracking-[0.3em] ml-2">Novo Registro</h4>
                                    <div className="grid grid-cols-2 gap-4">
                                        <button 
                                            onClick={() => setTipo('receita')}
                                            className={`py-5 rounded-3xl font-black text-[10px] uppercase tracking-widest transition-all ${tipo === 'receita' ? 'bg-green-500 text-white shadow-lg shadow-green-500/20 scale-105' : 'glass opacity-30'}`}
                                        >
                                            Receita
                                        </button>
                                        <button 
                                            onClick={() => setTipo('despesa')}
                                            className={`py-5 rounded-3xl font-black text-[10px] uppercase tracking-widest transition-all ${tipo === 'despesa' ? 'bg-red-500 text-white shadow-lg shadow-red-500/20 scale-105' : 'glass opacity-30'}`}
                                        >
                                            Despesa
                                        </button>
                                    </div>

                                    <div className="space-y-4">
                                        <input 
                                            type="text" 
                                            placeholder="DESCRIÇÃO DO FLUXO"
                                            value={desc}
                                            onChange={e => setDesc(e.target.value.toUpperCase())}
                                            className="w-full glass rounded-[2rem] py-6 px-8 text-xs font-bold border-white/5 focus:accent-border transition-all"
                                        />
                                        <div className="relative">
                                            <span className="absolute left-8 top-1/2 -translate-y-1/2 text-[10px] font-bold opacity-30">R$</span>
                                            <input 
                                                type="number" 
                                                placeholder="0,00"
                                                value={valor}
                                                onChange={e => setValor(e.target.value)}
                                                className="w-full glass rounded-[2rem] py-6 pl-16 pr-8 text-xl font-black border-white/5 focus:accent-border transition-all"
                                            />
                                        </div>
                                        <button 
                                            onClick={addTransacao}
                                            className="w-full accent-bg py-6 rounded-[2rem] text-xs font-black uppercase tracking-[0.2em] shadow-spark hover:scale-[1.01] active:scale-95 transition-all"
                                        >
                                            Confirmar Lançamento
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ABA DE HISTÓRICO (LOGS) */}
                        {tab === 'history' && (
                            <div className="space-y-8 animate-master pb-20">
                                <div className="flex items-end justify-between px-2">
                                    <div>
                                        <h2 className="text-3xl font-black uppercase tracking-tighter leading-none">Logs</h2>
                                        <p className="text-[10px] font-bold opacity-30 uppercase tracking-[0.2em] mt-1">Registros de Auditoria</p>
                                    </div>
                                    <button 
                                        onClick={() => { /* Lógica de exportação PDF será na Parte 4 */ }}
                                        className="p-4 glass rounded-2xl accent-text hover:bg-white/5 transition-all"
                                    >
                                        <Icon name="Download" className="w-5 h-5" />
                                    </button>
                                </div>

                                <div className="space-y-4">
                                    {transacoes.length === 0 ? (
                                        <div className="glass rounded-[3rem] p-20 text-center opacity-20">
                                            <Icon name="Database" className="w-10 h-10 mx-auto mb-4" />
                                            <p className="text-[10px] font-black uppercase tracking-widest">Nenhum dado encontrado</p>
                                        </div>
                                    ) : (
                                        transacoes.map((t) => (
                                            <div 
                                                key={t.id} 
                                                className="glass rounded-[2.5rem] p-6 flex items-center justify-between group hover:bg-white/[0.05] transition-all border-l-4"
                                                style={{ borderLeftColor: t.tipo === 'receita' ? '#22c55e' : '#ef4444' }}
                                            >
                                                <div className="flex items-center gap-5">
                                                    <div className={`p-4 rounded-2xl ${t.tipo === 'receita' ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}`}>
                                                        <Icon name={t.tipo === 'receita' ? "TrendingUp" : "TrendingDown"} className="w-5 h-5" />
                                                    </div>
                                                    <div>
                                                        <p className="text-[8px] font-black opacity-30 uppercase mb-1">{t.data}</p>
                                                        <h4 className="text-sm font-black tracking-tight">{t.desc}</h4>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex items-center gap-6">
                                                    <div className="text-right">
                                                        <p className={`text-base font-black tracking-tighter ${t.tipo === 'receita' ? 'text-green-500' : 'text-white'}`}>
                                                            <span className="text-[10px] opacity-30 mr-1 font-medium">R$</span>
                                                            {t.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                                        </p>
                                                    </div>
                                                    <button 
                                                        onClick={() => deleteTransacao(t.id)}
                                                        className="opacity-0 group-hover:opacity-100 p-2 text-red-500/50 hover:text-red-500 transition-all"
                                                    >
                                                        <Icon name="Trash2" className="w-4 h-4" />
                                                    </button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                        {/* ABA DE CONFIGURAÇÕES MASTER */}
                        {tab === 'config' && (
                            <div className="space-y-8 animate-master pb-20">
                                <div className="px-2">
                                    <h2 className="text-3xl font-black uppercase tracking-tighter">Painel Master</h2>
                                    <p className="text-[10px] font-bold opacity-30 uppercase tracking-[0.2em]">Configurações de Identidade</p>
                                </div>

                                <div className="glass rounded-[3.5rem] p-10 space-y-8 border-white/5 relative overflow-hidden">
                                    <div className="absolute -bottom-20 -left-20 w-60 h-60 accent-bg opacity-5 blur-[100px] pointer-events-none"></div>

                                    <div className="space-y-6">
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-40 uppercase ml-4 tracking-widest">Assinatura do Mestre</label>
                                            <input 
                                                value={masterName} 
                                                onChange={e => setMasterName(e.target.value.toUpperCase())} 
                                                className="w-full glass rounded-3xl py-5 px-8 text-sm font-bold border-white/10 focus:accent-border transition-all" 
                                            />
                                        </div>
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-40 uppercase ml-4 tracking-widest">URL da Imagem</label>
                                            <input 
                                                value={masterPhoto} 
                                                onChange={e => setMasterPhoto(e.target.value)} 
                                                placeholder="https://link-da-foto.jpg"
                                                className="w-full glass rounded-3xl py-5 px-8 text-xs font-medium border-white/10 focus:accent-border transition-all" 
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-6 pt-4 border-t border-white/5">
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-40 uppercase ml-4 tracking-widest">Teto de Gastos (R$)</label>
                                            <input 
                                                type="number" 
                                                value={tetoGasto} 
                                                onChange={e => setTetoGasto(parseFloat(e.target.value) || 0)} 
                                                className="w-full glass rounded-3xl py-5 px-8 text-sm font-black accent-text border-white/10" 
                                            />
                                        </div>
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black opacity-40 uppercase ml-4 tracking-widest">Cor de Acento (Hex)</label>
                                            <div className="flex gap-4">
                                                <input 
                                                    value={accent} 
                                                    onChange={e => setAccent(e.target.value)} 
                                                    className="flex-1 glass rounded-3xl py-5 px-8 text-xs font-mono border-white/10 uppercase" 
                                                />
                                                <div className="w-16 h-16 rounded-3xl shadow-lg border-4 border-white/10" style={{ backgroundColor: accent }}></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-8 space-y-4">
                                        <button 
                                            onClick={() => { if(confirm("Mestre, deseja realmente bloquear o Vault agora?")) setIsLocked(true); }}
                                            className="w-full glass bg-white/5 py-5 rounded-[2rem] text-[10px] font-black uppercase tracking-[0.2em] hover:bg-white/10 transition-all flex items-center justify-center gap-3"
                                        >
                                            <Icon name="Lock" className="w-4 h-4" /> Trancar Vault
                                        </button>
                                        <button 
                                            onClick={() => { if(confirm("ALERTA: Isso apagará todos os dados financeiros. Prosseguir, Senhor?")) { localStorage.clear(); location.reload(); } }}
                                            className="w-full bg-red-500/10 text-red-500 py-5 rounded-[2rem] text-[10px] font-black uppercase tracking-[0.2em] hover:bg-red-500 hover:text-white transition-all shadow-lg shadow-red-500/10"
                                        >
                                            Hard Reset Sistema
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* BARRA DE NAVEGAÇÃO OMNI */}
                    <nav className="fixed bottom-10 left-6 right-6 glass rounded-[3.5rem] p-4 flex items-center justify-around shadow-2xl z-50 border-white/10 animate-master">
                        <button onClick={() => setTab('history')} className={`flex-1 flex flex-col items-center justify-center py-4 rounded-[2.5rem] transition-all ${tab === 'history' ? 'accent-text bg-white/5 scale-110' : 'opacity-20 hover:opacity-50'}`}>
                            <Icon name="History" className="w-7 h-7" />
                            <span className={`text-[8px] font-black mt-1 uppercase ${tab === 'history' ? 'block' : 'hidden'}`}>Logs</span>
                        </button>
                        <button onClick={() => setTab('home')} className={`flex-[1.6] flex flex-col items-center justify-center py-6 rounded-[3rem] transition-all ${tab === 'home' ? 'accent-bg text-white shadow-spark scale-110 -translate-y-6' : 'opacity-20 hover:opacity-50'}`}>
                            <Icon name="Home" className="w-9 h-9" />
                        </button>
                        <button onClick={() => setTab('config')} className={`flex-1 flex flex-col items-center justify-center py-4 rounded-[2.5rem] transition-all ${tab === 'config' ? 'accent-text bg-white/5 scale-110' : 'opacity-20 hover:opacity-50'}`}>
                            <Icon name="Settings" className="w-7 h-7" />
                            <span className={`text-[8px] font-black mt-1 uppercase ${tab === 'config' ? 'block' : 'hidden'}`}>Master</span>
                        </button>
                    </nav>
                </div>
            );
        }

        // --- INICIALIZAÇÃO DO NÚCLEO ---
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<React.StrictMode><App /></React.StrictMode>);
            console.log("SPARK OMNI VAULT v3.5: Operacional, Mestre.");
        } catch (err) {
            document.body.innerHTML = `<div style="color:red; padding:20px;">Erro de Inicialização: ${err.message}</div>`;
        }
    </script>
</body>
</html>
