<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK - Ignition Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { spark: { dark: '#020617', blue: '#0066FF', cyan: '#00F0FF', green: '#10B981', gold: '#FBBF24' } } } } }
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        .spark-gradient { background: linear-gradient(90deg, #0066FF 0%, #00F0FF 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [transacoes, setTransacoes] = useState(() => {
                const salvo = localStorage.getItem('spark_db_v4');
                return salvo ? JSON.parse(salvo) : [];
            });
            
            const [valor, setValor] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [metodo, setMetodo] = useState('Pix');
            const [nota, setNota] = useState('');
            const limite = 1200;

            const categorias = ["Alimentação", "Lazer", "Fatura", "Transporte", "Saúde", "Investimento"];
            const metodos = ["Pix", "Débito", "Crédito", "Dinheiro"];

            useEffect(() => {
                localStorage.setItem('spark_db_v4', JSON.stringify(transacoes));
            }, [transacoes]);

            const entradas = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc, 0);
            const saidas = transacoes.reduce((acc, t) => t.tipo === 'saida' ? acc + t.valor : acc, 0);
            const saldo = entradas - saidas;
            const porcentagem = Math.min(Math.round((saidas / limite) * 100), 100);

            const lancar = (tipo) => {
                if (!valor || valor <= 0) return;
                const nova = { 
                    id: Date.now(), 
                    valor: parseFloat(valor), 
                    tipo, 
                    categoria, 
                    metodo,
                    nota: nota || (tipo === 'entrada' ? 'Recebimento' : `Gasto em ${categoria}`),
                    data: new Date().toLocaleDateString('pt-BR') 
                };
                setTransacoes([nova, ...transacoes]);
                setValor('');
                setNota('');
            };

            const getCorCategoria = (cat) => {
                if (cat === 'Investimento') return 'text-spark-gold';
                if (cat === 'Fatura') return 'text-red-400';
                return 'text-white/30';
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-2xl mx-auto pb-20">
                    <div className="flex justify-between items-center mb-10 px-2">
                        <div className="flex gap-3">
                            <img src="assets/logo.png" className="w-12 h-12" onError={(e) => e.target.src='https://via.placeholder.com/48/0066FF/FFFFFF?text=S'}/>
                            <img src="assets/texto-spark.png" className="h-5 mt-4" onError={(e) => e.target.src='https://via.placeholder.com/100/00F0FF/000000?text=SPARK'}/>
                        </div>
                        <div className="text-right">
                            <p className="text-[9px] text-white/30 uppercase font-black tracking-widest">Saldo Real</p>
                            <p className={`text-2xl font-black italic ${saldo >= 0 ? 'text-spark-green' : 'text-red-500'}`}>R$ {saldo.toLocaleString('pt-BR')}</p>
                        </div>
                    </div>

                    <div className="glass rounded-[2.5rem] p-8 mb-6 border-white/5">
                        <div className="flex justify-between items-end mb-5">
                            <div>
                                <h3 className="text-spark-blue text-[10px] font-black uppercase tracking-widest mb-1 italic">Tanque de Gastos</h3>
                                <p className="text-4xl font-black italic">R$ {saidas.toLocaleString('pt-BR')}</p>
                            </div>
                            <span className="text-spark-cyan font-black text-2xl italic">{porcentagem}%</span>
                        </div>
                        <div className="h-2.5 w-full bg-white/5 rounded-full p-[2px] border border-white/5 overflow-hidden">
                            <div className="h-full spark-gradient rounded-full transition-all duration-1000 shadow-[0_0_15px_rgba(0,102,255,0.4)]" style={{ width: `${porcentagem}%` }}></div>
                        </div>
                    </div>

                    <div className="glass rounded-[2.5rem] p-6 mb-8 border-spark-blue/20">
                        <input type="number" value={valor} onChange={(e) => setValor(e.target.value)} placeholder="0.00" className="w-full bg-transparent text-center text-6xl font-black text-white outline-none mb-6"/>
                        <input type="text" value={nota} onChange={(e) => setNota(e.target.value)} placeholder="Descrição (Opcional)" className="w-full bg-white/5 border border-white/5 rounded-xl p-4 mb-6 text-center text-sm font-bold outline-none"/>

                        <p className="text-[10px] font-black uppercase text-white/20 mb-3 ml-2 italic">Categorias Oficiais</p>
                        <div className="flex gap-2 overflow-x-auto pb-4 mb-6 no-scrollbar">
                            {categorias.map(cat => (
                                <button key={cat} onClick={() => setCategoria(cat)}
                                    className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all flex-shrink-0 ${categoria === cat ? 'spark-gradient text-white scale-105 shadow-lg' : 'bg-white/5 text-white/30 border border-white/5 hover:bg-white/10'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>

                        <p className="text-[10px] font-black uppercase text-white/20 mb-3 ml-2 italic">Método de Operação</p>
                        <div className="flex gap-2 mb-8">
                            {metodos.map(m => (
                                <button key={m} onClick={() => setMetodo(m)}
                                    className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase transition-all border ${metodo === m ? 'border-spark-cyan text-spark-cyan bg-spark-cyan/5' : 'border-white/5 text-white/20'}`}>
                                    {m}
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => lancar('saida')} className="bg-spark-blue py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:brightness-110 active:scale-95 shadow-lg shadow-spark-blue/20">Gasto</button>
                            <button onClick={() => lancar('entrada')} className="border border-spark-green/40 text-spark-green py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-spark-green/10 active:scale-95">Receita</button>
                        </div>
                    </div>

                    <div className="space-y-4">
                        <h4 className="text-[10px] font-black uppercase text-white/20 tracking-[0.3em] ml-4">Histórico de Operações</h4>
                        {transacoes.map(t => (
                            <div key={t.id} className="glass p-5 rounded-[1.5rem] flex justify-between items-center border-l-4" style={{ borderLeftColor: t.tipo === 'entrada' ? '#10B981' : (t.categoria === 'Investimento' ? '#FBBF24' : '#0066FF') }}>
                                <div className="flex flex-col gap-1">
                                    <div className="flex items-center gap-2">
                                        <span className={`text-[9px] font-black uppercase tracking-widest ${getCorCategoria(t.categoria)}`}>{t.categoria}</span>
                                        <span className="w-1 h-1 bg-white/10 rounded-full"></span>
                                        <span className="text-[9px] font-black text-spark-cyan/60 uppercase italic">{t.metodo}</span>
                                    </div>
                                    <p className="text-sm font-bold text-white/90">{t.nota}</p>
                                    <p className="text-[10px] font-medium text-white/10">{t.data}</p>
                                </div>
                                <div className="text-right">
                                    <p className={`text-lg font-black italic ${t.tipo === 'entrada' ? 'text-spark-green' : (t.categoria === 'Investimento' ? 'text-spark-gold' : 'text-white')}`}>
                                        {t.tipo === 'entrada' ? '+' : '-'} R$ {t.valor.toLocaleString('pt-BR')}
                                    </p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
