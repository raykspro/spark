<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK - Omni Vault v2.5 | Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent-color: #0066FF; --bg-custom: #020617; --text-color: #f1f5f9; }
        * { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-custom) !important; color: var(--text-color) !important; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-heavy { backdrop-filter: blur(40px); background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-active { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-color); }
        
        .accent-bg { background-color: var(--accent-color) !important; }
        .accent-text { color: var(--accent-color) !important; }
        .accent-border { border-color: var(--accent-color) !important; }
        .shadow-spark { box-shadow: 0 0 25px -5px var(--accent-color); }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        .animate-slide { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-press:active { transform: scale(0.92); filter: brightness(1.3); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen pb-44">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- BIBLIOTECA DE ÍCONES OMNI ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const paths = {
                Home: <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>,
                History: <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>,
                Settings: <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>,
                Fingerprint: <path d="M17.81 4.47c-.08 0-.16-.02-.23-.06C15.66 3.42 14 3 12.01 3c-1.98 0-3.86.47-5.57 1.41-.24.13-.54.04-.67-.2-.13-.24-.04-.55.2-.67C7.82 2.51 9.84 2 12.01 2c2.12 0 3.99.47 6.03 1.56.24.13.33.44.2.68-.1.15-.26.23-.43.23zm3.1 3.53c-.21 0-.41-.13-.47-.33-.28-.93-.78-1.77-1.44-2.51-.16-.18-.15-.46.03-.62.18-.16.46-.15.62.03.75.84 1.31 1.79 1.63 2.84.07.26-.08.52-.34.59-.01 0-.02 0-.03 0zm-17.27.47c-.13 0-.25-.05-.35-.14-.17-.16-.18-.44-.02-.61 3.5-3.74 8.53-3.72 12.05-.01.17.16.17.44.01.61-.16.17-.44.17-.61.01-3.15-2.98-7.7-2.99-10.84.14-.08.01-.16.01-.24 0zM12.01 21c-1.28 0-2.56-.39-3.6-1.16-.21-.15-.26-.44-.11-.65.15-.21.44-.26.65-.11a5.6 5.6 0 005.12 0c.21-.15.5-.1.65.11.15.21.1.5-.11.65-1.04.77-2.32 1.16-3.6 1.16zm5.06-5c-.13 0-.25-.05-.35-.14-.54-.51-1.25-.79-1.99-.79h-5.45c-.75 0-1.45.28-1.99.79-.17.16-.44.15-.61-.02-.16-.17-.15-.44.02-.61.7-.65 1.61-1.01 2.58-1.01h5.45c.97 0 1.88.36 2.58 1.01.17.17.18.44.02.61-.1.09-.22.14-.35.14z"/>,
                PDF: <path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM14 11h1v-2.5h-1V11z"/>,
                ArrowDown: <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>,
                Alimentação: <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>,
                Lazer: <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>,
                Fatura: <path d="M21 7.28V5c0-1.1-.9-2-2-2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-2.28c.59-.35 1-.98 1-1.72V9c0-.74-.41-1.37-1-1.72zM20 9v6h-7V9h7zM5 19V5h14v2h-6c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h6v2H5z"/>,
                Saúde: <path d="M19 3H5c-1.1 0-1.99.9-1.99 2L3 19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/>,
                Transporte: <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>,
                Investimento: <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 17.07l1.5 1.42z"/>,
                Search: <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>,
                Lock: <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>,
                Delete: <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>,
                Camera: <path d="M12 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm9-3h-3.12l-1.88-2H8L6.12 9H3c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2zm-9 10c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{paths[name] || <circle cx="12" cy="12" r="10" />}</svg>;
        };

        // --- COMPONENTE DE AVATAR (MASTER EDIT) ---
        const Avatar = ({ name, photo, size = "12", className = "", onClick }) => (
            <div 
                onClick={onClick}
                className={`w-${size} h-${size} rounded-full accent-bg flex items-center justify-center overflow-hidden shadow-xl border-2 border-white/10 cursor-pointer relative group ${className}`}
            >
                {photo ? (
                    <img src={photo} alt="Master Photo" className="w-full h-full object-cover"/>
                ) : (
                    <img src={`https://api.dicebear.com/8.x/rings/svg?seed=${name}&backgroundColor=transparent`} alt="Master Avatar" className="w-full h-full object-cover"/>
                )}
                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                    <Icon name="Camera" className="w-1/3 h-1/3 text-white" />
                </div>
            </div>
        );

        // --- COMPONENTE DE GRÁFICO ---
        const MiniChart = ({ data, color }) => {
            if(!data || data.length < 2) return <div className="h-full w-full flex items-center justify-center opacity-20 text-[8px]">DADOS INSUFICIENTES</div>;
            const max = Math.max(...data);
            const points = data.map((v, i) => `${(i / (data.length - 1)) * 100},${100 - (v / max) * 80}`).join(' ');
            return (
                <svg viewBox="0 0 100 100" className="w-full h-full preserve-3d">
                    <polyline fill="none" stroke={color} strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" points={points} />
                </svg>
            );
        };

        function App() {
            // --- ESTADOS CORE ---
            const [isAuth, setIsAuth] = useState(false);
            const [tab, setTab] = useState('home');
            const [hasAccount, setHasAccount] = useState(() => !!localStorage.getItem('spark_vault_master_name'));
            
            // --- IDENTIDADE ---
            const [masterName, setMasterName] = useState(() => localStorage.getItem('spark_vault_master_name') || '');
            const [masterPass, setMasterPass] = useState(() => localStorage.getItem('spark_vault_master_pass') || '');
            const [masterAvatar, setMasterAvatar] = useState(() => localStorage.getItem('spark_vault_master_avatar') || 'King');
            const [masterPhoto, setMasterPhoto] = useState(() => localStorage.getItem('spark_vault_master_photo') || null);

            // --- SEGURANÇA ---
            const [isChangingPass, setIsChangingPass] = useState(false);
            const [passForm, setPassForm] = useState({ current: '', new: '', confirm: '' });

            // --- CUSTOMIZAÇÃO ---
            const [accentColor, setAccentColor] = useState(() => localStorage.getItem('spark_accent') || '#0066FF');
            const [bgColor, setBgColor] = useState(() => localStorage.getItem('spark_bg') || '#020617');

            // --- BANCO DE DADOS ---
            const [transacoes, setTransacoes] = useState(() => JSON.parse(localStorage.getItem('spark_vault_v20')) || []);
            const [metas, setMetas] = useState(() => JSON.parse(localStorage.getItem('spark_metas_v20')) || { 
                Alimentação: 800, Lazer: 400, Fatura: 1500, Saúde: 300, Transporte: 400, Investimento: 1000 
            });

            // --- UI/UX INPUTS ---
            const [valor, setValor] = useState('');
            const [nota, setNota] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [parcelas, setParcelas] = useState(1);
            const [filtroBusca, setFiltroBusca] = useState('');
            const [inputPass, setInputPass] = useState('');
            const [inputName, setInputName] = useState('');
            const [showCatMenu, setShowCatMenu] = useState(false);
            const photoInputRef = useRef(null);

            // --- PERSISTÊNCIA & TEMA ---
            useEffect(() => {
                localStorage.setItem('spark_vault_v20', JSON.stringify(transacoes));
                localStorage.setItem('spark_metas_v20', JSON.stringify(metas));
                localStorage.setItem('spark_accent', accentColor);
                localStorage.setItem('spark_bg', bgColor);
                localStorage.setItem('spark_vault_master_name', masterName);
                localStorage.setItem('spark_vault_master_pass', masterPass);
                localStorage.setItem('spark_vault_master_avatar', masterAvatar);
                if(masterPhoto) localStorage.setItem('spark_vault_master_photo', masterPhoto);
                
                document.documentElement.style.setProperty('--accent-color', accentColor);
                document.documentElement.style.setProperty('--bg-custom', bgColor);
            }, [transacoes, metas, accentColor, bgColor, masterName, masterPass, masterAvatar, masterPhoto]);

            // --- LÓGICA DE NEGÓCIO ---
            const saldoGeral = useMemo(() => transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc - t.valor, 0), [transacoes]);
            const gastosPorCategoria = useMemo(() => {
                const map = {};
                Object.keys(metas).forEach(c => {
                    map[c] = transacoes.filter(t => t.tipo === 'saida' && t.categoria === c).reduce((acc, curr) => acc + curr.valor, 0);
                });
                return map;
            }, [transacoes, metas]);

            const handleOperacao = useCallback((tipo) => {
                if (!valor || parseFloat(valor) <= 0) return alert("Senhor, defina um valor válido.");
                const valNum = parseFloat(valor);
                const novas = [];
                const dataStr = new Date().toLocaleDateString('pt-BR');

                for(let i = 1; i <= parcelas; i++) {
                    novas.push({
                        id: Date.now() + Math.random(),
                        valor: valNum / parcelas,
                        tipo,
                        categoria,
                        nota: parcelas > 1 ? `${nota || 'Operação'} (${i}/${parcelas})` : nota || `Operação ${categoria}`,
                        data: dataStr,
                        timestamp: Date.now()
                    });
                }
                setTransacoes(prev => [...novas, ...prev]);
                setValor(''); setNota(''); setParcelas(1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [valor, parcelas, categoria, nota]);

            // --- GERENCIAMENTO DE FOTO ---
            const handlePhotoChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 2 * 1024 * 1024) return alert("Mestre, a imagem deve ter menos de 2MB para manter a performance.");
                    const reader = new FileReader();
                    reader.onloadend = () => setMasterPhoto(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            // --- GERENCIAMENTO DE SENHA ---
            const handlePasswordUpdate = () => {
                if (passForm.current !== masterPass) return alert("Senha atual incorreta, Senhor.");
                if (passForm.new.length < 4) return alert("A nova senha deve ser mais robusta (mínimo 4 caracteres).");
                if (passForm.new !== passForm.confirm) return alert("As confirmações não coincidem.");
                
                setMasterPass(passForm.new);
                setIsChangingPass(false);
                setPassForm({ current: '', new: '', confirm: '' });
                alert("Cofre Re-selado com sucesso!");
            };

            const removerTransacao = (id) => { if(confirm("Confirmar exclusão, Mestre?")) setTransacoes(transacoes.filter(t => t.id !== id)); };

            const exportarPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 297, 'F');
                doc.setTextColor(255, 255, 255); doc.setFontSize(22);
                doc.text("SPARK OMNI VAULT - RELATÓRIO", 20, 30);
                doc.setFontSize(10); doc.setTextColor(150, 150, 150); doc.text(`Titular: Mestre ${masterName} | Saldo: R$ ${saldoGeral.toFixed(2)}`, 20, 40);
                let y = 60;
                doc.setTextColor(255, 255, 255);
                transacoes.slice(0, 40).forEach(t => {
                    doc.text(`${t.data} - ${t.nota.padEnd(25)} | R$ ${t.valor.toFixed(2)} (${t.tipo.toUpperCase()})`, 20, y);
                    y += 8;
                });
                doc.save(`Omni_Vault_${masterName}.pdf`);
            };

            // --- TELA DE ACESSO ---
            if (!isAuth) return (
                <div className="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center p-10 z-[9999] animate-fade">
                    <div className="w-24 h-24 accent-bg rounded-[2rem] flex items-center justify-center text-5xl font-black italic shadow-[0_0_50px_rgba(0,102,255,0.3)] mb-12">S</div>
                    {!hasAccount ? (
                        <div className="w-full max-w-xs space-y-4 text-center">
                            <h2 className="text-xl font-black uppercase tracking-widest opacity-80 mb-6">Inaugurar Cofre</h2>
                            <input type="text" placeholder="NOME DO MESTRE" value={inputName} onChange={e => setInputName(e.target.value)} className="w-full glass p-5 rounded-2xl text-center font-bold outline-none border-none focus:ring-2 ring-blue-500 text-white"/>
                            <input type="password" placeholder="SENHA MESTRE" value={inputPass} onChange={e => setInputPass(e.target.value)} className="w-full glass p-5 rounded-2xl text-center font-bold outline-none border-none focus:ring-2 ring-blue-500 text-white"/>
                            <button onClick={() => { if(inputName && inputPass.length >= 4) { setMasterName(inputName); setMasterPass(inputPass); setHasAccount(true); } }} className="w-full py-5 accent-bg rounded-2xl font-black uppercase text-xs btn-press">Selar Identidade</button>
                        </div>
                    ) : (
                        <div className="w-full max-w-xs space-y-6 flex flex-col items-center">
                            <Avatar name={masterAvatar} photo={masterPhoto} size="24" className="mb-4" />
                            <div className="text-center">
                                <p className="text-[10px] font-black uppercase opacity-40 mb-1">Bem-vindo de volta,</p>
                                <h2 className="text-2xl font-black italic text-white">Mestre {masterName}</h2>
                            </div>
                            <input type="password" placeholder="SENHA" value={inputPass} onChange={e => setInputPass(e.target.value)} className="w-full glass p-6 rounded-[2rem] text-center text-2xl font-black accent-text outline-none border-none"/>
                            <button onClick={() => inputPass === masterPass ? setIsAuth(true) : alert("Acesso Negado.")} className="w-full py-6 accent-bg rounded-[2rem] font-black uppercase text-xs btn-press shadow-spark">Desbloquear Vault</button>
                            <button onClick={() => setIsAuth(true)} className="mt-8 flex flex-col items-center gap-3 opacity-30 hover:opacity-100 transition-opacity">
                                <Icon name="Fingerprint" className="w-12 h-12 text-white" />
                                <span className="text-[9px] font-black uppercase tracking-[0.3em] text-white">Biometria Requerida</span>
                            </button>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="max-w-md mx-auto p-6 animate-slide">
                    <input type="file" ref={photoInputRef} hidden accept="image/*" onChange={handlePhotoChange}/>
                    
                    {/* MODAL DE SENHA */}
                    {isChangingPass && (
                        <div className="fixed inset-0 z-[10000] modal-overlay flex items-center justify-center p-6 animate-fade">
                            <div className="glass-heavy w-full max-w-sm p-8 rounded-[3rem] space-y-6">
                                <h3 className="text-xl font-black italic text-center accent-text">ALTERAR CÓDICE</h3>
                                <div className="space-y-4">
                                    <input type="password" placeholder="SENHA ATUAL" className="w-full glass p-4 rounded-2xl outline-none text-white font-bold" value={passForm.current} onChange={e => setPassForm({...passForm, current: e.target.value})}/>
                                    <input type="password" placeholder="NOVA SENHA" className="w-full glass p-4 rounded-2xl outline-none text-white font-bold" value={passForm.new} onChange={e => setPassForm({...passForm, new: e.target.value})}/>
                                    <input type="password" placeholder="CONFIRMAR NOVA" className="w-full glass p-4 rounded-2xl outline-none text-white font-bold" value={passForm.confirm} onChange={e => setPassForm({...passForm, confirm: e.target.value})}/>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setIsChangingPass(false)} className="py-4 rounded-2xl glass font-black uppercase text-[10px] text-white">Cancelar</button>
                                    <button onClick={handlePasswordUpdate} className="py-4 rounded-2xl accent-bg font-black uppercase text-[10px] text-white shadow-spark">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER STATUS */}
                    <header className="flex justify-between items-center mb-10">
                        <div className="flex items-center gap-4">
                            <Avatar name={masterAvatar} photo={masterPhoto} size="14" onClick={() => photoInputRef.current.click()}/>
                            <div>
                                <h1 className="text-[10px] font-black uppercase opacity-40 tracking-tighter">Patrimônio Líquido</h1>
                                <div className="flex items-baseline gap-1">
                                    <span className="text-xs font-bold opacity-40 italic">R$</span>
                                    <span className={`text-4xl font-black italic tracking-tighter ${saldoGeral >= 0 ? 'text-emerald-400' : 'text-rose-500'}`}>
                                        {Math.abs(saldoGeral).toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <button onClick={exportarPDF} className="glass p-4 rounded-2xl accent-text btn-press"><Icon name="PDF" /></button>
                    </header>

                    {/* ABAS */}
                    {tab === 'home' && (
                        <div className="space-y-8 animate-fade">
                            <div className="glass rounded-[3.5rem] p-8 relative overflow-hidden border-b-4 accent-border">
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <p className="text-[10px] font-black uppercase opacity-50 mb-1">{categoria}</p>
                                        <h3 className="text-5xl font-black italic tracking-tighter text-white">R$ {gastosPorCategoria[categoria].toLocaleString('pt-BR')}</h3>
                                    </div>
                                    <div className="w-16 h-16 opacity-20"><MiniChart data={[10, 40, 25, 70, 45, 90]} color={accentColor} /></div>
                                </div>
                                <div className="space-y-3">
                                    <div className="flex justify-between text-[10px] font-black uppercase">
                                        <span className="accent-text">Consumo: {Math.round((gastosPorCategoria[categoria] / metas[categoria]) * 100)}%</span>
                                        <span className="opacity-30 text-white">Limite: R$ {metas[categoria]}</span>
                                    </div>
                                    <div className="h-2.5 w-full bg-white/5 rounded-full overflow-hidden">
                                        <div className="h-full accent-bg shadow-[0_0_15px_var(--accent-color)]" style={{ width: `${Math.min((gastosPorCategoria[categoria] / metas[categoria]) * 100, 100)}%` }}></div>
                                    </div>
                                </div>
                            </div>

                            <section className="glass rounded-[3rem] p-8 space-y-6">
                                <div className="text-center">
                                    <input type="number" inputMode="decimal" placeholder="0,00" value={valor} onChange={e => setValor(e.target.value)} className="w-full bg-transparent text-center text-7xl font-black outline-none accent-text placeholder:opacity-5"/>
                                    <input type="text" placeholder="DESCRIÇÃO DA OPERAÇÃO" value={nota} onChange={e => setNota(e.target.value)} className="w-full bg-transparent text-center text-[10px] font-black opacity-30 outline-none uppercase tracking-widest mt-2 text-white"/>
                                </div>
                                <div className="relative">
                                    <button onClick={() => setShowCatMenu(!showCatMenu)} className="w-full flex justify-between items-center glass p-6 rounded-2xl accent-text font-black text-xs uppercase tracking-widest">
                                        <div className="flex items-center gap-3"><Icon name={categoria} className="w-5 h-5"/> {categoria}</div>
                                        <Icon name="ArrowDown" className={`w-5 h-5 transition-transform ${showCatMenu ? 'rotate-180' : ''}`}/>
                                    </button>
                                    {showCatMenu && (
                                        <div className="absolute top-full left-0 right-0 mt-3 glass rounded-3xl p-3 grid grid-cols-2 gap-2 z-[100] animate-slide shadow-2xl">
                                            {Object.keys(metas).map(cat => (
                                                <button key={cat} onClick={() => {setCategoria(cat); setShowCatMenu(false);}} className={`p-4 rounded-2xl text-[10px] font-black uppercase flex items-center gap-3 ${categoria === cat ? 'accent-bg text-white' : 'bg-white/5 opacity-60 text-white'}`}>
                                                    <Icon name={cat} className="w-4 h-4"/> {cat}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                              /* CONTINUAÇÃO DO CÓDIGO (A partir da linha 332) */
                                    <button onClick={handlePasswordUpdate} className="py-4 rounded-2xl accent-bg font-black uppercase text-[10px] text-white shadow-spark">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* SELEÇÃO DE CATEGORIAS (DROPDOWN) */}
                    {showCatMenu && (
                        <div className="fixed inset-0 z-[5000] flex items-end justify-center p-6 animate-fade">
                            <div className="absolute inset-0 bg-black/60" onClick={() => setShowCatMenu(false)}></div>
                            <div className="glass-heavy w-full max-w-sm p-8 rounded-[3rem] grid grid-cols-2 gap-4 relative z-10">
                                {Object.keys(metas).map(cat => (
                                    <button key={cat} onClick={() => { setCategoria(cat); setShowCatMenu(false); }} 
                                        className={`p-6 rounded-2xl flex flex-col items-center gap-3 transition-all ${categoria === cat ? 'accent-bg text-white scale-105' : 'glass opacity-40 text-white'}`}>
                                        <Icon name={cat} />
                                        <span className="text-[9px] font-black uppercase">{cat}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* CONTEÚDO DAS ABAS */}
                    <main className="pb-32">
                        {tab === 'home' && (
                            <div className="space-y-8 animate-fade">
                                {/* CARD DE SALDO / META */}
                                <div className="glass rounded-[3.5rem] p-8 relative overflow-hidden border-b-4 accent-border">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <p className="text-[10px] font-black uppercase opacity-50 mb-1">{categoria}</p>
                                            <h3 className="text-4xl font-black italic tracking-tighter text-white">
                                                R$ {gastosPorCategoria[categoria].toLocaleString('pt-BR')}
                                            </h3>
                                        </div>
                                        <div className="w-16 h-16 opacity-20">
                                            <MiniChart data={[10, 40, 25, 70, 45, 90]} color={accentColor} />
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-[10px] font-black uppercase">
                                            <span className="accent-text">Uso: {Math.round((gastosPorCategoria[categoria] / metas[categoria]) * 100)}%</span>
                                            <span className="opacity-30 text-white text-right">Teto: R$ {metas[cat]}</span>
                                        </div>
                                        <div className="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                                            <div className="h-full accent-bg shadow-spark" 
                                                style={{ width: `${Math.min((gastosPorCategoria[categoria] / metas[cat]) * 100, 100)}%` }}></div>
                                        </div>
                                    </div>
                                </div>

                                {/* BOTÕES DE AÇÃO PRINCIPAL */}
                                <div className="grid grid-cols-2 gap-6">
                                    <button onClick={() => handleOperacao('saida')} className="py-8 glass-heavy rounded-[2.5rem] flex flex-col items-center gap-2 border-b-4 border-rose-500/50 btn-press">
                                        <span className="text-rose-500 font-black text-2xl">-</span>
                                        <span className="text-[10px] font-black uppercase opacity-50 text-white">Retirar</span>
                                    </button>
                                    <button onClick={() => handleOperacao('entrada')} className="py-8 glass-heavy rounded-[2.5rem] flex flex-col items-center gap-2 border-b-4 border-emerald-500/50 btn-press">
                                        <span className="text-emerald-500 font-black text-2xl">+</span>
                                        <span className="text-[10px] font-black uppercase opacity-50 text-white">Injetar</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {tab === 'history' && (
                            <div className="space-y-6 animate-fade">
                                <div className="flex items-center gap-4 glass p-4 rounded-3xl">
                                    <Icon name="Search" className="opacity-30 ml-2" />
                                    <input type="text" placeholder="BUSCAR REGISTRO..." value={filtroBusca} onChange={e => setFiltroBusca(e.target.value)}
                                        className="bg-transparent flex-1 outline-none font-black text-xs uppercase tracking-widest text-white"/>
                                </div>
                                <div className="space-y-3">
                                    {transacoes.filter(t => t.nota.toLowerCase().includes(filtroBusca.toLowerCase())).map(t => (
                                        <div key={t.id} className="glass p-5 rounded-3xl flex justify-between items-center group">
                                            <div className="flex items-center gap-4">
                                                <div className={`p-3 rounded-2xl ${t.tipo === 'entrada' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-rose-500/10 text-rose-500'}`}>
                                                    <Icon name={t.categoria} className="w-5 h-5"/>
                                                </div>
                                                <div>
                                                    <h4 className="text-[11px] font-black uppercase text-white">{t.nota}</h4>
                                                    <p className="text-[9px] opacity-30 font-bold">{t.data} • {t.categoria}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className={`text-xs font-black italic ${t.tipo === 'entrada' ? 'text-emerald-400' : 'text-white'}`}>
                                                    {t.tipo === 'entrada' ? '+' : '-'} {t.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                                                </span>
                                                <button onClick={() => removerTransacao(t.id)} className="opacity-0 group-hover:opacity-100 text-rose-500 transition-opacity">
                                                    <Icon name="Delete" className="w-4 h-4"/>
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'config' && (
                            <div className="space-y-6 animate-fade">
                                <div className="glass rounded-[3rem] p-8 space-y-8">
                                    <h3 className="text-xs font-black uppercase opacity-30 tracking-widest text-center">Protocolos de Customização</h3>
                                    
                                    <div className="space-y-4">
                                        <p className="text-[9px] font-black uppercase opacity-40 ml-2">Cor de Acento</p>
                                        <div className="flex justify-between glass p-4 rounded-2xl">
                                            {['#0066FF', '#8B5CF6', '#EC4899', '#10B981', '#F59E0B'].map(c => (
                                                <button key={c} onClick={() => setAccentColor(c)} 
                                                    className={`w-8 h-8 rounded-full border-2 ${accentColor === c ? 'border-white scale-125' : 'border-transparent opacity-50'}`} 
                                                    style={{backgroundColor: c}}></button>
                                            ))}
                                        </div>
                                    </div>

                                    <button onClick={() => setIsChangingPass(true)} className="w-full glass p-6 rounded-2xl flex justify-between items-center btn-press">
                                        <span className="text-[10px] font-black uppercase tracking-widest text-white">Redefinir Códice de Acesso</span>
                                        <Icon name="Lock" className="w-4 h-4 opacity-30" />
                                    </button>

                                    <div className="pt-6 border-t border-white/5 space-y-4">
                                        <p className="text-[9px] font-black uppercase opacity-40 ml-2 text-center">Ajustar Limites de Categoria</p>
                                        {Object.keys(metas).map(cat => (
                                            <div key={cat} className="flex items-center gap-4 glass p-4 rounded-2xl">
                                                <Icon name={cat} className="w-4 h-4 opacity-30" />
                                                <span className="text-[10px] font-black uppercase flex-1 text-white">{cat}</span>
                                                <input type="number" value={metas[cat]} onChange={e => setMetas({...metas, [cat]: parseFloat(e.target.value)})}
                                                    className="bg-transparent w-20 text-right font-black accent-text outline-none text-xs"/>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* NAVEGAÇÃO OMNI */}
                    <nav className="fixed bottom-8 left-6 right-6 glass-heavy rounded-[2.5rem] p-4 flex items-center justify-around shadow-2xl z-50">
                        <button onClick={() => setTab('perfil')} className={`flex-1 flex justify-center transition-all ${tab === 'perfil' ? 'scale-125' : 'opacity-20 grayscale'}`}>
                            <Avatar name={masterAvatar} photo={masterPhoto} size="8" />
                        </button>
                        
                        <button onClick={() => setTab('history')} className={`flex-1 flex justify-center py-4 rounded-3xl ${tab === 'history' ? 'accent-text bg-white/5' : 'opacity-20 text-white'}`}>
                            <Icon name="History" />
                        </button>

                        <button onClick={() => setTab('home')} className={`flex-[1.5] flex justify-center py-5 rounded-[2.5rem] relative ${tab === 'home' ? 'accent-bg text-white shadow-spark scale-110' : 'opacity-20 text-white'}`}>
                            <Icon name="Home" />
                            {tab === 'home' && <span className="absolute -top-1 -right-1 w-3 h-3 bg-white rounded-full animate-ping"></span>}
                        </button>

                        <button onClick={() => setTab('config')} className={`flex-1 flex justify-center py-4 rounded-3xl ${tab === 'config' ? 'accent-text bg-white/5' : 'opacity-20 text-white'}`}>
                            <Icon name="Settings" />
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
