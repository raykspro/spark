<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK - Ignition Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { spark: { dark: '#020617', blue: '#0066FF', cyan: '#00F0FF', green: '#10B981', gold: '#FBBF24' } } } } }
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        .spark-gradient { background: linear-gradient(90deg, #0066FF 0%, #00F0FF 100%); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .spark-scrollbar::-webkit-scrollbar { height: 4px; }
        .spark-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [transacoes, setTransacoes] = useState(() => JSON.parse(localStorage.getItem('spark_db_v6')) || []);
            const [metas, setMetas] = useState(() => JSON.parse(localStorage.getItem('spark_metas')) || {
                Geral: 2000, Alimentação: 500, Lazer: 300, Fatura: 1000, Transporte: 200, Saúde: 200, Investimento: 500
            });
            
            const [aba, setAba] = useState('home'); // home, config, stats
            const [valor, setValor] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [metodo, setMetodo] = useState('Pix');
            const [nota, setNota] = useState('');

            useEffect(() => { localStorage.setItem('spark_db_v6', JSON.stringify(transacoes)); }, [transacoes]);
            useEffect(() => { localStorage.setItem('spark_metas', JSON.stringify(metas)); }, [metas]);

            const totalGeralGasto = transacoes.reduce((acc, t) => t.tipo === 'saida' ? acc + t.valor : acc, 0);
            const saldoReal = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : (t.metodo !== 'Crédito' ? acc - t.valor : acc), 0);
            const faturaEstimada = transacoes.reduce((acc, t) => (t.tipo === 'saida' && t.metodo === 'Crédito') ? acc + t.valor : acc, 0);

            const lancar = (tipo) => {
                if (!valor) return;
                const nova = { id: Date.now(), valor: parseFloat(valor), tipo, categoria, metodo, nota: nota || `Operação ${categoria}`, data: new Date().toLocaleDateString('pt-BR') };
                setTransacoes([nova, ...transacoes]);
                setValor(''); setNota('');
            };

            const getConsumoCat = (cat) => transacoes.reduce((acc, t) => (t.tipo === 'saida' && t.categoria === cat) ? acc + t.valor : acc, 0);

            // COMPONENTE DE ESTATÍSTICAS
            const StatsPanel = () => (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <h2 className="text-2xl font-black italic mb-6">DIAGNÓSTICO DO CICLO</h2>
                    {Object.keys(metas).filter(k => k !== 'Geral').map(cat => {
                        const gasto = getConsumoCat(cat);
                        const perc = Math.min(Math.round((gasto / metas[cat]) * 100), 100);
                        return (
                            <div key={cat} className="glass p-5 rounded-2xl border-white/5">
                                <div className="flex justify-between items-center mb-3">
                                    <span className="text-[10px] font-black uppercase tracking-widest text-white/40">{cat}</span>
                                    <span className={`text-[10px] font-black ${perc > 90 ? 'text-red-500' : 'text-spark-cyan'}`}>{perc}%</span>
                                </div>
                                <div className="flex justify-between items-end mb-3">
                                    <p className="text-xl font-black italic">R$ {gasto.toLocaleString('pt-BR')}</p>
                                    <p className="text-[9px] font-bold text-white/10 uppercase">Teto: R$ {metas[cat]}</p>
                                </div>
                                <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                                    <div className={`h-full transition-all duration-1000 ${perc > 90 ? 'bg-red-500' : 'bg-spark-blue'}`} style={{ width: `${perc}%` }}></div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );

            if (aba === 'config') {
                return (
                    <div className="min-h-screen p-6 max-w-2xl mx-auto">
                        <button onClick={() => setAba('home')} className="text-spark-cyan font-black uppercase text-[10px] mb-8 flex items-center gap-2">← Operação</button>
                        <h2 className="text-3xl font-black italic mb-6">LIMITES</h2>
                        <div className="space-y-3">
                            {Object.keys(metas).map(cat => (
                                <div key={cat} className="glass p-4 rounded-xl flex justify-between items-center border-white/5">
                                    <span className="font-black text-[9px] uppercase tracking-widest text-white/30">{cat}</span>
                                    <input type="number" value={metas[cat]} onChange={(e) => setMetas({...metas, [cat]: parseFloat(e.target.value) || 0})} className="bg-transparent text-right font-black text-spark-cyan outline-none w-24"/>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 max-w-2xl mx-auto pb-28">
                    {/* Header Minimalista */}
                    <div className="flex justify-between items-center mb-10 pt-2 px-2">
                        <div className="flex gap-4 items-center">
                            <div className="w-10 h-10 bg-spark-blue rounded-xl flex items-center justify-center font-black italic text-xl shadow-lg shadow-spark-blue/20">S</div>
                            <div>
                                <p className="text-[8px] text-white/30 uppercase font-black tracking-widest">Saldo Real</p>
                                <p className="text-lg font-black italic text-spark-green">R$ {saldoReal.toLocaleString('pt-BR')}</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setAba(aba === 'stats' ? 'home' : 'stats')} className={`p-3 rounded-xl border transition-all ${aba === 'stats' ? 'bg-spark-cyan/10 border-spark-cyan text-spark-cyan' : 'glass border-white/10 text-white/40'}`}>
                                {aba === 'stats' ? '✕' : '📊'}
                            </button>
                            <button onClick={() => setAba('config')} className="glass p-3 rounded-xl border-white/10 text-white/40">⚙️</button>
                        </div>
                    </div>

                    {aba === 'stats' ? <StatsPanel /> : (
                        <>
                            {/* Dashboard Tanque */}
                            <div className="glass rounded-[2.5rem] p-8 mb-8 border-white/5 relative overflow-hidden">
                                <div className="flex justify-between items-end mb-4">
                                    <div>
                                        <h3 className="text-spark-blue text-[9px] font-black uppercase tracking-widest mb-1 italic">Consumo Global</h3>
                                        <p className="text-4xl font-black italic">R$ {totalGeralGasto.toLocaleString('pt-BR')}</p>
                                    </div>
                                    <span className="text-spark-cyan font-black text-2xl italic">{Math.min(Math.round((totalGeralGasto/metas.Geral)*100),100)}%</span>
                                </div>
                                <div className="h-2 w-full bg-white/5 rounded-full p-[1px] border border-white/5 overflow-hidden">
                                    <div className="h-full spark-gradient rounded-full shadow-[0_0_15px_rgba(0,102,255,0.4)] transition-all duration-1000" style={{ width: `${Math.min((totalGeralGasto/metas.Geral)*100),100}%` }}></div>
                                </div>
                            </div>

                            {/* Injetor de Gastos */}
                            <div className="glass rounded-[2.5rem] p-6 mb-8 border-spark-blue/20">
                                <input type="number" value={valor} onChange={(e) => setValor(e.target.value)} placeholder="0.00" className="w-full bg-transparent text-center text-7xl font-black text-white outline-none mb-4"/>
                                <input type="text" value={nota} onChange={(e) => setNota(e.target.value)} placeholder="Descrição" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 mb-6 text-center text-sm font-bold outline-none"/>

                                <div className="flex gap-2 overflow-x-auto pb-4 mb-6 spark-scrollbar">
                                    {Object.keys(metas).filter(k => k !== 'Geral').map(cat => (
                                        <button key={cat} onClick={() => setCategoria(cat)} className={`px-5 py-3 rounded-xl text-[10px] font-black uppercase transition-all flex-shrink-0 ${categoria === cat ? 'spark-gradient text-white shadow-xl scale-105' : 'bg-white/5 text-white/30 border border-white/5'}`}>
                                            {cat}
                                        </button>
                                    ))}
                                </div>

                                <div className="flex gap-2 mb-8">
                                    {["Pix", "Débito", "Crédito", "Dinheiro"].map(m => (
                                        <button key={m} onClick={() => setMetodo(m)} className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase border ${metodo === m ? 'border-spark-cyan text-spark-cyan bg-spark-cyan/5' : 'border-white/5 text-white/20'}`}>{m}</button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => lancar('saida')} className="bg-spark-blue py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-spark-blue/20">Registrar Gasto</button>
                                    <button onClick={() => lancar('entrada')} className="border border-spark-green/30 text-spark-green py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest">Entrada</button>
                                </div>
                            </div>

                            {/* Log Compacto */}
                            <div className="space-y-3">
                                {transacoes.slice(0, 5).map(t => (
                                    <div key={t.id} className="glass p-4 rounded-2xl flex justify-between items-center border-l-4" style={{ borderLeftColor: t.tipo === 'entrada' ? '#10B981' : (t.metodo === 'Crédito' ? '#FF4444' : '#0066FF') }}>
                                        <div>
                                            <p className="text-[9px] font-black text-white/20 uppercase tracking-widest mb-1">{t.categoria} • {t.metodo}</p>
                                            <p className="text-sm font-bold text-white/80">{t.nota}</p>
                                        </div>
                                        <p className={`text-lg font-black italic ${t.tipo === 'entrada' ? 'text-spark-green' : 'text-white'}`}>
                                            {t.tipo === 'entrada' ? '+' : '-'} {t.valor.toLocaleString('pt-BR')}
                                        </p>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
