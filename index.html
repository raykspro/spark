<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK OMNI - PRO VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent-color: #0066FF; --bg-custom: #020617; --text-color: #f1f5f9; }
        * { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-custom) !important; color: var(--text-color) !important; margin: 0; overflow-x: hidden; }
        
        /* Vidro e Efeitos */
        .glass { backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-heavy { backdrop-filter: blur(40px); background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); }
        .accent-bg { background-color: var(--accent-color) !important; }
        .accent-text { color: var(--accent-color) !important; }
        .accent-border { border-color: var(--accent-color) !important; }
        
        /* Utilitários de Input */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-press:active { transform: scale(0.94); filter: brightness(1.2); }
        
        /* Animações */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        .glow-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="min-h-screen pb-40">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- COMPONENTE DE ÍCONES (BIBLIOTECA EXPANDIDA) ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const paths = {
                Home: <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>,
                History: <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>,
                Settings: <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>,
                Fingerprint: <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>,
                PDF: <path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM14 11h1v-2.5h-1V11z"/>,
                Alimentação: <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>,
                Lazer: <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>,
                Fatura: <path d="M21 7.28V5c0-1.1-.9-2-2-2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-2.28c.59-.35 1-.98 1-1.72V9c0-.74-.41-1.37-1-1.72zM20 9v6h-7V9h7zM5 19V5h14v2h-6c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h6v2H5z"/>,
                Saúde: <path d="M19 3H5c-1.1 0-1.99.9-1.99 2L3 19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/>,
                Transporte: <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>,
                Investimento: <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 17.07l1.5 1.42z"/>
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{paths[name] || <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>}</svg>;
        };

        function App() {
            // --- ESTADOS CORE ---
            const [isAuth, setIsAuth] = useState(false);
            const [aba, setAba] = useState('home');
            const [accentColor, setAccentColor] = useState(() => localStorage.getItem('spark_accent') || '#0066FF');
            const [bgColor, setBgColor] = useState(() => localStorage.getItem('spark_bg') || '#020617');
            
            // --- BANCO DE DADOS ---
            const [transacoes, setTransacoes] = useState(() => JSON.parse(localStorage.getItem('spark_vault_v10')) || []);
            const [metas, setMetas] = useState(() => JSON.parse(localStorage.getItem('spark_metas')) || { 
                Alimentação: 800, Lazer: 400, Fatura: 1500, Saúde: 300, Transporte: 400, Investimento: 1000 
            });

            // --- ESTADOS DE INPUT ---
            const [valor, setValor] = useState('');
            const [nota, setNota] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [parcelas, setParcelas] = useState(1);
            const [filtroBusca, setFiltroBusca] = useState('');

            // --- PRESETS DE TEMA ---
            const presets = [
                { nome: 'Cyber Blue', accent: '#0066FF', bg: '#020617' },
                { nome: 'Emerald', accent: '#10B981', bg: '#061a14' },
                { nome: 'Crimson', accent: '#EF4444', bg: '#1a0606' },
                { nome: 'Gold', accent: '#FBBF24', bg: '#1a1606' },
                { nome: 'Amethyst', accent: '#A855F7', bg: '#14061a' }
            ];

            // --- EFEITOS ---
            useEffect(() => {
                localStorage.setItem('spark_vault_v10', JSON.stringify(transacoes));
                localStorage.setItem('spark_metas', JSON.stringify(metas));
                localStorage.setItem('spark_accent', accentColor);
                localStorage.setItem('spark_bg', bgColor);
                document.documentElement.style.setProperty('--accent-color', accentColor);
                document.documentElement.style.setProperty('--bg-custom', bgColor);
            }, [transacoes, metas, accentColor, bgColor]);

            // --- LÓGICA FINANCEIRA ---
            const saldoGeral = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc - t.valor, 0);
            const gastoCat = transacoes.filter(t => t.tipo === 'saida' && t.categoria === categoria).reduce((acc, t) => acc + t.valor, 0);

            const handleLancamento = (tipo) => {
                if (!valor || valor <= 0) return;
                const vTotal = parseFloat(valor);
                const novasTransacoes = [];
                const dataAtual = new Date().toLocaleDateString('pt-BR');

                for (let i = 1; i <= parcelas; i++) {
                    novasTransacoes.push({
                        id: Date.now() + i,
                        valor: vTotal / parcelas,
                        tipo,
                        categoria,
                        nota: parcelas > 1 ? `${nota || 'Operação'} (${i}/${parcelas})` : nota || `Operação ${categoria}`,
                        data: dataAtual
                    });
                }

                setTransacoes([...novasTransacoes, ...transacoes]);
                setValor(''); setNota(''); setParcelas(1);
            };

            const exportarPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFont("helvetica", "bold");
                doc.text("SPARK OMNI - RELATÓRIO DO MESTRE", 20, 20);
                doc.setFontSize(10);
                let y = 40;
                transacoes.slice(0, 40).forEach(t => {
                    doc.text(`${t.data} | ${t.nota} | ${t.categoria}: R$ ${t.valor.toFixed(2)}`, 20, y);
                    y += 7;
                });
                doc.save("Spark_Relatorio.pdf");
            };

            // --- TELA DE LOGIN ---
            if (!isAuth) return (
                <div className="fixed inset-0 flex flex-col items-center justify-center p-8 z-[1000] animate-slide-up">
                    <div className="w-28 h-28 rounded-[2.5rem] accent-bg flex items-center justify-center text-6xl font-black italic text-white shadow-[0_20px_50px_rgba(0,0,0,0.5)] mb-16">S</div>
                    <div className="text-center mb-12">
                        <h1 className="text-xl font-black uppercase tracking-widest opacity-80">Omni Vault</h1>
                        <p className="text-[10px] font-bold opacity-30 mt-2 italic">Aguardando identificação do Senhor</p>
                    </div>
                    <button onClick={() => setIsAuth(true)} className="glass-heavy w-full max-w-xs py-10 rounded-[3rem] flex flex-col items-center gap-6 btn-press group">
                        <div className="relative">
                            <Icon name="Fingerprint" className="w-16 h-16 accent-text group-hover:scale-110 transition-transform" />
                            <div className="absolute inset-0 accent-bg blur-2xl opacity-20 animate-pulse"></div>
                        </div>
                        <span className="text-[11px] font-black uppercase tracking-[0.3em] opacity-40">Validar Acesso</span>
                    </button>
                </div>
            );

            return (
                <div className="p-5 max-w-2xl mx-auto space-y-8 animate-slide-up">
                    
                    {/* --- HEADER --- */}
                    <div className="flex justify-between items-center py-4">
                        <div className="flex gap-4 items-center">
                            <div className="w-14 h-14 rounded-2xl accent-bg flex items-center justify-center text-3xl font-black italic text-white shadow-xl">S</div>
                            <div>
                                <p className="text-[10px] font-black uppercase opacity-40 tracking-tighter">Patrimônio Atual</p>
                                <p className="text-3xl font-black italic text-emerald-400 tracking-tight">R$ {saldoGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={exportarPDF} className="glass p-4 rounded-2xl accent-text btn-press"><Icon name="PDF" className="w-5 h-5"/></button>
                            <button onClick={() => setAba('config')} className="glass p-4 rounded-2xl opacity-40 btn-press"><Icon name="Settings" className="w-5 h-5"/></button>
                        </div>
                    </div>

                    {aba === 'home' && (
                        <div className="space-y-8 animate-slide-up">
                            
                            {/* --- DASHBOARD DE TETO --- */}
                            <div className="glass rounded-[3.5rem] p-10 text-center relative overflow-hidden border-b-4 accent-border">
                                <div className="absolute top-6 right-10 flex items-center gap-2">
                                    <div className="glow-dot accent-bg"></div>
                                    <span className="text-[9px] font-black uppercase opacity-30">Monitor Ativo</span>
                                </div>
                                <h3 className="text-[10px] font-black uppercase mb-2 opacity-50 tracking-widest">Gasto em {categoria}</h3>
                                <p className="text-6xl font-black italic tracking-tighter mb-4">R$ {gastoCat.toLocaleString('pt-BR')}</p>
                                
                                <div className="flex justify-center gap-4 mb-6">
                                    <div className="px-4 py-1 rounded-full bg-white/5 text-[10px] font-black uppercase accent-text">
                                        {Math.round((gastoCat/metas[categoria])*100)}% do teto
                                    </div>
                                    <div className="px-4 py-1 rounded-full bg-white/5 text-[10px] font-black uppercase opacity-40">
                                        Meta: R$ {metas[categoria]}
                                    </div>
                                </div>

                                <div className="h-3 w-full bg-white/5 rounded-full overflow-hidden">
                                    <div 
                                        className="h-full accent-bg shadow-[0_0_20px_var(--accent-color)]" 
                                        style={{ width: `${Math.min((gastoCat/metas[categoria])*100, 100)}%` }}
                                    ></div>
                                </div>
                            </div>

                            {/* --- ÁREA DE LANÇAMENTO --- */}
                            <div className="glass rounded-[3rem] p-8 space-y-8">
                                <div className="space-y-2">
                                    <input 
                                        type="number" 
                                        value={valor} 
                                        onChange={(e) => setValor(e.target.value)} 
                                        placeholder="0.00" 
                                        className="w-full bg-transparent text-center text-7xl font-black outline-none accent-text placeholder:opacity-10"
                                    />
                                    <input 
                                        type="text" 
                                        value={nota} 
                                        onChange={(e) => setNota(e.target.value)} 
                                        placeholder="Título da operação..." 
                                        className="w-full bg-transparent text-center text-sm font-bold opacity-30 outline-none uppercase tracking-widest"
                                    />
                                </div>

                                {/* Controle de Parcelas */}
                                <div className="flex flex-col items-center gap-4 py-4 glass rounded-3xl">
                                    <span className="text-[9px] font-black uppercase opacity-40">Parcelamento</span>
                                    <div className="flex items-center gap-10">
                                        <button onClick={() => setParcelas(p => Math.max(1, p-1))} className="w-12 h-12 glass rounded-2xl flex items-center justify-center font-black text-xl btn-press">-</button>
                                        <span className="text-2xl font-black italic accent-text">{parcelas}x</span>
                                        <button onClick={() => setParcelas(p => p+1)} className="w-12 h-12 glass rounded-2xl flex items-center justify-center font-black text-xl btn-press">+</button>
                                    </div>
                                </div>

                                {/* Menu Flutuante de Categorias */}
                                <div className="flex gap-3 overflow-x-auto no-scrollbar py-2">
                                    {Object.keys(metas).map(cat => (
                                        <button 
                                            key={cat} 
                                            onClick={() => setCategoria(cat)}
                                            className={`flex-shrink-0 px-8 py-5 rounded-[2rem] text-[10px] font-black uppercase flex items-center gap-3 transition-all btn-press ${categoria === cat ? 'accent-bg text-white shadow-2xl scale-105' : 'glass opacity-30'}`}
                                        >
                                            <Icon name={cat} className="w-4 h-4"/> {cat}
                                        </button>
                                    ))}
                                </div>

                                {/* Ações Principais */}
                                <div className="grid grid-cols-2 gap-5">
                                    <button 
                                        onClick={() => handleLancamento('saida')} 
                                        className="py-8 rounded-[2.5rem] bg-rose-600 text-white font-black uppercase text-xs shadow-xl shadow-rose-900/20 btn-press"
                                    >
                                        Debitar
                                    </button>
                                    <button 
                                        onClick={() => handleLancamento('entrada')} 
                                        className="py-8 rounded-[2.5rem] border-4 border-emerald-500 text-emerald-500 font-black uppercase text-xs btn-press"
                                    >
                                        Aportar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {aba === 'history' && (
                        <div className="space-y-6 animate-slide-up">
                            <div className="relative">
                                <input 
                                    type="text" 
                                    placeholder="PESQUISAR NO COFRE..." 
                                    value={filtroBusca}
                                    onChange={(e) => setFiltroBusca(e.target.value)}
                                    className="w-full glass p-6 rounded-[2rem] text-xs font-black outline-none uppercase tracking-widest accent-text"
                                />
                            </div>
                            
                            <div className="space-y-4">
                                {transacoes
                                    .filter(t => t.nota.toLowerCase().includes(filtroBusca.toLowerCase()) || t.categoria.toLowerCase().includes(filtroBusca.toLowerCase()))
                                    .map(t => (
                                    <div key={t.id} className="glass p-6 rounded-[2rem] flex justify-between items-center group relative overflow-hidden">
                                        <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${t.tipo === 'entrada' ? 'bg-emerald-500' : 'bg-rose-600'}`}></div>
                                        <div className="flex gap-5 items-center">
                                            <div className="p-4 rounded-2xl bg-white/5 opacity-50">
                                                <Icon name={t.categoria} className="w-6 h-6" />
                                            </div>
                                            <div>
                                                <p className="font-black text-sm italic uppercase tracking-tighter">{t.nota}</p>
                                                <p className="text-[9px] opacity-30 font-bold uppercase">{t.data} • {t.categoria}</p>
                                            </div>
                                        </div>
                                        <div className="text-right flex items-center gap-6">
                                            <p className={`text-lg font-black italic ${t.tipo === 'entrada' ? 'text-emerald-400' : 'opacity-60'}`}>
                                                {t.tipo === 'saida' ? '-' : '+'} R$ {t.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                                            </p>
                                            <button 
                                                onClick={() => setTransacoes(transacoes.filter(x => x.id !== t.id))}
                                                className="opacity-0 group-hover:opacity-100 text-rose-500 p-2 glass rounded-xl btn-press"
                                            >
                                                <Icon name="History" className="w-4 h-4 rotate-45" />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {aba === 'config' && (
                        <div className="space-y-8 animate-slide-up pb-10">
                            
                            {/* Laboratório Cromático */}
                            <div className="glass p-10 rounded-[3rem] space-y-6">
                                <h2 className="text-xs font-black uppercase opacity-40 text-center tracking-widest">Laboratório Cromático</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {presets.map(p => (
                                        <button 
                                            key={p.nome} 
                                            onClick={() => { setAccentColor(p.accent); setBgColor(p.bg); }}
                                            className="p-5 rounded-2xl glass flex items-center gap-4 btn-press text-[10px] font-black uppercase"
                                        >
                                            <div className="w-6 h-6 rounded-full" style={{backgroundColor: p.accent}}></div>
                                            {p.nome}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Gerenciamento de Metas */}
                            <div className="glass p-10 rounded-[3rem] space-y-6">
                                <h2 className="text-xs font-black uppercase opacity-40 text-center tracking-widest">Teto por Categoria</h2>
                                <div className="space-y-4">
                                    {Object.keys(metas).map(cat => (
                                        <div key={cat} className="flex justify-between items-center glass p-4 rounded-2xl">
                                            <div className="flex items-center gap-3">
                                                <Icon name={cat} className="w-4 h-4 opacity-40" />
                                                <span className="text-[10px] font-black uppercase opacity-60">{cat}</span>
                                            </div>
                                            <input 
                                                type="number" 
                                                value={metas[cat]} 
                                                onChange={(e) => setMetas({...metas, [cat]: parseFloat(e.target.value) || 0})}
                                                className="bg-transparent text-right font-black accent-text outline-none w-28"
                                            />
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Backup e Importação */}
                            <div className="flex gap-4">
                                <button onClick={() => {
                                    const blob = new Blob([JSON.stringify({transacoes, metas})], {type: 'application/json'});
                                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Spark_Omni_Backup.json'; a.click();
                                }} className="flex-1 glass py-6 rounded-[2rem] text-[10px] font-black uppercase accent-text btn-press">Exportar JSON</button>
                                
                                <label className="flex-1 glass py-6 rounded-[2rem] text-[10px] font-black uppercase text-center cursor-pointer opacity-60 hover:opacity-100 transition-opacity btn-press">
                                    Importar JSON
                                    <input type="file" className="hidden" onChange={(e) => {
                                        const reader = new FileReader();
                                        reader.onload = (ev) => {
                                            const data = JSON.parse(ev.target.result);
                                            if(data.transacoes) setTransacoes(data.transacoes);
                                            if(data.metas) setMetas(data.metas);
                                            alert("Cofre Restaurado com Sucesso, Mestre.");
                                        };
                                        reader.readAsText(e.target.files[0]);
                                    }}/>
                                </label>
                            </div>
                        </div>
                    )}

                    {/* --- NAVEGAÇÃO --- */}
                    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 w-[92%] max-w-sm glass-heavy rounded-[3.5rem] p-4 flex justify-between items-center shadow-[0_30px_60px_rgba(0,0,0,0.8)] z-[500] border-t border-white/10">
                        <button onClick={() => setAba('history')} className={`flex-1 py-5 flex justify-center rounded-[2rem] ${aba === 'history' ? 'accent-text bg-white/5' : 'opacity-20'}`}><Icon name="History" /></button>
                        <button onClick={() => setAba('home')} className={`flex-[1.8] py-5 flex justify-center rounded-[2.5rem] ${aba === 'home' ? 'accent-bg text-white shadow-[0_0_30px_var(--accent-color)]' : 'opacity-20'}`}><Icon name="Home" /></button>
                        <button onClick={() => setAba('config')} className={`flex-1 py-5 flex justify-center rounded-[2rem] ${aba === 'config' ? 'accent-text bg-white/5' : 'opacity-20'}`}><Icon name="Fingerprint" /></button>
                    </div>

                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
