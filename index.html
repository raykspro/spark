<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK - Omni Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { spark: { dark: '#020617', blue: '#0066FF', cyan: '#00F0FF', green: '#10B981', gold: '#FBBF24', red: '#EF4444' } } } }
        }
    </script>
    <style>
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark .glass { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255, 255, 255, 0.08); }
        .spark-gradient-blue { background: linear-gradient(135deg, #0066FF 0%, #00F0FF 100%); }
        .spark-gradient-gold { background: linear-gradient(135deg, #B45309 0%, #FBBF24 100%); }
        .spark-gradient-red { background: linear-gradient(135deg, #991B1B 0%, #EF4444 100%); }
        .btn-active:active { transform: scale(0.92); filter: brightness(1.2); }
        .tab-transition { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spark-scrollbar::-webkit-scrollbar { height: 0px; width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-spark-dark text-slate-900 dark:text-slate-100 min-h-screen pb-32 select-none overflow-x-hidden">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icone = ({ nome, className = "w-6 h-6" }) => {
            const icones = {
                History: <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" />,
                Home: <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />,
                Stats: <path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5V5h-5v13zm6 0h5v-13h-5v13z" />,
                Trash: <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />,
                Alert: <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" />,
                Fingerprint: <path d="M17.81 4.47c-.08 0-.16-.02-.23-.06C15.66 3.42 14 3 12.01 3c-1.98 0-3.74.4-5.57 1.41-.23.13-.52.05-.65-.18-.13-.23-.05-.52.18-.65C7.88 2.5 9.8 2 12.01 2c2.12 0 3.91.47 5.91 1.55.23.13.31.42.18.65-.07.12-.19.18-.29.18zm-2.88 2.2c-.11 0-.22-.04-.31-.12-.86-.77-2.03-1.14-3.41-1.14-1.12 0-2.13.25-3.09.73-.24.12-.53.02-.65-.22s-.02-.53.22-.65c1.11-.55 2.31-.85 3.53-.85 1.6 0 2.99.45 4.02 1.36.21.19.22.5.03.71-.09.09-.22.14-.34.14zM14.5 12c-.28 0-.5-.22-.5-.5 0-.82-.68-1.5-1.5-1.5s-1.5.68-1.5 1.5c0 .28-.22.5-.5.5s-.5-.22-.5-.5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5c0 .28-.22.5-.5.5zm1.5 6c-.28 0-.5-.22-.5-.5 0-1.38-1.12-2.5-2.5-2.5s-2.5 1.12-2.5 2.5c0 .28-.22.5-.5.5s-.5-.22-.5-.5c0-1.93 1.57-3.5 3.5-3.5s3.5 1.57 3.5 3.5c0 .28-.22.5-.5.5zM12 22c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5zm0-4c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icones[nome] || icones.Home}</svg>;
        };

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [aba, setAba] = useState('home');
            const [theme, setTheme] = useState(() => localStorage.getItem('spark_theme') || 'blue');
            
            // Dados Dinâmicos
            const [transacoes, setTransacoes] = useState(() => JSON.parse(localStorage.getItem('spark_db_v6')) || []);
            const [cartoes, setCartoes] = useState(() => JSON.parse(localStorage.getItem('spark_cartoes')) || []);
            const [metas, setMetas] = useState(() => JSON.parse(localStorage.getItem('spark_metas')) || { Geral: 2000, Alimentação: 500, Lazer: 300, Fatura: 1000, Transporte: 200, Saúde: 200, Investimento: 500 });
            const [contasFixas, setContasFixas] = useState(() => JSON.parse(localStorage.getItem('spark_fixas')) || []);
            
            const [valor, setValor] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [nota, setNota] = useState('');

            useEffect(() => {
                localStorage.setItem('spark_db_v6', JSON.stringify(transacoes));
                localStorage.setItem('spark_cartoes', JSON.stringify(cartoes));
                localStorage.setItem('spark_theme', theme);
            }, [transacoes, cartoes, theme]);

            const lancar = (tipo, vOverride, catOverride, notaOverride) => {
                const v = vOverride || valor;
                if (!v) return;
                const nova = { id: Date.now(), valor: parseFloat(v), tipo, categoria: catOverride || categoria, nota: notaOverride || nota || `Operação ${catOverride || categoria}`, timestamp: Date.now(), data: new Date().toLocaleDateString('pt-BR') };
                setTransacoes([nova, ...transacoes]);
                if(!vOverride) { setValor(''); setNota(''); }
            };

            const deletar = (id) => { if(confirm("Deseja remover este registro, Senhor?")) setTransacoes(transacoes.filter(t => t.id !== id)); };

            const stats = useMemo(() => {
                const hoje = new Date();
                const doMes = transacoes.filter(t => new Date(t.timestamp).getMonth() === hoje.getMonth());
                const totalSaidas = doMes.filter(t => t.tipo === 'saida').reduce((acc, t) => acc + t.valor, 0);
                const porCategoria = {};
                doMes.filter(t => t.tipo === 'saida').forEach(t => { porCategoria[t.categoria] = (porCategoria[t.categoria] || 0) + t.valor; });
                return { totalSaidas, porCategoria };
            }, [transacoes]);

            const saldoReal = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc - t.valor, 0);

            const exportarRelatorio = () => {
                const resumo = `RELATÓRIO SPARK - Mestre\n\nSaldo: R$ ${saldoReal}\nGastos Mês: R$ ${stats.totalSaidas}\n\nTop Categorias:\n${Object.entries(stats.porCategoria).map(([c, v]) => `- ${c}: R$ ${v}`).join('\n')}`;
                navigator.clipboard.writeText(resumo);
                alert("Relatório copiado para a área de transferência, Senhor!");
            };

            if (!isAuthenticated) {
                return (
                    <div className="fixed inset-0 bg-spark-dark flex flex-col items-center justify-center p-8 z-[100] tab-transition">
                        <div className={`w-24 h-24 rounded-[2.5rem] flex items-center justify-center font-black italic text-white shadow-2xl text-5xl mb-12 spark-gradient-${theme}`}>S</div>
                        <h1 className="text-2xl font-black italic mb-2">SPARK VAULT</h1>
                        <p className="text-[10px] uppercase font-black tracking-[0.3em] opacity-40 mb-20 italic">Aguardando Digital do Mestre</p>
                        <button onClick={() => setIsAuthenticated(true)} className="glass w-full py-10 rounded-[3rem] flex flex-col items-center gap-4 btn-active">
                            <div className={`text-spark-${theme} animate-pulse`}><Icone nome="Fingerprint" className="w-16 h-16" /></div>
                        </button>
                    </div>
                );
            }

            return (
                <div className="p-4 max-w-2xl mx-auto">
                    {/* Header Premium */}
                    <div className="flex justify-between items-center mb-8 pt-4">
                        <div className="flex gap-4 items-center">
                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black italic text-white shadow-lg text-2xl spark-gradient-${theme}`}>S</div>
                            <div>
                                <p className="text-[10px] opacity-40 uppercase font-black tracking-widest italic">Patrimônio do Mestre</p>
                                <p className="text-2xl font-black italic text-spark-green">R$ {saldoReal.toLocaleString('pt-BR')}</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                             <button onClick={exportarRelatorio} className="glass p-3 rounded-xl btn-active opacity-60">📑</button>
                             <button onClick={() => setAba('config')} className="glass p-3 rounded-xl btn-active opacity-60">⚙️</button>
                        </div>
                    </div>

                    {aba === 'home' && (
                        <div className="tab-transition">
                            {/* Dashboard Principal */}
                            <div className="glass rounded-[3rem] p-10 mb-8 text-center shadow-xl relative overflow-hidden">
                                <h3 className={`text-spark-${theme} text-[10px] font-black uppercase tracking-widest mb-2 italic opacity-60`}>Fluxo Mensal</h3>
                                <p className="text-6xl font-black italic tracking-tighter mb-6">R$ {stats.totalSaidas.toLocaleString('pt-BR')}</p>
                                <div className="h-3 w-full bg-white/5 rounded-full p-[2px]">
                                    <div className={`h-full rounded-full shadow-lg spark-gradient-${theme}`} style={{ width: `${Math.min((stats.totalSaidas/metas.Geral)*100, 100)}%` }}></div>
                                </div>
                            </div>

                            {/* Lançamento Rápido */}
                            <div className="glass rounded-[2.5rem] p-8 mb-8 shadow-2xl">
                                <input type="number" inputMode="decimal" value={valor} onChange={(e) => setValor(e.target.value)} placeholder="0.00" className="w-full bg-transparent text-center text-7xl font-black outline-none mb-4 tracking-tighter"/>
                                <input type="text" value={nota} onChange={(e) => setNota(e.target.value)} placeholder="Título da operação..." className="w-full bg-white/5 rounded-2xl p-4 mb-8 text-center text-sm font-bold outline-none"/>
                                
                                <div className="flex gap-2 overflow-x-auto pb-6 mb-8 spark-scrollbar">
                                    {Object.keys(metas).filter(k => k !== 'Geral').map(cat => (
                                        <button key={cat} onClick={() => setCategoria(cat)} className={`px-6 py-4 rounded-2xl text-[10px] font-black uppercase flex-shrink-0 btn-active ${categoria === cat ? `bg-spark-${theme} text-white` : 'bg-white/5 opacity-40'}`}>{cat}</button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => lancar('saida')} className={`py-6 rounded-3xl font-black uppercase text-xs btn-active text-white spark-gradient-${theme}`}>Debitar</button>
                                    <button onClick={() => lancar('entrada')} className="border-2 border-spark-green text-spark-green py-6 rounded-3xl font-black uppercase text-xs btn-active">Aportar</button>
                                </div>
                            </div>

                            {/* Widgets de Cartões */}
                            <h2 className="text-xs font-black uppercase italic opacity-40 ml-4 mb-4">Cartões do Senhor</h2>
                            <div className="flex gap-4 overflow-x-auto pb-4 spark-scrollbar">
                                {cartoes.map(c => (
                                    <div key={c.id} className="glass p-6 rounded-[2rem] min-w-[280px] border-t-4 border-t-spark-blue relative overflow-hidden">
                                        <p className="text-[10px] font-black uppercase opacity-40 italic">{c.banco}</p>
                                        <p className="font-black text-lg mb-4 italic">{c.nome}</p>
                                        <div className="flex justify-between text-[10px] font-black mb-1">
                                            <span>Limite</span>
                                            <span>R$ {c.limite}</span>
                                        </div>
                                        <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                                            <div className="h-full bg-spark-blue" style={{ width: '40%' }}></div>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={() => {
                                    const nome = prompt("Nome do Cartão:");
                                    const banco = prompt("Banco:");
                                    const limite = prompt("Limite:");
                                    if(nome && limite) setCartoes([...cartoes, { id: Date.now(), nome, banco, limite }]);
                                }} className="glass p-6 rounded-[2rem] min-w-[100px] flex items-center justify-center text-2xl opacity-40 border-dashed border-2">+</button>
                            </div>
                        </div>
                    )}

                    {aba === 'history' && (
                        <div className="tab-transition space-y-4">
                            <h2 className="text-xl font-black uppercase italic opacity-40 ml-4 mb-6">Extrato Detalhado</h2>
                            {transacoes.map(t => (
                                <div key={t.id} className="glass p-6 rounded-[2rem] flex justify-between items-center group">
                                    <div className="flex gap-4 items-center">
                                        <div className={`w-2 h-10 rounded-full ${t.tipo === 'entrada' ? 'bg-spark-green' : 'bg-red-500'}`}></div>
                                        <div>
                                            <p className="font-black text-sm italic">{t.nota}</p>
                                            <p className="text-[10px] font-bold uppercase opacity-30">{t.data} • {t.categoria}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <p className={`font-black italic ${t.tipo === 'entrada' ? 'text-spark-green' : 'text-slate-400'}`}>
                                            {t.tipo === 'entrada' ? '+' : '-'} {t.valor.toLocaleString('pt-BR')}
                                        </p>
                                        <button onClick={() => deletar(t.id)} className="text-red-500 btn-active"><Icone nome="Trash" className="w-5 h-5"/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {aba === 'stats' && (
                        <div className="tab-transition space-y-6">
                            <div className="glass p-8 rounded-[3rem] border-none shadow-xl bg-gradient-to-br from-spark-blue/10 to-transparent">
                                <div className="flex gap-3 items-center mb-4">
                                    <Icone nome="Alert" className={`text-spark-${theme} w-5 h-5`} />
                                    <h3 className="text-[10px] font-black uppercase tracking-widest italic opacity-60">Análise do Mestre</h3>
                                </div>
                                <p className="text-sm font-bold leading-relaxed italic">"Senhor, a gestão setorial está em conformidade com o teto estipulado."</p>
                            </div>
                            <div className="glass p-8 rounded-[3rem] shadow-xl">
                                <h3 className="text-[10px] font-black uppercase tracking-widest mb-8 italic opacity-60">Percentual por Categoria</h3>
                                <div className="space-y-6">
                                    {Object.entries(stats.porCategoria).map(([cat, val]) => (
                                        <div key={cat}>
                                            <div className="flex justify-between text-[10px] font-black uppercase mb-2">
                                                <span>{cat}</span>
                                                <span className="opacity-40">R$ {val}</span>
                                            </div>
                                            <div className="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                                                <div className={`h-full rounded-full spark-gradient-${theme}`} style={{ width: `${(val/stats.totalSaidas)*100}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {aba === 'config' && (
                        <div className="tab-transition space-y-8">
                            <div>
                                <h2 className="text-xs font-black uppercase italic opacity-40 ml-4 mb-4">Mudar Estética (Temas)</h2>
                                <div className="grid grid-cols-3 gap-4">
                                    <button onClick={() => setTheme('blue')} className="h-16 bg-spark-blue rounded-2xl border-2 border-white/20"></button>
                                    <button onClick={() => setTheme('gold')} className="h-16 bg-spark-gold rounded-2xl border-2 border-white/20"></button>
                                    <button onClick={() => setTheme('red')} className="h-16 bg-spark-red rounded-2xl border-2 border-white/20"></button>
                                </div>
                            </div>
                            <button onClick={() => setIsAuthenticated(false)} className="w-full glass py-6 rounded-3xl font-black uppercase text-red-500">Bloquear App</button>
                        </div>
                    )}

                    {/* DOCK DE COMANDO CORRIGIDO */}
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-[3rem] p-3 flex justify-between items-center shadow-2xl z-50 border border-white/10">
                        <button onClick={() => setAba('history')} className={`flex-1 py-4 flex justify-center rounded-[2.5rem] ${aba === 'history' ? `bg-spark-${theme}/20 text-spark-${theme}` : 'opacity-30'}`}>
                            <Icone nome="History" />
                        </button>
                        <div className="flex-[1.5] px-2">
                            <button onClick={() => setAba('home')} className={`w-full py-4 flex justify-center rounded-[2rem] shadow-lg ${aba === 'home' ? `spark-gradient-${theme} text-white` : 'glass opacity-60'}`}>
                                <Icone nome="Home" />
                            </button>
                        </div>
                        <button onClick={() => setAba('stats')} className={`flex-1 py-4 flex justify-center rounded-[2.5rem] ${aba === 'stats' ? `bg-spark-${theme}/20 text-spark-${theme}` : 'opacity-30'}`}>
                            <Icone nome="Stats" />
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
