<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK - Ignition Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { spark: { dark: '#020617', blue: '#0066FF', cyan: '#00F0FF', green: '#10B981', gold: '#FBBF24' } } } } }
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        .spark-gradient { background: linear-gradient(90deg, #0066FF 0%, #00F0FF 100%); }
        
        /* CORREÇÃO VISUAL 01: Remover setas brancas (spin-buttons) */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] { -moz-appearance: textfield; }

        /* CORREÇÃO VISUAL 02: Garantir barra de rolagem horizontal sutil */
        .spark-scrollbar::-webkit-scrollbar { height: 4px; }
        .spark-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        .spark-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.1); border-radius: 10px; }
        .spark-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0,240,255,0.3); }
        
        input::placeholder { color: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Banco de dados v5 (com lógica de crédito)
            const [transacoes, setTransacoes] = useState(() => {
                const salvo = localStorage.getItem('spark_db_v5');
                return salvo ? JSON.parse(salvo) : [];
            });
            
            const [valor, setValor] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [metodo, setMetodo] = useState('Pix');
            const [nota, setNota] = useState('');
            
            // Teto geral ainda é fixo. Fase 05 abrirá para manual.
            const tetoGeral = 1200; 

            useEffect(() => {
                localStorage.setItem('spark_db_v5', JSON.stringify(transacoes));
            }, [transacoes]);

            // LÓGICA DE FASE 04: SALDO E FATURA
            const entradas = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : acc, 0);
            
            // Saídas imediatas: Gastos - Crédito
            const saídasImediatas = transacoes.reduce((acc, t) => 
                (t.tipo === 'saida' && t.metodo !== 'Crédito') ? acc + t.valor : acc, 0);
            
            // Saldo na Mão (Real disponível hoje)
            const saldoReal = entradas - saídasImediatas;

            // Fatura: Soma exclusiva do método Crédito
            const faturaEstimada = transacoes.reduce((acc, t) => 
                (t.tipo === 'saida' && t.metodo === 'Crédito') ? acc + t.valor : acc, 0);
            
            // Total Geral (Tanque): Soma de todos os gastos (Pix + Crédito)
            const totalGeralGasto = transacoes.reduce((acc, t) => t.tipo === 'saida' ? acc + t.valor : acc, 0);
            const porcentagemGeral = Math.min(Math.round((totalGeralGasto / tetoGeral) * 100), 100);

            const lancar = (tipo) => {
                if (!valor || valor <= 0) return;
                const nova = { 
                    id: Date.now(), 
                    valor: parseFloat(valor), 
                    tipo, categoria, metodo,
                    nota: nota || (tipo === 'entrada' ? 'Recebimento' : `Gasto em ${categoria}`),
                    data: new Date().toLocaleDateString('pt-BR') 
                };
                setTransacoes([nova, ...transacoes]);
                setValor('');
                setNota('');
                setCategoria('Alimentação');
                setMetodo('Pix');
            };

            const resetarSistema = () => {
                if(confirm("Mestre, deseja apagar todos os registros do ciclo atual?")) {
                    setTransacoes([]);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-2xl mx-auto pb-24">
                    {/* Header com Saldo e Fatura */}
                    <div className="flex justify-between items-start mb-10 px-2 pt-2">
                        <div className="flex gap-3">
                            <img src="assets/logo.png" className="w-12 h-12" />
                            <img src="assets/texto-spark.png" className="h-4 mt-5" />
                        </div>
                        <div className="flex gap-5 text-right">
                            <div>
                                <p className="text-[9px] text-white/30 uppercase font-black tracking-widest pt-1">Saldo na Mão</p>
                                <p className={`text-xl font-black italic ${saldoReal >= 0 ? 'text-spark-green' : 'text-red-500'}`}>R$ {saldoReal.toLocaleString('pt-BR')}</p>
                            </div>
                            <div>
                                <p className="text-[9px] text-white/30 uppercase font-black tracking-widest text-red-400 pt-1">Fatura</p>
                                <p className="text-xl font-black text-white italic">R$ {faturaEstimada.toLocaleString('pt-BR')}</p>
                            </div>
                        </div>
                    </div>

                    {/* Dashboard de Progresso (Tanque Geral) */}
                    <div className="glass rounded-[2.5rem] p-8 mb-6 border-white/5 shadow-2xl relative overflow-hidden">
                        <div className="flex justify-between items-end mb-5">
                            <div>
                                <h3 className="text-spark-blue text-[10px] font-black uppercase tracking-widest mb-1 italic">Consumo Global (Teto: R${tetoGeral})</h3>
                                <p className="text-4xl font-black italic text-white">R$ {totalGeralGasto.toLocaleString('pt-BR')}</p>
                            </div>
                            <span className="text-spark-cyan font-black text-2xl italic shadow-[0_0_10px_rgba(0,240,255,0.3)]">{porcentagemGeral}%</span>
                        </div>
                        <div className="h-3 w-full bg-white/5 rounded-full p-[2px] border border-white/5 overflow-hidden">
                            <div className="h-full spark-gradient rounded-full transition-all duration-1000 shadow-[0_0_15px_rgba(0,102,255,0.4)]" style={{ width: `${porcentagemGeral}%` }}></div>
                        </div>
                    </div>

                    {/* Central de Operações */}
                    <div className="glass rounded-[2.5rem] p-6 mb-8 border-spark-blue/20">
                        {/* INPUT CORRIGIDO (Sem setas brancas) */}
                        <input 
                            type="number" value={valor} onChange={(e) => setValor(e.target.value)} 
                            placeholder="0.00" 
                            className="w-full bg-transparent text-center text-7xl font-black text-white outline-none mb-6 placeholder:opacity-5 transition-all focus:scale-105"
                        />
                        
                        <input 
                            type="text" value={nota} onChange={(e) => setNota(e.target.value)} 
                            placeholder="Descrição da Operação" 
                            className="w-full bg-white/5 border border-white/5 rounded-2xl p-4.5 mb-8 text-center text-sm font-bold outline-none focus:border-spark-blue transition-all"
                        />

                        {/* SELETOR CORRIGIDO (Com rolagem sutil) */}
                        <p className="text-[10px] font-black uppercase text-white/20 mb-3 ml-3 italic">Categorias Oficiais</p>
                        <div className="flex gap-2.5 overflow-x-auto pb-4.5 mb-6 spark-scrollbar -mx-2 px-2">
                            {["Alimentação", "Lazer", "Fatura", "Transporte", "Saúde", "Investimento"].map(cat => (
                                <button key={cat} onClick={() => setCategoria(cat)}
                                    className={`px-6 py-3 rounded-2xl text-[10px] font-black uppercase transition-all flex-shrink-0 ${categoria === cat ? 'spark-gradient text-white scale-105 shadow-xl' : 'bg-white/5 text-white/30 border border-white/5 hover:bg-white/10'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>

                        <p className="text-[10px] font-black uppercase text-white/20 mb-3 ml-3 italic">Método de Operação</p>
                        <div className="flex gap-2.5 mb-10">
                            {["Pix", "Débito", "Crédito", "Dinheiro"].map(m => (
                                <button key={m} onClick={() => setMetodo(m)}
                                    className={`flex-1 py-3 rounded-2xl text-[9px] font-black uppercase transition-all border ${metodo === m ? 'border-spark-cyan text-spark-cyan bg-spark-cyan/5' : 'border-white/5 text-white/20 hover:bg-white/5'}`}>
                                    {m}
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-2 gap-4.5">
                            <button onClick={() => lancar('saida')} className="bg-spark-blue py-5 rounded-[1.5rem] font-black uppercase text-xs tracking-widest hover:brightness-110 active:scale-95 shadow-lg shadow-spark-blue/20">Registrar Saída</button>
                            <button onClick={() => lancar('entrada')} className="border-2 border-spark-green/40 text-spark-green py-5 rounded-[1.5rem] font-black uppercase text-xs tracking-widest hover:bg-spark-green/10 active:scale-95">Registrar Entrada</button>
                        </div>
                        <button onClick={resetarSistema} className="w-full text-center mt-6 text-[10px] font-bold text-white/10 hover:text-red-400 transition-all uppercase tracking-widest">Zerar Ciclo de Ignição</button>
                    </div>

                    {/* Histórico Alpha (Log) */}
                    <div className="space-y-4 px-2">
                        <h4 className="text-[10px] font-black uppercase text-white/15 tracking-[0.3em] mb-5">Log de Atividades</h4>
                        {transacoes.map(t => (
                            <div key={t.id} className="glass p-5 rounded-[1.8rem] flex justify-between items-center border-l-4 group hover:bg-white/5 transition-all" style={{ borderLeftColor: t.tipo === 'entrada' ? '#10B981' : (t.metodo === 'Crédito' ? '#FF4444' : '#0066FF') }}>
                                <div className="flex flex-col gap-1.5">
                                    <div className="flex items-center gap-2 text-[9px] font-black uppercase tracking-widest">
                                        <span className={t.categoria === 'Investimento' ? 'text-spark-gold' : (t.categoria === 'Fatura' ? 'text-red-400' : 'text-white/30')}>{t.categoria}</span>
                                        <span className="w-1 h-1 bg-white/10 rounded-full"></span>
                                        <span className={t.metodo === 'Crédito' ? 'text-red-400 italic' : 'text-spark-cyan/60 italic'}>{t.metodo}</span>
                                    </div>
                                    <p className="text-sm font-bold text-white/95 group-hover:text-white transition-colors">{t.nota}</p>
                                    <p className="text-[10px] font-medium text-white/10">{t.data}</p>
                                </div>
                                <p className={`text-xl font-black italic ${t.tipo === 'entrada' ? 'text-spark-green' : (t.metodo === 'Crédito' ? 'text-red-400' : 'text-white')}`}>
                                    {t.tipo === 'entrada' ? '+' : '-'} R$ {t.valor.toLocaleString('pt-BR')}
                                </p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
