<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPARK - Ignition Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { spark: { dark: '#020617', blue: '#0066FF', cyan: '#00F0FF', green: '#10B981', gold: '#FBBF24' } } } } }
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        .spark-gradient { background: linear-gradient(90deg, #0066FF 0%, #00F0FF 100%); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .spark-scrollbar::-webkit-scrollbar { height: 4px; }
        .spark-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [transacoes, setTransacoes] = useState(() => JSON.parse(localStorage.getItem('spark_db_v6')) || []);
            const [metas, setMetas] = useState(() => JSON.parse(localStorage.getItem('spark_metas')) || {
                Geral: 2000, Alimentação: 500, Lazer: 300, Fatura: 1000, Transporte: 200, Saúde: 200, Investimento: 500
            });
            
            const [aba, setAba] = useState('home'); // home ou config
            const [valor, setValor] = useState('');
            const [categoria, setCategoria] = useState('Alimentação');
            const [metodo, setMetodo] = useState('Pix');
            const [nota, setNota] = useState('');

            useEffect(() => { localStorage.setItem('spark_db_v6', JSON.stringify(transacoes)); }, [transacoes]);
            useEffect(() => { localStorage.setItem('spark_metas', JSON.stringify(metas)); }, [metas]);

            const totalGeralGasto = transacoes.reduce((acc, t) => t.tipo === 'saida' ? acc + t.valor : acc, 0);
            const saldoReal = transacoes.reduce((acc, t) => t.tipo === 'entrada' ? acc + t.valor : (t.metodo !== 'Crédito' ? acc - t.valor : acc), 0);
            const faturaEstimada = transacoes.reduce((acc, t) => (t.tipo === 'saida' && t.metodo === 'Crédito') ? acc + t.valor : acc, 0);

            const lancar = (tipo) => {
                if (!valor) return;
                const nova = { id: Date.now(), valor: parseFloat(valor), tipo, categoria, metodo, nota: nota || `Gasto em ${categoria}`, data: new Date().toLocaleDateString('pt-BR') };
                setTransacoes([nova, ...transacoes]);
                setValor(''); setNota(''); setAba('home');
            };

            const getConsumoCat = (cat) => transacoes.reduce((acc, t) => (t.tipo === 'saida' && t.categoria === cat) ? acc + t.valor : acc, 0);

            if (aba === 'config') {
                return (
                    <div className="min-h-screen p-6 max-w-2xl mx-auto">
                        <button onClick={() => setAba('home')} className="text-spark-cyan font-black uppercase text-[10px] mb-8 flex items-center gap-2">← Voltar para Operação</button>
                        <h2 className="text-3xl font-black italic mb-2">METAS DE IGNIÇÃO</h2>
                        <p className="text-white/30 text-xs mb-8 uppercase tracking-widest font-bold">Defina seus tetos mensais</p>
                        
                        <div className="space-y-4">
                            {Object.keys(metas).map(cat => (
                                <div key={cat} className="glass p-5 rounded-2xl flex justify-between items-center">
                                    <span className="font-black text-[10px] uppercase tracking-widest text-white/50">{cat}</span>
                                    <div className="flex items-center gap-3">
                                        <span className="text-white/20 font-bold text-xs font-mono">R$</span>
                                        <input 
                                            type="number" value={metas[cat]} 
                                            onChange={(e) => setMetas({...metas, [cat]: parseFloat(e.target.value) || 0})}
                                            className="bg-white/5 border border-white/10 rounded-lg p-2 w-24 text-right font-black text-spark-cyan outline-none focus:border-spark-cyan"
                                        />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 max-w-2xl mx-auto pb-24">
                    <div className="flex justify-between items-center mb-10 pt-2 px-2">
                        <img src="assets/logo.png" className="w-10 h-10" />
                        <div className="flex gap-4 items-center">
                            <div className="text-right">
                                <p className="text-[8px] text-white/30 uppercase font-black">Saldo Real</p>
                                <p className="text-lg font-black italic text-spark-green">R$ {saldoReal.toLocaleString('pt-BR')}</p>
                            </div>
                            <button onClick={() => setAba('config')} className="glass p-3 rounded-xl border-spark-blue/20">⚙️</button>
                        </div>
                    </div>

                    <div className="glass rounded-[2.5rem] p-8 mb-8 border-white/5 shadow-2xl relative overflow-hidden">
                        <div className="flex justify-between items-end mb-4">
                            <div>
                                <h3 className="text-spark-blue text-[10px] font-black uppercase tracking-widest mb-1 italic">Consumo Global</h3>
                                <p className="text-4xl font-black italic text-white">R$ {totalGeralGasto.toLocaleString('pt-BR')}</p>
                            </div>
                            <span className="text-spark-cyan font-black text-2xl italic">{Math.min(Math.round((totalGeralGasto/metas.Geral)*100),100)}%</span>
                        </div>
                        <div className="h-2 w-full bg-white/5 rounded-full p-[1px] border border-white/5 overflow-hidden">
                            <div className="h-full spark-gradient rounded-full shadow-[0_0_15px_rgba(0,102,255,0.4)]" style={{ width: `${Math.min((totalGeralGasto/metas.Geral)*100),100}%` }}></div>
                        </div>
                        <p className="text-[9px] font-bold text-white/20 mt-3 uppercase tracking-tighter text-right">Limite Definido: R$ {metas.Geral.toLocaleString('pt-BR')}</p>
                    </div>

                    <div className="glass rounded-[2.5rem] p-6 mb-8 border-spark-blue/20">
                        <input type="number" value={valor} onChange={(e) => setValor(e.target.value)} placeholder="0.00" className="w-full bg-transparent text-center text-7xl font-black text-white outline-none mb-4"/>
                        <input type="text" value={nota} onChange={(e) => setNota(e.target.value)} placeholder="O que o Senhor comprou?" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 mb-6 text-center text-sm font-bold outline-none"/>

                        <div className="flex gap-2 overflow-x-auto pb-4 mb-6 spark-scrollbar">
                            {Object.keys(metas).filter(k => k !== 'Geral').map(cat => (
                                <button key={cat} onClick={() => setCategoria(cat)} className={`px-5 py-3 rounded-xl text-[10px] font-black uppercase transition-all flex-shrink-0 ${categoria === cat ? 'spark-gradient text-white shadow-xl scale-105' : 'bg-white/5 text-white/30 border border-white/5'}`}>
                                    {cat}
                                    <div className="text-[7px] opacity-40 mt-1">Gasto: R$ {getConsumoCat(cat)}</div>
                                </button>
                            ))}
                        </div>

                        <div className="flex gap-2 mb-8">
                            {["Pix", "Débito", "Crédito", "Dinheiro"].map(m => (
                                <button key={m} onClick={() => setMetodo(m)} className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase border ${metodo === m ? 'border-spark-cyan text-spark-cyan bg-spark-cyan/5 shadow-[0_0_10px_rgba(0,240,255,0.1)]' : 'border-white/5 text-white/20'}`}>{m}</button>
                            ))}
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => lancar('saida')} className="bg-spark-blue py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-spark-blue/20">Registrar Saída</button>
                            <button onClick={() => lancar('entrada')} className="border border-spark-green/30 text-spark-green py-5 rounded-2xl font-black uppercase text-xs tracking-widest">Registrar Entrada</button>
                        </div>
                    </div>

                    <div className="space-y-4 px-2">
                        {transacoes.map(t => (
                            <div key={t.id} className="glass p-5 rounded-[1.5rem] flex justify-between items-center border-l-4" style={{ borderLeftColor: t.tipo === 'entrada' ? '#10B981' : (t.metodo === 'Crédito' ? '#FF4444' : '#0066FF') }}>
                                <div className="flex flex-col gap-1">
                                    <div className="flex items-center gap-2 text-[9px] font-black uppercase tracking-widest">
                                        <span className={t.categoria === 'Investimento' ? 'text-spark-gold' : 'text-white/30'}>{t.categoria}</span>
                                        <span className="text-spark-cyan/40 italic">{t.metodo}</span>
                                    </div>
                                    <p className="text-sm font-bold text-white/90">{t.nota}</p>
                                    <p className="text-[10px] font-medium text-white/10">{t.data}</p>
                                </div>
                                <p className={`text-xl font-black italic ${t.tipo === 'entrada' ? 'text-spark-green' : (t.metodo === 'Crédito' ? 'text-red-400' : 'text-white')}`}>
                                    {t.tipo === 'entrada' ? '+' : '-'} R$ {t.valor.toLocaleString('pt-BR')}
                                </p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
